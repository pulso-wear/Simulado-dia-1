        { tipo: "p", txt: "Ao mesmo tempo, o Brasil é o maior consumidor de agrotóxicos per capita do mundo. O modelo do agronegócio — monocultura em larga escala, mecanização total, dependência de agroquímicos — é extremamente produtivo em volume, mas tem custos enormes: contaminação de mananciais, intoxicação de trabalhadores, perda de biodiversidade e dependência de insumos importados." },
        { tipo: "p", txt: "A agroecologia propõe um caminho diferente. Não é só uma técnica agrícola — é uma ciência, uma prática e um movimento social que integra princípios ecológicos, sociais e econômicos." },
        { tipo: "h3", txt: "O que a agroecologia faz diferente" },
        { tipo: "ul", items: [
          "POLICULTIVO: em vez de plantar só soja por 10 mil hectares, planta-se diversidade. Diferentes espécies ocupam nichos complementares, reduzem a pressão de pragas (que se especializam em um hospedeiro), ciclan nutrientes de forma mais eficiente e tornam o sistema mais resiliente a secas ou pragas.",
          "SOBERANIA ALIMENTAR: conceito criado pela Via Campesina em 1996. Vai além da 'segurança alimentar' (ter comida suficiente): defende o DIREITO dos povos de controlar seus próprios sistemas alimentares — as sementes, os métodos, os mercados. Quem decide o que plantar? Uma corporação transnacional ou o agricultor?",
          "CONTROLE BIOLÓGICO: em vez de agrotóxico, usa-se predador natural. Vespas parasitóides contra lagartas, fungos contra insetos praga. A natureza tem soluções — a agroecologia as aproveita.",
          "PNAE (Lei 11.947/2009): 30% dos recursos do programa de merenda escolar devem vir da agricultura familiar. Isso cria mercado garantido para pequenos produtores agroecológicos — o problema histórico: sem comprador, não há produção."
        ]},
        { tipo: "ex", txt: "AGROECOLOGIA ≠ ROMANTISMO: não é voltar a enxada e ao século XVIII. É ciência moderna aplicada a sistemas sustentáveis. O MST aplica agroecologia nos assentamentos como estratégia econômica, não só ambiental: policultivos geram renda ao longo do ano todo, reduzem custos com insumos e tornam a pequena propriedade economicamente viável." }
      ]}
    ],
    questoes: [
      { q: "O economista Bresser-Pereira usa o conceito de 'doença holandesa' para explicar a desindustrialização brasileira. Qual é o mecanismo econômico central desse fenômeno?", alts: ["Empresas industriais brasileiras preferiram investir em commodities por serem mais lucrativas.", "A exportação de commodities gera divisas que valorizam o câmbio → os produtos industriais brasileiros ficam caros no exterior e os importados ficam baratos internamente → a indústria perde competitividade em ambos os mercados — ciclo vicioso que desincentiva a diversificação produtiva.", "A doença holandesa é exclusivamente monetária, sem relação com a estrutura produtiva.", "A abundância de recursos naturais sempre beneficia o desenvolvimento de longo prazo.", "O fenômeno afeta apenas países exportadores de petróleo."], g: "B", j: "O mecanismo: exportações de commodities → entrada de dólares → real valorizado → manufaturados brasileiros ficam caros para exportar E manufaturados importados ficam baratos → indústria perde nos dois fronts (externo e interno). O resultado é especialização crescente em commodities — que por sua vez valoriza mais o câmbio — num ciclo vicioso. Bresser propõe câmbio administrado para neutralizar o efeito." },
      { q: "A 'reprimarização da pauta exportadora' brasileira representa um risco estrutural para a economia. Qual é esse risco?", alts: ["A exportação de commodities é sempre mais lucrativa que a de manufaturados.", "Economias dependentes de commodities ficam expostas à volatilidade dos preços internacionais, sofrem piora dos termos de troca no longo prazo (commodities se depreciam em relação aos manufaturados) e perdem a 'learning by doing' industrial — capacidade de inovar que a indústria gera.", "A reprimarização aumenta a geração de empregos qualificados.", "A pauta exportadora atual é mais diversificada que no período industrial.", "A dependência de commodities protege o país das crises financeiras internacionais."], g: "B", j: "Os riscos da reprimarização são múltiplos: (1) volatilidade — o preço da soja ou do petróleo oscila muito mais que o de manufaturados; (2) deterioração dos termos de troca — tese Prebisch-Singer, confirmada empiricamente: commodities tendem a perder valor relativo para manufaturados no longo prazo; (3) perda de externalidades tecnológicas — indústria gera spillovers de inovação que a agropecuária não gera na mesma escala." },
      { q: "A soberania alimentar, conceito da Via Campesina, distingue-se da segurança alimentar promovida pela FAO. Qual é a distinção central?", alts: ["São sinônimos — diferem apenas na ênfase política.", "Segurança alimentar foca em garantir acesso a alimentos suficientes (pode ser via importação de corporações transnacionais); soberania alimentar afirma o direito dos povos de controlar seus próprios sistemas alimentares — sementes, métodos, mercados — priorizando produção local agroecológica.", "Segurança alimentar é exclusiva dos países ricos.", "A FAO defende soberania alimentar; a Via Campesina, segurança alimentar.", "São equivalentes com apenas diferenças terminológicas."], g: "B", j: "A distinção é política e ontológica: segurança alimentar é neutra quanto à origem — um país pode atingi-la importando tudo de corporações transnacionais. Soberania alimentar é reivindicação de autonomia: quem controla as sementes (OGM ou variedades locais?), os métodos (agrotóxicos ou agroecologia?), os mercados (commodities globais ou feiras locais?)? O conceito foi criado em 1996 para contestar exatamente o modelo de segurança alimentar mediado pelo mercado global." },
      { q: "O Brasil lidera o consumo de agrotóxicos per capita mundial. Qual combinação de fatores estruturais explica essa posição?", alts: ["O clima tropical favorece mais pragas, exigindo mais agrotóxicos.", "Monocultura extensiva em larga escala + processo de registro facilitado com influência do agronegócio + ausência de política robusta de alternativas (controle biológico, agroecologia) + baixo custo relativo dos agrotóxicos = sistema com incentivos que convergem para a dependência química.", "O alto consumo é resultado exclusivo da exportação — tudo vai para mercados internacionais.", "O Brasil usa mais agrotóxicos apenas porque tem maior área agrícola total.", "O consumo elevado não tem consequências documentadas para a saúde pública."], g: "B", j: "A liderança é sistêmica: monocultura em escala cria pressão uniforme de pragas; o processo de registro tem sido acelerado com pouca avaliação toxicológica independente; alternativas agroecológicas carecem de crédito e assistência técnica; o custo do agrotóxico é mais baixo que o da mão de obra para colheita manual. Consequências documentadas: INCA aponta correlação com cânceres, IBGE registra contaminação de poços, SINAN registra milhares de intoxicações anuais." },
      { q: "A desindustrialização é apresentada por alguns economistas não apenas como problema econômico, mas como questão de soberania nacional. Qual argumento sustenta essa afirmação?", alts: ["A desindustrialização enfraquece o exército por reduzir a produção de armas.", "A perda de capacidade industrial implica dependência tecnológica em setores estratégicos (saúde, energia, defesa, informática), tornando o país vulnerável a sanções, embargos ou rupturas da cadeia global de suprimentos — como demonstrado pela pandemia de COVID-19.", "A soberania é afetada apenas em tempos de guerra.", "A desindustrialização aumenta a soberania por reduzir dependência de importações.", "Soberania e indústria são conceitos sem relação na economia contemporânea."], g: "B", j: "A pandemia de COVID-19 foi teste empírico: países sem indústria farmacêutica dependeram de vacinas de outros (incluindo o Brasil, que esperou vacinas da Índia e China). Sem indústria de semicondutores, o Brasil foi vulnerável à escassez global de chips em 2021. A capacidade de produzir internamente bens estratégicos é condição de autonomia política — confirmada pela geopolítica recente." },
      { q: "A agroecologia é frequentemente apresentada em oposição binária ao agronegócio. Qual crítica mais sofisticada pode ser feita a essa dicotomia?", alts: ["A agroecologia e o agronegócio são absolutamente incompatíveis.", "A dicotomia ignora o espectro de práticas entre os extremos — agricultura orgânica certificada, ILPF (integração lavoura-pecuária-floresta), agricultura de precisão — e que a transição agroecológica exige políticas públicas concretas, não apenas discurso ideológico.", "A agroecologia é simplesmente mais eficiente em todas as métricas.", "O agronegócio não tem qualquer prática sustentável possível.", "A dicotomia é necessária para simplificar a análise política."], g: "B", j: "Entre a monocultura convencional e a agroecologia pura existe um espectro de práticas: sistemas ILPF reduzem impactos mantendo escala comercial; a agricultura de precisão usa menos insumos por GPS; a orgânica certificada elimina agrotóxicos sem necessariamente adotar todos os princípios agroecológicos. A binarização pode impedir alianças estratégicas necessárias para políticas públicas efetivas de transição." },
      { q: "O PNAE (Programa Nacional de Alimentação Escolar, Lei 11.947/2009) é considerado instrumento de fomento à agroecologia. Por quê?", alts: ["Proíbe a compra de alimentos convencionais nas escolas públicas.", "Ao destinar 30% dos recursos à compra da agricultura familiar, cria demanda estável e garantida para pequenos produtores — muitos com práticas agroecológicas — viabilizando economicamente a produção diversificada local.", "Financia a compra de agrotóxicos para a agricultura familiar.", "Obriga que 100% dos alimentos sejam orgânicos.", "É programa exclusivo para escolas rurais."], g: "B", j: "O PNAE resolve um problema central da agroecologia: a falta de mercado garantido. Agricultores familiares com policultivos agroecológicos têm produção diversificada em pequena escala — difícil de vender no mercado convencional. O PNAE garante compra regular e a preços justos, sem exigir escala. É um instrumento de política pública que cria demanda onde o mercado não criaria." },
      { q: "O policultivo é princípio central da agroecologia. Qual argumento ecológico — não apenas social ou econômico — justifica o policultivo em relação à monocultura?", alts: ["O policultivo produz mais por hectare em todas as condições.", "O policultivo recria a estrutura funcional de ecossistemas naturais: diferentes espécies ocupam nichos complementares, reduzindo a pressão de pragas específicas, ciclando nutrientes de forma mais eficiente e aumentando a resiliência do sistema a variações climáticas e eventos extremos.", "O policultivo é ecologicamente equivalente à monocultura.", "É menos produtivo e só se justifica por razões culturais.", "O argumento ecológico do policultivo é puramente teórico, sem evidências empíricas."], g: "B", j: "O argumento ecológico baseia-se na teoria dos ecossistemas: biodiversidade aumenta resiliência e eficiência funcional. No policultivo: (1) pragas específicas de uma cultura encontram barreiras físicas entre plantas distintas; (2) raízes de diferentes profundidades captam água e nutrientes complementarmente; (3) a serapilheira diversa alimenta uma comunidade microbiana mais rica; (4) o sistema é mais resiliente a eventos climáticos extremos." },
      { q: "A desindustrialização brasileira é classificada como 'precoce' em comparação com países desenvolvidos. O que distingue a desindustrialização precoce da madura?", alts: ["Na precoce, a indústria cresce; na madura, decresce.", "A desindustrialização madura ocorre quando países atingem alto nível de renda e capacidade tecnológica industrial antes de perder participação para os serviços; a precoce ocorre antes desse desenvolvimento — o país perde competitividade industrial sem ter criado base tecnológica e sem ter atingido padrão elevado de renda.", "São sinônimos com apenas diferenças terminológicas.", "A precoce é positiva; a madura é negativa.", "Ambas têm as mesmas consequências para o desenvolvimento."], g: "B", j: "Países como EUA e Alemanha desindustrializaram após décadas de liderança tecnológica, alto nível de renda per capita e consolidação de uma economia de serviços sofisticados (financeiros, tecnológicos). O Brasil perde participação industrial antes de completar esse percurso: sem a base tecnológica e sem o nível de renda que permitiria absorver a mão de obra industrial em serviços de alto valor. O risco é ficar 'no meio do caminho': nem indústria competitiva, nem serviços sofisticados." },
      { q: "O Brasil é o maior exportador de alimentos da América Latina e simultaneamente tem milhões em insegurança alimentar. Qual estrutura socioeconômica explica essa contradição?", alts: ["O Brasil exporta apenas alimentos de baixa qualidade, consumindo internamente os melhores.", "A concentração fundiária e o modelo agroexportador direcionam a produção agrícola para mercados externos; a desigualdade de renda impede que parcelas da população acessem alimentos no mercado interno. Produção e acesso são problemas distintos que exigem políticas distintas.", "O Brasil importa mais alimentos do que exporta.", "A insegurança alimentar é causada exclusivamente pela seca no Nordeste.", "A contradição é impossível — exportadores de alimentos não têm insegurança alimentar."], g: "B", j: "Josué de Castro ('Geografia da Fome', 1946) já apontava essa contradição estrutural: a fome no Brasil não é problema de produção, mas de acesso. O Brasil produz alimentos para mais de 1 bilhão de pessoas. A insegurança alimentar de milhões de brasileiros resulta da desigualdade de renda e da concentração fundiária — que expulsa camponeses da terra e direciona a produção para exportação. São duas faces da mesma estrutura agrária." },
      { q: "Qual das opções apresenta causa que NÃO está diretamente ligada à desindustrialização brasileira?", alts: ["Câmbio sobrevalorizado pelas exportações de commodities.", "Elevada carga tributária e burocracia (Custo Brasil).", "Expansão da rede de saneamento básico nas cidades.", "Concorrência de manufaturados chineses a preços sem equivalência.", "Juros elevados que inibem o investimento produtivo industrial."], g: "C", j: "A expansão do saneamento básico é política de infraestrutura social e saúde pública — não está relacionada diretamente ao processo de desindustrialização. Todos os outros fatores são amplamente debatidos na literatura econômica como causas da perda de competitividade industrial brasileira. O saneamento, ao contrário, pode aumentar a produtividade da força de trabalho (menos doenças), o que seria favorável, não contrário, à indústria." }
    ],
  },
  {
    id: "arte", icon: "🎨", nome: "Arte",
    topico: "Antiguidade Clássica, Arte Paleocristã e Medieval",
    conteudo: [
      { h2: "1. ARTE GREGA — QUANDO A BELEZA ERA UMA QUESTÃO FILOSÓFICA", items: [
        { tipo: "p", txt: "Para os gregos, a beleza não era apenas estética — era filosófica. A harmonia de proporções de uma escultura refletia a harmonia do cosmos. Os pitagóricos acreditavam que o universo era regido por proporções matemáticas, e os artistas gregos traduziram isso em pedra e bronze." },
        { tipo: "h3", txt: "Arquitetura: as três ordens" },
        { tipo: "ul", items: [
          "DÓRICA: a mais austera. Coluna robusta, sem base, capitel simples. Partenon de Atenas (447-432 a.C.) é o exemplo máximo. Associada à racionalidade e à força.",
          "JÔNICA: mais elegante. Coluna com base, capitel com volutas (espirais). Erecteion, também em Atenas.",
          "CORÍNTIA: a mais ornamentada. Capitel com folhas de acanto. Usada pelos romanos com frequência."
        ]},
        { tipo: "h3", txt: "Escultura: da rigidez ao movimento" },
        { tipo: "p", txt: "A escultura grega evoluiu do kouros arcaico — estático, frontal, com o sorriso artificial (sorriso arcaico) — para o dinamismo do período clássico. Policleto criou o 'cânone' de proporções ideais (o Doriforo). No período helenístico (após Alexandre, o Grande), a emoção explodiu: o Laocoonte, que mostra um sacerdote e seus filhos sendo estrangulados por serpentes, é pura expressão de angústia e dor." },
        { tipo: "h3", txt: "Arte Romana — inovação estrutural" },
        { tipo: "p", txt: "Roma assimilou a arte grega mas inovou radicalmente na engenharia. O arco, a abóbada e o concreto romano (opus caementicium) permitiram construções que os gregos jamais conseguiriam. O Panteão (43m de diâmetro, cúpula sem reforços internos) foi a maior cúpula do mundo por 1300 anos. Na escultura, os romanos preferiam o retrato hiper-realista — rugas, calvícies, imperfeições — ao idealismo grego." }
      ]},
      { h2: "2. ARTE PALEOCRISTÃ — FALAR DE DEUS SEM SER OUVIDO", items: [
        { tipo: "p", txt: "Os primeiros cristãos viviam sob perseguição no Império Romano. Reunir-se abertamente era perigoso — as catacumbas (cemitérios subterrâneos de Roma) eram o lugar onde se rezava, se enterrava e se produzia arte sem ser visto. Daí o caráter codificado da primeira arte cristã: cada símbolo era uma mensagem que o iniciado reconhecia e o perseguidor ignorava." },
        { tipo: "ul", items: [
          "PEIXE (ΙΧΘΥΣ): acrônimo grego de 'Iesous Christos Theou Yios Soter' (Jesus Cristo Filho de Deus Salvador). Simples, discreto, irrecusável.",
          "CHI-RHO (☧): monograma formado pelas duas primeiras letras de 'Christos' em grego. Depois do Édito de Milão (313 d.C.), tornou-se símbolo imperial.",
          "BOM PASTOR: Cristo representado como um pastor carregando um cordeiro. Derivado do moscóforo grego — os convertidos reconheciam a forma, os cristãos entendiam o novo significado.",
          "HIERARQUIA DE TAMANHOS: nas cenas com múltiplos personagens, Cristo ou a Virgem aparecem maiores — não por perspectiva, mas por importância espiritual. A escala é simbólica, não espacial."
        ]},
        { tipo: "p", txt: "Com o Édito de Milão (313 d.C.), Constantino legalizou o Cristianismo e a arte cristã saiu das catacumbas para o centro do Império. As basílicas foram construídas, os mosaicos cobriram as paredes. Os mosaicos de Ravena (século VI) são o ápice: o fundo dourado não representa o céu — representa a luz divina incriada, eterna e imutável." }
      ]},
      { h2: "3. ARTE MEDIEVAL — A CATEDRAL COMO LIVRO DE PEDRA", items: [
        { tipo: "p", txt: "Numa Europa com mais de 90% de analfabetismo, a arte tinha uma missão pedagógica essencial: ensinar a Bíblia e a doutrina a quem não sabia ler. O Papa Gregório Magno (séc. VI) chamou as imagens de 'Bíblia dos analfabetos'. A catedral inteira era um texto teológico em pedra, vidro e tinta." },
        { tipo: "h3", txt: "Estilo Românico (séculos X-XII) — a fortaleza espiritual" },
        { tipo: "p", txt: "O período românico surgiu num momento de profunda insegurança: invasões vikings pelo norte, húngaras pelo leste, sarracenas pelo sul. As igrejas com muros grossos, janelas estreitas e aspecto de fortaleza não são acidente estético — são resposta histórica. A Igreja era literalmente um lugar seguro num mundo ameaçador." },
        { tipo: "h3", txt: "Estilo Gótico (séculos XII-XV) — a luz como teologia" },
        { tipo: "p", txt: "O Abade Suger de Saint-Denis teve uma ideia que mudou a arquitetura ocidental: e se a própria estrutura da catedral pudesse conduzir o fiel a Deus? Inspirado na Teologia da Luz de Pseudo-Dionísio — que afirmava que Deus é luz pura e a luz material é o caminho para ele — Suger quis maximizar a entrada de luz." },
        { tipo: "p", txt: "Para isso, precisava de muros mais finos e janelas maiores. O problema: muros finos não aguentavam o peso da abóbada. A solução foi a inovação técnica que define o gótico:" },
        { tipo: "ul", items: [
          "ARCO OGIVAL: distribui o peso para baixo e para os lados com mais eficiência que o semicircular.",
          "ABÓBADA DE NERVURAS: concentra as forças em pontos específicos (os pilares), permitindo que as paredes entre os pilares sejam finas.",
          "ARCOBOTANTE: transfere o empuxo da abóbada para pilares externos, libertando completamente as paredes internas."
        ]},
        { tipo: "p", txt: "Resultado: paredes quase transparentes, janelas gigantes com vitrais coloridos, naves que alcançam 40 ou 50 metros de altura. A Catedral de Notre-Dame de Paris e a de Chartres são os exemplos máximos. Os vitrais não são decoração — são teologia: a luz colorida e filtrada era a presença de Deus tornada visível." },
        { tipo: "ex", txt: "GIOTTO DI BONDONE (1267-1337): o artista que quebrou a arte medieval por dentro. Antes de Brunelleschi inventar a perspectiva, Giotto introduziu algo nunca visto: figuras com volume real, emoções individuais, interação espacial coerente. Sua Lamentação de Cristo (Cappella degli Scrovegni, Pádua) tem personagens chorando de formas diferentes — cada um com sua dor específica. Nunca havia acontecido na pintura ocidental. Giotto é a ponte entre o medieval e o renascentista." }
      ]}
    ],
    questoes: [
      { q: "O Panteão romano (c. 125 d.C.) e o Partenon grego (447–432 a.C.) são dois ícones da arquitetura clássica. Qual diferença técnica fundamental distingue as soluções arquitetônicas adotadas em cada um?", alts: ["O Partenon usa cúpula de concreto; o Panteão usa colunas de mármore.", "O Panteão usa a cúpula com óculo central em concreto romano para cobrir espaço circular de 43m — solução estrutural impossível para os gregos; o Partenon usa sistema trabeado (viga sobre coluna) em mármore, sem grandes vãos internos.", "Ambos usam o mesmo sistema estrutural, diferindo apenas nos materiais.", "O Partenon tem interior monumental; o Panteão é pequeno e intimista.", "O Partenon usa arco ogival; o Panteão usa arco semicircular."], g: "B", j: "O sistema trabeado grego (coluna + viga horizontal) não permite cobrir grandes espaços — a pedra não suporta tensões de flexão em grandes vãos. Roma resolveu isso com o arco e a cúpula em concreto. O Panteão tem 43m de diâmetro (mesma da altura) — a maior cúpula do mundo por 1300 anos até a catedral de Florença. Essa diferença técnica reflete as ambições espaciais distintas de cada civilização." },
      { q: "A arte paleocristã nas catacumbas é chamada de 'arte do código'. Quais foram as consequências estéticas duradouras dessa necessidade de codificação?", alts: ["Criou uma arte naturalista e realista para comunicar a fé diretamente.", "A necessidade de comunicar a fé de forma discreta e codificada estabeleceu a tradição de arte simbólica e alegórica que dominou toda a arte medieval — a imagem não representa a realidade visual, mas a verdade espiritual. O significado sempre superou a aparência.", "Os símbolos paleocristãos foram abandonados após o Édito de Milão.", "A codificação se limitou às catacumbas, sem influência posterior.", "Criou uma arte exclusivamente abstrata, sem representação figurativa."], g: "B", j: "A arte catacumbal, por necessidade histórica, estabeleceu um princípio que dominou a arte medieval: a imagem serve ao significado, não à aparência. O peixe, o Bom Pastor, o Chi-Rho eram codificações que o iniciado reconhecia. Esse princípio tornou-se fundamento da iconografia cristã: na arte medieval, a hierarquia de tamanhos, a frontalidade e o fundo dourado não são falhas de perspectiva — são escolhas simbólicas herdadas da tradição paleocristã." },
      { q: "O Abade Suger de Saint-Denis é considerado o 'inventor' do estilo gótico. Qual era o fundamento teológico de suas inovações arquitetônicas?", alts: ["Suger queria superar as catedrais românicas por razões de prestígio político.", "Inspirado na Teologia da Luz de Pseudo-Dionísio Areopagita, Suger acreditava que a luz material — filtrada pelos vitrais — conduz o fiel à luz divina (lux nova). O arco ogival e o arcobotante eram instrumentos técnicos para maximizar a entrada de luz — a inovação estrutural estava a serviço da inovação teológica.", "Suger era engenheiro sem formação teológica, movido apenas por ambição construtiva.", "A teologia de Suger rejeitava qualquer uso de imagens e luz como instrumentos de fé.", "O gótico foi desenvolvido por razões exclusivamente práticas: estabilidade estrutural."], g: "B", j: "Suger foi explícito em seus escritos sobre a reforma de Saint-Denis: cada inovação tinha motivação teológica. A Teologia da Luz de Pseudo-Dionísio (séc. V) afirmava que Deus é luz pura e que a luz material é analogia e caminho para a luz divina. Suger aplicou isso literalmente: mais luz = mais proximidade de Deus. O arco ogival, a abóbada de nervuras e o arcobotante foram soluções técnicas para um problema teológico." },
      { q: "A escultura grega é frequentemente descrita como 'idealista' e a romana, como 'realista'. Qual aspecto cultural explica essa diferença?", alts: ["Os romanos não tinham acesso ao mármore de qualidade suficiente para escultura idealizada.", "A escultura grega buscava o kállos — o ideal eterno de beleza humana, expressão da harmonia cósmica. A romana valorizava o retrato fiel: rugas, calvícies, imperfeições dos imperadores e patrícios, pois a identidade individual e o prestígio do indivíduo concreto eram valores centrais da cultura romana.", "Os artistas romanos eram tecnicamente inferiores aos gregos.", "A diferença é puramente cronológica: romanos eram mais antigos e não dominavam a idealização.", "Ambas as tradições são igualmente idealistas; a diferença é apenas de tema."], g: "B", j: "A diferença reflete valores culturais distintos: os gregos valorizavam o tipo universal — o cidadão-atleta perfeito, expressão da harmonia pitagórica. Os romanos valorizavam o indivíduo concreto — o general, o imperador, o paterfamilias — com toda sua especificidade física. O retrato romano hiper-realista era instrumento de legitimação política e prestígio familiar: as máscaras mortuárias (imagines) eram exibidas nas casas patrícias como demonstração de ancestralidade." },
      { q: "Giotto di Bondone é frequentemente chamado de 'pai da pintura ocidental'. O que em sua obra justifica esse título?", alts: ["Giotto foi o primeiro a usar perspectiva geométrica linear com ponto de fuga.", "Giotto introduziu nas figuras volume tridimensional convincente, gestos individualmente motivados e interação espacial coerente — rompendo com a frontalidade hierática medieval e inaugurando a representação do ser humano concreto como portador de emoções reais.", "Giotto pintou exclusivamente temas mitológicos greco-romanos.", "A inovação de Giotto foi técnica: introduziu a tinta a óleo na pintura ocidental.", "Giotto criou o estilo gótico tardio nas catedrais italianas."], g: "B", j: "A perspectiva geométrica (ponto de fuga) veio com Brunelleschi em 1420 — um século depois de Giotto. A inovação de Giotto foi de outra ordem: volume corporal, peso das figuras, emoções individuais. Na Lamentação de Cristo (Cappella degli Scrovegni, c.1305), cada personagem expressa o luto de forma única e psicologicamente coerente. Isso nunca havia ocorrido na pintura medieval anterior — foi uma ruptura antropológica antes de ser técnica." },
      { q: "A arte medieval é chamada de 'Bíblia dos analfabetos' por Gregório Magno. Como essa função pedagógica se expressa especificamente nas catedrais góticas?", alts: ["As catedrais eram exclusivamente espaços de devoção, sem função pedagógica.", "A iconografia das catedrais — tímpanos esculpidos, vitrais narrativos, capitéis figurados — funcionava como enciclopédia visual da cosmologia cristã para populações iletradas: o Juízo Final no portal ensinava moral; as vidas dos santos nos vitrais forneciam modelos de conduta; as cenas bíblicas narravam a história da salvação.", "Os vitrais eram exclusivamente decorativos, sem conteúdo doutrinário.", "A função pedagógica era exclusiva das igrejas românicas.", "Os fiéis medievais eram todos letrados e liam as Escrituras diretamente."], g: "B", j: "Com mais de 90% de analfabetismo na Idade Média, a catedral era o 'livro em pedra' da população. A hierarquia iconográfica organizava o conhecimento visual: Cristo no centro/topo, santos ao redor, pecadores embaixo — como a ordem moral do universo. O tímpano do portal (entrada) mostrava o Juízo Final — última visão antes de entrar no espaço sagrado, lembrando o fiel de suas responsabilidades morais." },
      { q: "O fundo dourado dos mosaicos paleocristãos e medievais (Ravena, século VI) não é equivalente à representação do céu ou do ambiente externo. Qual é o significado teológico específico desse recurso?", alts: ["O ouro era o material mais caro, usado por razões econômicas e de prestígio.", "O fundo dourado elimina o espaço tridimensional e o contexto temporal, situando as figuras em eternidade atemporal. O ouro simboliza a luz divina incriada — não a luz solar física que muda — criando espaço sagrado onde as figuras existem fora do tempo histórico e do espaço mundano.", "O fundo dourado era convenção técnica sem significado simbólico específico.", "O ouro simbolizava a riqueza do Império Romano do Oriente.", "O fundo dourado foi introduzido pelos artistas barrocos do século XVII."], g: "B", j: "A teologia do ouro em Ravena: a arte greco-romana situava figuras em espaços naturalistas (céu azul, paisagem). O fundo dourado medieval dissolve o espaço mundano — as figuras não existem 'em algum lugar', mas na eternidade de Deus. O ouro não reflete a luz solar (que varia, que passa) mas é ele mesmo luminoso — símbolo da luz divina eterna e imutável. É escolha radicalmente anti-naturalista e radicalmente teológica." },
      { q: "A arquitetura românica é frequentemente comparada a uma 'fortaleza espiritual'. Qual aspecto histórico-social explica essa metáfora?", alts: ["As igrejas românicas eram usadas como fortalezas militares efetivas.", "O estilo românico (séculos X–XII) emergiu num período de instabilidade feudal — invasões vikings, húngaras, sarracenas, guerras internas. As igrejas com paredes espessas, janelas estreitas e aspecto maciço refletiam a função da Igreja como espaço de proteção e ordem espiritual num mundo ameaçador.", "A aparência de fortaleza era puramente estética, sem relação histórica.", "As igrejas românicas eram construídas sobre antigas fortalezas militares romanas.", "O estilo refletia apenas a limitação técnica dos construtores medievais."], g: "B", j: "O estilo não é acidente técnico — é resposta histórica. O século X, quando o românico se consolidou, foi período de extrema instabilidade: invasões dos vikings pelo norte, húngaros pelo leste, sarracenos pelo sul, além de guerras feudais constantes. As igrejas maciças eram fisicamente seguras (muros grossos resistem a incêndios e cercos) e psicologicamente reconfortantes — 'castelos de Deus' numa terra de conflitos." },
      { q: "A transição da técnica de 'figuras negras' para 'figuras vermelhas' na cerâmica grega (século V a.C.) representou avanço técnico significativo. Em que consistiu esse avanço?", alts: ["As figuras vermelhas usavam tinta vermelha importada do Oriente.", "Na técnica de figuras vermelhas, o processo foi invertido: o fundo é pintado de negro, deixando as figuras na cor natural da argila avermelhada. Isso permitiu usar o pincel para detalhar musculatura, expressões e roupagens com precisão muito maior — o que era impossível com a técnica de incisão das figuras negras.", "As figuras vermelhas substituíram o barro por mármore.", "O avanço foi exclusivamente cromático, sem diferença técnica.", "As figuras vermelhas introduziram a perspectiva na cerâmica grega."], g: "B", j: "Na técnica de figuras negras: o artista pintava a silhueta em negro e depois usava instrumentos para incisar os detalhes internos — processo mais limitado. Com as figuras vermelhas (invertido): o fundo vai a negro com verniz, as figuras ficam na cor da argila e os detalhes internos são pintados livremente com pincel fino — permitindo linhas curvas, variações de espessura e detalhamento anatômico incomparável. Foi uma revolução técnica que possibilitou maior expressividade." },
      { q: "A arte paleocristã reaproveitou formas visuais da cultura greco-romana para transmitir conteúdo cristão. Qual exemplo melhor ilustra esse processo de 'christianização' de formas visuais pagãs?", alts: ["Os cristãos criaram formas visuais completamente originais, sem referência à arte pagã.", "A figura do Bom Pastor — Cristo carregando um cordeiro — deriva do 'moscóforo' grego (portador de bezerro para sacrifício) e do Hermes psicopompo (guia das almas): a forma visual pagã foi preenchida com significado cristológico novo, pois os convertidos greco-romanos reconheciam a forma visual e internalizavam o novo significado.", "A arte paleocristã rejeitou completamente a herança visual greco-romana.", "O processo de christianização foi unidirecional: apenas a arte pagã influenciou a cristã.", "O Bom Pastor foi criado no século IV, sem qualquer precedente pagão."], g: "B", j: "O 'moscóforo' (portador de bezerro) era tipo iconográfico grego para representar devoção religiosa. Hermes psicopompo era representado carregando um cordeiro. Os cristãos reutilizaram essa forma — familiar aos convertidos greco-romanos — e a ressignificaram: Jesus que carrega a ovelha perdida. A forma visual permanece; o significado é radicalmente novo. Esse processo de inculturação — usar formas locais para transmitir conteúdo novo — é estratégia missionária documentada em toda a expansão do cristianismo." },
      { q: "A cerâmica grega — tanto de figuras negras quanto de figuras vermelhas — era produzida em série para exportação. Qual consequência isso tem para o estudo da arte grega clássica?", alts: ["A produção em série significa que a cerâmica não tem valor artístico.", "A abundante sobrevivência de cerâmica grega (ao contrário da pintura e da escultura, muito perdidas) faz dela a principal fonte visual da vida cotidiana, mitologia e estética grega — sendo ao mesmo tempo objeto de consumo, exportação e veículo de narrativas culturais complexas.", "Toda a cerâmica grega era idêntica, sem variação artística.", "A cerâmica só registrava cenas de guerra, sem outros temas.", "A produção em série inviabilizou qualquer inovação técnica."], g: "B", j: "A cerâmica grega tem valor historiográfico imenso: por ser produzida em argila (resistente ao tempo), grande quantidade sobreviveu. Por ser produzida em série para exportação, foi encontrada em toda a bacia do Mediterrâneo — evidência das redes comerciais gregas. Por representar mitos, festas, esportes, cotidiano doméstico e batalhas, é uma das mais ricas fontes visuais da cultura grega, comparável aos textos escritos." }
    ],

  {
    id: "lit", icon: "📚", nome: "Literatura",
    topico: "Quinhentismo e Barroco",
    conteudo: [
      { h2: "1. QUINHENTISMO — QUANDO O BRASIL ENTROU NA LITERATURA", items: [
        { tipo: "p", txt: "Uma ressalva importante: o Quinhentismo não é uma escola literária no sentido estrito. Não há um grupo de escritores com um programa estético comum, um manifesto coletivo ou uma geração que se reconhecia como tal. É um rótulo que a historiografia literária criou para agrupar textos do século XVI sobre o Brasil — textos que na época tinham funções muito diferentes da literatura." },
        { tipo: "h3", txt: "Literatura de Informação — relatando o 'Novo Mundo'" },
        { tipo: "p", txt: "Pero Vaz de Caminha não era escritor. Era escrivão real da frota de Cabral. Mas sua 'Carta ao Rei D. Manuel' (1500) se tornou o texto fundador da literatura brasileira — não por intenção artística, mas pela qualidade descritiva e pelo olhar detalhado sobre os primeiros contatos com os povos indígenas." },
        { tipo: "p", txt: "É também um documento de violência simbólica. O olhar de Caminha sobre os indígenas — especialmente sobre as mulheres — é etnocêntrico, erotizado e condescendente. Ler a Carta hoje é ler dois textos ao mesmo tempo: o registro histórico e o documento do olhar colonial." },
        { tipo: "ul", items: [
          "Pero de Magalhães Gandavo: 'Tratado da Terra do Brasil' — descrição geográfica e etnográfica.",
          "Hans Staden: 'Duas Viagens ao Brasil' — relato de cativeiro entre os Tupinambás. Fonte etnográfica valiosa, mas com olhar de sobrevivente traumatizado.",
        ]},
        { tipo: "h3", txt: "Literatura de Catequese — convertendo pela arte" },
        { tipo: "p", txt: "Padre José de Anchieta é o principal nome. Jesuíta, escrevia em tupi, português e latim. Seu teatro catequético usava personagens do universo cultural indígena — incluindo demônios tupis — para narrar histórias cristãs. Era inculturação: usar as formas culturais do outro para substituir seu conteúdo pelo cristão. Funcionava. Mas era também uma forma de dominação cultural." }
      ]},
      { h2: "2. BARROCO — A ESTÉTICA DA CONTRADIÇÃO", items: [
        { tipo: "p", txt: "O Barroco nasceu de uma crise. No século XVII, o mundo europeu estava partido: a Reforma Protestante havia fragmentado a cristandade; a ciência de Copérnico e Galileu havia tirado a Terra do centro do universo; o ceticismo filosófico questionava certezas que pareciam eternas. O ser humano barroco vivia entre dois mundos que não se reconciliavam: a fé medieval e a razão moderna." },
        { tipo: "p", txt: "A arte barroca é a expressão dessa contradição não resolvida. Daí as antíteses (vida/morte, luz/sombra, céu/inferno), o pessimismo, a obsessão com a passagem do tempo e com a morte, o excesso formal como tentativa de cobrir com beleza uma angústia que não tem solução." },
        { tipo: "h3", txt: "Cultismo × Conceptismo — dois caminhos do Barroco" },
        { tipo: "ul", items: [
          "CULTISMO (ou Gongorismo, do poeta espanhol Góngora): apostava na FORMA. Vocabulário erudito, latinismos, metáforas rebuscadas, inversões sintáticas. A beleza estava na linguagem em si, independente do conteúdo. É o Barroco do 'como se diz'.",
          "CONCEPTISMO (ou Quevedismo, do poeta Quevedo): apostava na IDEIA. Jogos lógicos, paradoxos, silogismos engenhosos, argumentação sofisticada. A beleza estava no raciocínio, na engenhosidade do pensamento. É o Barroco do 'o que se pensa'."
        ]},
        { tipo: "h3", txt: "Os grandes nomes do Barroco brasileiro" },
        { tipo: "ul", items: [
          "PADRE ANTÔNIO VIEIRA: o maior prosador do Barroco lusófono. Jesuíta, missionário, diplomata. Seus sermões são obras-primas do conceptismo: raciocínio sofisticado, uso engenhoso das Escrituras, argumentação que desarma o adversário com a própria lógica do adversário. O 'Sermão da Sexagésima' é uma aula de retórica: usa a parábola do semeador para provar que os pregadores medíocres são culpados pelo fracasso da evangelização.",
          "GREGÓRIO DE MATOS (o 'Boca do Inferno'): o primeiro grande poeta brasileiro. Sua obra tem três faces: a lírica amorosa (sensual, às vezes erótica), a religiosa (arrependimento sincero, dialogo com Deus) e a satírica (ataque virulento à hipocrisia da Bahia colonial — governadores corruptos, clérigos libidinosos, racismo social). A tensão entre as três faces é o 'dilema barroco' vivido em versos."
        ]},
        { tipo: "ex", txt: "ATENÇÃO: Não existe nenhum manuscrito autógrafo de Gregório de Matos. Toda a obra é conhecida por cópias tardias de copistas anônimos. Isso significa que parte do que atribuímos a Gregório pode ser de outros autores. Questões de vestibular adoram esse detalhe." }
      ]}

    questoes: [
      { q: "'Ali andavam entre eles três ou quatro moças [...] e suas vergonhas tão altas e tão çaradinhas e tão limpas das cabeleiras que de as nós muito bem olharmos não tínhamos nenhuma vergonha.' Qual problema literário e historiográfico esse trecho evidencia?", alts: ["Demonstra que Caminha respeitava e valorizava a cultura indígena.", "Revela o olhar etnocêntrico e erotizado do colonizador europeu sobre o corpo feminino indígena: a nudez é descrita com fascínio e julgamento moral, enquanto o narrador projeta sobre si a ausência de vergonha que pertence ao observado — documento de violência simbólica fundadora da colonização.", "Caminha descreve as indígenas de forma objetiva e cientificamente neutra.", "Evidencia que não havia hierarquia de gênero na sociedade indígena.", "Demonstra o humanismo igualitário de Caminha."], g: "B", j: "A leitura crítica pós-colonial identifica o 'male gaze' colonizador: o corpo indígena como objeto de escrutínio, classificação e julgamento moral ('bem gentis', 'limpas'). A frase 'não tínhamos nenhuma vergonha' é reveladora — o narrador projeta sobre si mesmo a ausência de pudor que na verdade se refere à nudez do observado. A Carta é documento histórico precioso, mas também documento literário de poder e dominação simbólica." },
      { q: "Qual problema historiográfico específico compromete as análises literárias da obra de Gregório de Matos?", alts: ["Gregório escreveu apenas em espanhol, dificultando a análise.", "Nenhum manuscrito autógrafo de Gregório foi encontrado: toda a obra é conhecida por cópias tardias de copistas anônimos do século XVIII, gerando debates sérios sobre quais poemas são genuinamente seus — o que compromete análises que tratam o corpus como se fosse definitivo e autenticado.", "Gregório nunca viveu no Brasil; sua obra foi criada em Portugal.", "O problema é apenas de datação: não se sabe quando cada poema foi escrito.", "Gregório de Matos era um personagem fictício criado por historiadores do século XIX."], g: "B", j: "João Carlos Teixeira Gomes e outros filólogos demonstraram que o corpus 'gregoriano' contém poemas de autores distintos, coletados sob o nome de um poeta que se tornou 'marca' para a sátira colonial. Sem autógrafos, é impossível distinguir com certeza o que é de Gregório do que foi a ele atribuído. Isso tem implicações sérias: análises sobre o 'estilo de Gregório' podem estar analisando um autor coletivo fantasmático." },
      { q: "'A palavra de Deus é semente. Se a palavra de Deus é semente, e a semente é palavra, como pode ser que haja tanta semente e tão pouco fruto?' Qual recurso retórico Vieira usa e qual é seu efeito argumentativo?", alts: ["Hipérbole — exagera o problema para emocionar o ouvinte.", "Silogismo conceptista: a inversão da proposição (semente = palavra → palavra = semente) cria um raciocínio circular que, ao ser confrontado com a questão retórica final, demonstra que a falha está no pregador, não na Palavra divina — a própria lógica dos adversários é usada para condená-los.", "Metáfora simples da semente sem função argumentativa.", "Anáfora para criar efeito emocional e musical.", "Cultismo de Góngora com vocabulário extremamente rebuscado."], g: "B", j: "Vieira é o mestre do conceptismo: engenho intelectual, não beleza formal. A estrutura é silogística: a Palavra de Deus é perfeita (semente boa) → o fruto escasso não pode ser culpa da semente → deve ser culpa do semeador (o pregador). Vieira usa a própria Escritura como arma contra os pregadores medíocres — especialmente os dominicanos, seus rivais. O 'Sermão da Sexagésima' é modelo de argumentação indutiva conceptista." },
      { q: "O Barroco é frequentemente descrito como 'estética da crise'. Qual crise específica o barroco literário expressa, e como ela se manifesta na obra de Gregório de Matos?", alts: ["O barroco expressa a prosperidade do século XVII.", "O barroco expressa a crise da consciência europeia diante do colapso da cosmovisão medieval: a ciência descentra a Terra, a Reforma fragmenta a cristandade, o ceticismo questiona as certezas. Em Gregório, manifesta-se na tensão irresolúvel entre luxúria confessada e arrependimento sincero, entre crítica à hipocrisia colonial e participação no mesmo sistema.", "A crise era exclusivamente econômica.", "Gregório expressava apenas celebração da vida colonial.", "O barroco era reação estética ao humanismo, sem conteúdo filosófico."], g: "B", j: "A 'crise da consciência europeia' (Paul Hazard): a modernidade científica dissolve certezas medievais sem substituí-las. O barroco é a estética da tensão irresolvida: antíteses, paradoxos, coexistência de opostos. Em Gregório, essa tensão é vivida subjetivamente: ele satira a hipocrisia alheia enquanto confessa suas próprias fraquezas em sonetos religiosos; critica os colonizadores enquanto depende do mesmo sistema colonial para sobreviver. É a subjetividade barroca em carne e verso." },
      { q: "O Quinhentismo não é, rigorosamente, uma escola literária. Qual argumento sustenta essa afirmação e como a denominação mais precisa seria?", alts: ["O Quinhentismo é escola literária bem definida com programa estético compartilhado.", "O Quinhentismo não tem programa estético, manifesto coletivo nem geração de autores com objetivos compartilhados: é reunião didática de textos documentais (literatura de informação) e catequéticos (literatura de catequese) produzidos no século XVI por autores com propósitos completamente distintos.", "O problema é cronológico: deveria abranger também o século XVII.", "A discussão é irrelevante para o estudo literário.", "É escola menor, reconhecida apenas no Brasil."], g: "B", j: "Caminha era escrivão real (não escritor), Anchieta era missionário (não literato), Gandavo era cronista (não poeta). Nenhum se reconhecia como participante de um movimento literário. O agrupamento sob 'Quinhentismo' é construção didática do século XIX que retroativamente cria unidade onde havia apenas coexistência temporal. As denominações 'literatura de informação' e 'literatura de catequese' são funcionalmente mais precisas." },
      { q: "'A cada canto um grande conselheiro / que nos quer governar cabana e vinha; / não sabem governar sua cozinha / e já governam o mundo inteiro.' Identifique o recurso estilístico dominante e a crítica social específica.", alts: ["Cultismo — crítica à culinária colonial.", "Conceptismo: a antítese irônica entre a incompetência doméstica ('não sabem governar sua cozinha') e a pretensão política ('governam o mundo inteiro') expõe a mediocridade dos que se autoproclamam conselheiros — crítica sistêmica à proliferação de incompetentes no poder colonial baiano.", "Lirismo amoroso — crítica à vida doméstica.", "Épico — ausência de grandes líderes.", "Religioso — corrupção da Igreja baiana."], g: "B", j: "O conceptismo de Gregório opera pela engenharia argumentativa, não pelo vocabulário rebuscado (esse seria o cultismo). A estrutura do quarteto: premissa (a cada canto um conselheiro), aplicação (quer nos governar), contradição (não governa nem a cozinha), conclusão irônica (mas governa o mundo). A progressão lógica expõe o absurdo da pretensão. O 'a cada canto' indica ubiquidade — crítica a uma classe, não a um indivíduo." },
      { q: "Pe. Antônio Vieira defendeu os indígenas e os cristãos-novos em seus sermões. Como interpretar essa posição em relação ao seu papel como missionário jesuíta?", alts: ["Vieira era contraditório sem coerência interna.", "A posição é internamente coerente segundo a lógica missionária: defender índios da escravidão era necessário para que pudessem ser catequizados pelos jesuítas; defender cristãos-novos da Inquisição era defender a integridade da conversão. Ambas as posições servem ao projeto de expansão do catolicismo — não a um humanismo progressista.", "Vieira era humanista progressista que antecipava os direitos humanos.", "Suas posições eram apenas retóricas.", "Vieira era contra toda forma de escravidão, incluindo a africana."], g: "B", j: "A chave interpretativa: Vieira aceitava a escravidão africana — o que demonstra que sua 'defesa' não era principiológica ou humanista universal. Defendia índios porque escravos dos colonos eram indisponíveis para a catequese jesuíta. Defendia cristãos-novos porque a Inquisição os expulsava do Brasil junto com seus capitais comerciais (que financiavam a expansão colonial e missionária). Ambas as posições têm lógica instrumental, não ética." },
      { q: "O carpe diem barroco diferencia-se do horaciano em seu tom fundamental. Qual é essa diferença?", alts: ["O horaciano é cristão; o barroco, pagão.", "O horaciano (Horácio, Odes I, 11) celebra o presente como bem em si mesmo — tom epicurista. O barroco ressignifica com angústia existencial: o prazer é possível, mas ilusório e culpável — sempre assombrado pela vanitas (tudo é vaidade) e pelo memento mori (lembre-se de que você vai morrer).", "O carpe diem barroco e o horaciano são idênticos.", "O barroco rejeita o prazer; Horácio o celebra plenamente.", "O carpe diem não existe no Barroco — é exclusivamente renascentista."], g: "B", j: "Horácio: 'Aproveite o dia porque a vida é breve e bela' — tom de celebração, sem culpa. O Barroco reinterpreta: o homem barroco quer o prazer (corpo), mas sabe que é pecado (alma), que é passageiro (tempo) e que será julgado (morte). O gozo barroco é sempre acompanhado de culpa e melancolia. É o mesmo tema com dois humores filosóficos completamente distintos — a diferença revela o abismo entre o otimismo renascentista e o pessimismo barroco." },
      { q: "'Prosopopeia' de Bento Teixeira (1601) inaugurou o Barroco brasileiro. Qual crítica literária pode ser feita a essa posição canônica?", alts: ["É obra-prima que merece plenamente sua posição inaugural.", "Prosopopeia é imitação declarada e tecnicamente inferior de Os Lusíadas de Camões: oitavas irregulares, herói histórico menor (Jorge de Albuquerque Coelho), ausência do fôlego épico do modelo. Sua posição canônica deve-se mais à necessidade de um marco cronológico do que ao mérito literário intrínseco.", "O problema é apenas a língua: foi escrita em espanhol.", "Bento Teixeira era português, tornando-a inadequada como inauguração do barroco brasileiro.", "Não tem nenhum problema literário."], g: "B", j: "A posição de Prosopopeia no cânone é mais periodológica do que estética. A obra é tecnicamente modesta: as oitavas camonianas são mal executadas, o herói celebrado (capitão de Pernambuco) é historicamente menor, o poema carece do fôlego épico do modelo. O que a colocou no cânone foi a necessidade da historiografia literária brasileira de encontrar um marco para o início do Barroco — e era o texto impresso mais antigo disponível. É mais símbolo que obra." },
      { q: "O teatro jesuítico de Anchieta enfrentava o dilema da 'inculturação'. Em que consistia esse dilema e como Anchieta o resolveu?", alts: ["O teatro era proibido pela Igreja, gerando conflito com a hierarquia.", "Para tornar o cristianismo compreensível ao universo indígena, os jesuítas precisavam usar categorias e personagens tupis — mas ao fazê-lo corriam o risco de sincretismo. Anchieta resolveu parcialmente: usava figuras do universo tupi (Guaixará — demônio local perdendo para o arcanjo Miguel) e músicas em tupi, mas reconfigurava o sistema cosmológico indígena para apontar para o Deus cristão.", "O problema era exclusivamente linguístico.", "Os jesuítas não usavam teatro.", "O teatro jesuítico era idêntico ao medieval europeu, sem adaptações."], g: "B", j: "O dilema da inculturação: quanto adaptar sem comprometer a essência? Pouca adaptação = incompreensão; muita adaptação = sincretismo herético. A solução de Anchieta foi a subversão cultural pela forma: usar as formas culturais tupis (personagens, músicas, situações reconhecíveis) para substituir o conteúdo tupi pelo cristão. Guaixará é tupi na forma mas cristão no conteúdo. A questão teológica permanecia: isso era evangelização ou era batizar o sincretismo?" },
      { q: "A Contrarreforma Católica foi o contexto histórico do surgimento do Barroco. Qual relação específica existe entre o projeto contrarreformista e as características estéticas barrocas?", alts: ["O Barroco surgiu em oposição à Contrarreforma, como expressão protestante.", "A Igreja Católica, após o Concílio de Trento (1545–1563), adotou a arte como instrumento de reafirmação dogmática: a grandiosidade visual, o apelo emocional e a dramaticidade barroca serviam para comover os fiéis, reforçar a presença institucional da Igreja e combater a sobriedade estética protestante.", "O Barroco e a Contrarreforma são fenômenos sem relação direta.", "O Barroco surgiu exclusivamente em países protestantes.", "A Contrarreforma proibiu o Barroco por considerá-lo excessivamente mundano."], g: "B", j: "O Concílio de Trento (1545–1563) estabeleceu a arte como instrumento de propaganda fidelis: contra a sobriedade iconoclasta protestante, a Igreja Católica respondeu com grandiosidade, dramatismo e apelo sensorial. A arte barroca devia comover (comoção = preparação para a fé), não apenas iluminar. As obras de Bernini (Roma) e as igrejas jesuítas são exemplos arquitetônicos desse projeto: o fiel entra num espaço que o esmaga com a grandeza de Deus." }
    ],

  {
    id: "fil", icon: "🧠", nome: "Filosofia",
    topico: "Filosofia Medieval: Patrística e Escolástica",
    conteudo: [
      { h2: "1. O PROBLEMA CENTRAL DA FILOSOFIA MEDIEVAL", items: [
        { tipo: "p", txt: "A filosofia medieval tem uma pergunta central que organiza tudo o mais: como conciliar a revelação cristã (o que Deus revelou nas Escrituras) com a razão filosófica grega (especialmente Platão e Aristóteles)? Eles dizem coisas diferentes. O que fazer quando divergem?" },
        { tipo: "p", txt: "A resposta a essa pergunta divide a filosofia medieval em dois grandes períodos: a Patrística, que usa Platão para defender a fé, e a Escolástica, que usa Aristóteles para sistematizá-la. A fórmula clássica de Anselmo resume o espírito de toda a época: 'fides quaerens intellectum' — a fé que busca compreender." }
      ]},
      { h2: "2. PATRÍSTICA — DEFENDENDO O CRISTIANISMO COM FILOSOFIA GREGA", items: [
        { tipo: "p", txt: "Os 'Padres da Igreja' (Patres) eram teólogos dos primeiros séculos do Cristianismo que precisavam fazer três coisas ao mesmo tempo: explicar a doutrina cristã de forma coerente, defender essa doutrina contra as heresias que surgiam de todos os lados, e convencer o mundo greco-romano culto de que o Cristianismo não era superstição de gente simples." },
        { tipo: "p", txt: "Para isso, usaram a filosofia grega — especialmente o neoplatonismo de Plotino — como instrumento. A frase que resume essa relação é 'a filosofia é serva da teologia': a razão filosófica pode ser usada, mas sempre subordinada à fé. Se houver conflito, a fé prevalece." },
        { tipo: "h3", txt: "Santo Agostinho (354-430) — o maior pensador da Patrística" },
        { tipo: "p", txt: "Agostinho não chegou ao Cristianismo de forma simples. Passou pela seita maniqueísta (que acreditava em dois princípios eternos — bem e mal em combate eterno), pelo ceticismo e pelo neoplatonismo antes de se converter. Essa jornada intelectual marcou sua filosofia." },
        { tipo: "ul", items: [
          "ILUMINAÇÃO DIVINA: o conhecimento verdadeiro não vem dos sentidos (que só captam o mutável e particular) nem da razão sozinha — vem de Deus, que ilumina a mente humana. Base platônica: assim como o sol ilumina as coisas físicas, Deus ilumina as verdades eternas na mente.",
          "PRIVATIO BONI (o mal como ausência): contra o maniqueísmo, que dizia que o mal era uma substância eterna coexistente com o bem, Agostinho argumentou que o mal não tem existência própria — é privação de bem. Como a escuridão é ausência de luz, o mal é ausência de bem. Isso preserva a bondade de Deus: ele não criou o mal porque o mal não é uma coisa.",
          "DUAS CIDADES: a história humana é o drama de duas comunidades — a Cidade de Deus (os que amam a Deus acima de tudo) e a Cidade do Homem (os que amam a si mesmos acima de tudo). Não são Roma e Jerusalém geográficas — são comunidades espirituais que coexistem em qualquer sociedade.",
          "O TEMPO: nas Confissões, Agostinho faz uma análise fenomenológica do tempo que antecipa Husserl e Heidegger em 1500 anos. Se o passado não existe mais e o futuro ainda não existe, onde está o tempo? Na mente: o passado é memória, o presente é atenção, o futuro é expectativa. O tempo é 'distensio animi' — extensão da mente."
        ]}
      ]},
      { h2: "3. ESCOLÁSTICA — ORGANIZANDO A FÉ COM LÓGICA DE ARISTÓTELES", items: [
        { tipo: "p", txt: "No século XII, algo extraordinário aconteceu: os textos de Aristóteles foram traduzidos do árabe para o latim, chegando às recém-fundadas universidades medievais (Paris, Oxford, Bolonha). Aristóteles era o filósofo mais completo e sistemático da Antiguidade — tinha teorias sobre física, biologia, ética, política, lógica, metafísica. E era pagão." },
        { tipo: "p", txt: "O desafio da Escolástica: como usar Aristóteles sem que ele destrua o Cristianismo? A resposta de São Tomás de Aquino foi a mais brilhante." },
        { tipo: "h3", txt: "O Problema dos Universais — o debate filosófico central da Escolástica" },
        { tipo: "p", txt: "Quando dizemos 'cachorro', estamos nos referindo a uma coisa que existe realmente no mundo, ou apenas a uma palavra que criamos para agrupar animais parecidos? Os universais (conceitos gerais como 'humanidade', 'bondade', 'cachorro') existem na realidade ou apenas na mente?" },
        { tipo: "ul", items: [
          "REALISMO (Anselmo de Cantuária): os universais existem realmente, antes e independentemente das coisas individuais. 'Humanidade' é uma essência real que todos os humanos participam. Influência platônica.",
          "NOMINALISMO (Guilherme de Ockham): os universais são apenas nomes — convenções linguísticas que criamos para agrupar coisas semelhantes. Só existem indivíduos particulares. Perigoso para a teologia: como fundamentar a Trindade sem o realismo dos universais?",
          "CONCEITUALISMO (Abelardo): os universais existem como conceitos na mente, mas correspondem a algo real nas coisas. Solução de compromisso."
        ]},
        { tipo: "h3", txt: "São Tomás de Aquino (1225-1274) — a grande síntese" },
        { tipo: "p", txt: "Tomás realizou o que parecia impossível: sintetizou Aristóteles com o Cristianismo. Seu princípio fundamental: 'a graça não destrói a natureza, mas a aperfeiçoa'. Razão e fé não são inimigas — são complementares." },
        { tipo: "ul", items: [
          "CINCO VIAS: cinco provas racionais da existência de Deus, todas a posteriori (partem da experiência do mundo). Movimento → deve haver um Primeiro Motor. Causalidade → deve haver uma Causa Primeira. Contingência → deve haver um Ser Necessário. Graus de perfeição → deve haver um Ser Maximamente Perfeito. Finalidade → deve haver um Ordenador.",
          "LEI NATURAL: a razão humana participa da lei eterna de Deus. Todo ser humano, por sua natureza racional, tem acesso a princípios morais básicos (faça o bem, evite o mal). Fundamento do direito natural ocidental — de Tomás a Locke a Martin Luther King Jr."
        ]},
        { tipo: "h3", txt: "Anselmo de Cantuária — o argumento que não para de ser discutido" },
        { tipo: "p", txt: "Anselmo propôs o Argumento Ontológico: 'Deus é aquilo além do qual nada maior pode ser pensado.' Se Deus existisse só no pensamento, poderíamos imaginar algo ainda maior — um ser que existisse também na realidade. Mas isso contradiria a definição. Logo, Deus deve existir na realidade." },
        { tipo: "ex", txt: "KANT DERRUBOU O ARGUMENTO: existência não é uma propriedade que aumenta a perfeição. '100 reais que existem' e '100 reais que não existem' têm o mesmo conteúdo conceitual — a diferença está na relação com a realidade, não no conceito. Passar da definição conceitual para a existência real é um salto lógico ilegítimo." }
      ]}
    ],
    questoes: [
      { q: "'Tu nos fizeste para Ti, e inquieto está o nosso coração, enquanto não repousa em Ti.' Qual problema filosófico essa frase trata e como a solução agostiniana difere da aristotélica?", alts: ["Trata do problema do mal: Deus criou o sofrimento humano.", "Trata do problema do bem supremo (beatitudo/eudaimonia): Agostinho afirma que o desejo humano é estruturalmente orientado ao infinito — nenhum bem finito pode satisfazê-lo plenamente. Difere de Aristóteles, para quem a eudaimonia é alcançável na vida presente pela prática das virtudes, sem fundamento transcendente.", "Trata do problema do livre-arbítrio sem relação com a felicidade.", "Agostinho e Aristóteles têm a mesma concepção de felicidade.", "A frase é puramente poética, sem conteúdo filosófico."], g: "B", j: "Aristóteles: eudaimonia = florescimento das faculdades humanas na vida presente; é imanente, alcançável sem transcendência. Agostinho: a beatitudo é transcendente — o coração humano tem capacidade de desejo infinita, que só Deus (infinito) pode satisfazer. A inquietação é estrutural, não acidental. Essa diferença é a da passagem do teleologismo imanente (aristotélico) para o transcendente (agostiniano) — uma das maiores rupturas filosóficas da história." },
      { q: "O nominalismo de Guilherme de Ockham foi considerado ameaça à teologia medieval. Por que essa posição filosófica era teologicamente perigosa?", alts: ["Ockham era ateu e negava explicitamente a existência de Deus.", "Se universais são apenas nomes sem existência real, então entidades teológicas como a Trindade (que pressupõe uma 'natureza divina' universal partilhada por três Pessoas) perdem seu fundamento ontológico — a teologia medieval dependia do realismo dos universais para funcionar.", "Ockham defendia o protestantismo, incompatível com a Igreja Católica.", "O nominalismo era perigoso apenas em filosofia política.", "Ockham questionava apenas a autoridade do Papa, não a teologia."], g: "B", j: "A ameaça nominalista é estrutural: a Trindade pressupõe que Pai, Filho e Espírito Santo partilham uma 'natureza divina' — um universal real. Se universais são meros nomes, como pode haver três Pessoas 'num só Deus'? O mesmo vale para a Igreja como 'Corpo Místico' (coletividade real), os sacramentos como medições entre o particular e o universal, e as Ideias divinas de Agostinho. O nominalismo não atacava um dogma — atacava a arquitetura ontológica que sustentava todos os dogmas." },
      { q: "São Tomás de Aquino afirma 'a graça não destrói a natureza, mas a aperfeiçoa'. Qual é a implicação filosófica dessa afirmação para a relação entre razão e fé em seu sistema?", alts: ["A teologia é desnecessária, pois a razão natural já é perfeita.", "A razão natural (filosofia aristotélica) não é anulada pela revelação, mas aperfeiçoada: a razão pode conhecer verdades sobre Deus (existência, atributos naturais — as Cinco Vias), e a graça revela verdades que a razão sozinha não alcançaria (Trindade, Encarnação). Isso legitima o uso de Aristóteles dentro da teologia cristã.", "Tomás defende que a fé deve substituir completamente a razão.", "A frase é apenas retórica, sem implicações filosóficas precisas.", "Tomás rejeita o uso de Aristóteles por ser filósofo pagão."], g: "B", j: "O princípio 'gratia perficit naturam' é a chave do tomismo: razão e fé são ordens distintas e complementares — não há contradição entre elas (se houvesse, seria erro da razão, pois a verdade é una). A razão alcança os 'preâmbulos da fé' (existência de Deus, imortalidade da alma); a fé revela os 'mistérios' (Trindade, Encarnação). Isso legitima a 'baptização' de Aristóteles — usar o maior filósofo pagão a serviço da teologia cristã." },
      { q: "O Argumento Ontológico de Anselmo de Cantuária foi refutado por Kant. Em que consiste a refutação kantiana e por que é considerada decisiva?", alts: ["Kant demonstrou que Deus não existe.", "Kant argumentou que 'existência' não é predicado real: passa da definição conceitual para a existência real é salto lógico ilegítimo. Analisar um conceito nunca pode provar a existência do referente fora da mente.", "Kant aceitou o argumento e o aperfeiçoou.", "A refutação baseia-se na impossibilidade de formar conceitos de Deus.", "Kant refutou demonstrando que 'maior' é conceito culturalmente relativo."], g: "B", j: "Kant (Crítica da Razão Pura, 1781): 'existência' não acrescenta nada ao conceito. '100 táleres reais' e '100 táleres possíveis' têm o mesmo conteúdo conceitual — a diferença está na relação com a realidade, não no conceito. Aplicado a Anselmo: 'Deus que existe na realidade' não é conceitualmente maior do que 'Deus que existe só no pensamento' — existência não é uma propriedade que aumenta a perfeição. O argumento confunde análise conceitual com afirmação existencial — salto lógico inválido." },
      { q: "Qual diferença fundamental separa a Patrística da Escolástica em suas relações com a filosofia grega?", alts: ["A Patrística era aristotélica; a Escolástica, platônica.", "A Escolástica surgiu exclusivamente nos monastérios; a Patrística, nas universidades.", "A Patrística recorreu principalmente ao neoplatonismo (via Plotino) para defender a fé; a Escolástica usou o aristotelismo para sistematizar a teologia nas universidades medievais após a tradução de Aristóteles para o latim no século XII.", "A Patrística era pagã e a Escolástica, cristã.", "A Escolástica rejeitava toda a filosofia pagã."], g: "C", j: "Agostinho leu Plotino (neoplatonista), não Platão diretamente. O neoplatonismo oferecia ferramentas para a apologética cristã. A Escolástica emergiu após as grandes traduções de Aristóteles do árabe para o latim (séc. XII), especialmente via Averróis. A disponibilidade de Aristóteles transformou o campo: a lógica aristotélica tornou-se instrumento de sistematização teológica. Tomás é a síntese — não substituiu o platonismo pelo aristotelismo, mas os articulou." },
      { q: "A 'disputatio' foi o método central da Escolástica. Como esse método estrutura a Suma Teológica de São Tomás?", alts: ["A Suma é uma coleção de sermões sem estrutura formal.", "A Suma segue o formato da disputatio em cada artigo: questão (utrum — se é assim), objeções (videtur quod non — parece que não), argumento em contrário (sed contra), resposta determinativa (respondeo) e respostas às objeções. É a disputatio condensada em texto.", "A Suma rejeita as objeções sem respondê-las.", "O método é aristotélico puro, sem influência da tradição cristã.", "A Suma usa método agostiniano, não a disputatio escolástica."], g: "B", j: "Cada artigo da Suma tem estrutura formal precisa: (1) a questão ('Deus existe?'); (2) 'parece que não' — Tomás apresenta os melhores argumentos contrários com seriedade; (3) 'mas em sentido contrário' — argumento de autoridade; (4) resposta principal determinativa; (5) respostas específicas a cada objeção apresentada. Tomás nunca ignora os argumentos contrários — responde a cada um. Esse rigor formal é a marca da disputatio e o que confere à Suma sua autoridade intelectual duradoura." },
      { q: "O problema do 'mal' foi central para Agostinho. Compare as soluções 'privatio boni' de Agostinho e 'privatio boni debiti' de Tomás.", alts: ["Agostinho e Tomás têm a mesma solução sem diferenças.", "Agostinho: o mal é privação de ser e de bem — não tem existência própria, como a sombra é ausência de luz (refuta o maniqueísmo). Tomás refina: o mal é privação de um bem DEVIDO ('debiti') à natureza do ser — a cegueira é mal para quem deveria ver (humano), não para uma pedra. Tomás é mais preciso ao especificar que a privação é proporcional à natureza.", "Tomás rejeita a solução agostiniana propondo que o mal é substância.", "Agostinho defende que Deus criou o mal; Tomás, que é eterno.", "Nenhum dos dois oferece solução satisfatória."], g: "B", j: "O refinamento tomista é filosoficamente significativo: Agostinho diz 'o mal é privação de bem' — mas qualquer ausência seria mal (a pedra não tem visão: ela seria 'má'?). Tomás resolve: é mal apenas a ausência do bem que é proporcional à natureza do ser ('devido' a ela). A ausência de visão não é mal para a pedra (não lhe é devida), mas é mal para o humano (que deveria ver por sua natureza). Pequeno ajuste, grande precisão filosófica." },
      { q: "As 'Cinco Vias' de São Tomás para provar a existência de Deus são argumentos de que tipo e em que diferem do Argumento Ontológico de Anselmo?", alts: ["São argumentos a priori, como o de Anselmo, baseados apenas no conceito de Deus.", "São argumentos a posteriori (cosmológicos e teleológicos): partem da experiência do mundo (movimento, causalidade, contingência, graus de perfeição, finalidade) para concluir a existência de Deus. Diferem de Anselmo, que argumenta a priori a partir apenas do conceito de Deus.", "São argumentos de autoridade baseados nas Escrituras.", "São argumentos idênticos ao de Anselmo em fundamento.", "São argumentos fideístas que rejeitam a razão."], g: "B", j: "A distinção a priori/a posteriori é crucial: Anselmo parte do conceito ('aquilo além do qual nada maior pode ser pensado') e conclui a existência por análise conceitual — é argumento a priori, independente da experiência. Tomás parte da experiência do mundo (movimento, causas, contingência) e pergunta: o que explica isso? — argumento a posteriori. Kant aceitava argumentos cosmológicos como mais honestamente empíricos, ainda que os considerasse insuficientes." },
      { q: "A teoria agostiniana do tempo nas Confissões (Livro XI) é considerada precursora da fenomenologia moderna. Em que consiste essa originalidade?", alts: ["Agostinho simplesmente adotou a teoria do tempo de Aristóteles.", "Agostinho propõe que o tempo não existe objetivamente no mundo externo, mas é distensio animi (extensão da mente): o passado existe como memória, o presente como atenção e o futuro como expectativa — o tempo é subjetivo, existente na mente humana que experiencia a duração.", "Para Agostinho, o tempo é eterno e imutável como as verdades matemáticas.", "Agostinho nega completamente a existência do tempo.", "A teoria é idêntica à física moderna."], g: "B", j: "O argumento agostiniano é fenomenológico avant la lettre: se o passado não existe mais e o futuro ainda não existe, o 'presente' é um instante sem duração — como medimos o tempo? Agostinho responde: medimos estados da mente (memória da duração passada, atenção à duração presente, expectativa da duração futura). O tempo é 'distensio animi'. Husserl e Heidegger retomaram esse problema no século XX — 1500 anos depois de Agostinho formulá-lo pela primeira vez." },
      { q: "A escolástica tardia (séculos XIV–XV) foi alvo da crítica humanista renascentista. Qual era a crítica e em que medida era justa?", alts: ["Os humanistas consideravam a escolástica um método perfeito.", "A crítica humanista (especialmente Erasmo e Vives) era que a disputatio havia degenerado em verbalismo estéril — discussões sobre questões artificiais sem conexão com a vida humana. A crítica era justa em relação à escolástica tardia degenerada, mas injusta como crítica ao método tomista genuíno, que era rigoroso e substantivo.", "Os humanistas defendiam a escolástica contra a crítica protestante.", "A crítica era puramente estética, sem substância filosófica.", "A escolástica foi completamente abandonada após a crítica humanista."], g: "B", j: "Erasmo ('Elogio da Loucura') ridicularizava a escolástica tardia: debates sobre 'quantos anjos cabem na ponta de uma agulha' ou sobre se Cristo poderia ter se encarnado como pepino — questões artificiais desconectadas da experiência humana e do texto bíblico. Mas isso era crítica à escolástica decadente, não ao método em si. A Suma de Tomás demonstra que a disputatio genuína era instrumento de rigor intelectual incomparável. Os humanistas acertaram no alvo errado." },
      { q: "O conceito de 'lei natural' em São Tomás de Aquino fundamenta a tradição ocidental de direito natural. Como essa noção articula metafísica, ética e política?", alts: ["A lei natural em Tomás é puramente religiosa, sem implicações jurídicas.", "A lei natural é a participação racional humana na lei eterna divina: metafisicamente fundamentada no teleologismo aristotélico (cada ser tem uma natureza e um fim); eticamente, a razão descobre princípios morais básicos (faça o bem, evite o mal); politicamente, leis humanas injustas que contradizem a lei natural perdem a obrigatoriedade moral — fundamento da desobediência civil.", "Lei natural é idêntica à lei positiva.", "Tomás rejeita qualquer lei natural, fundando a ética na revelação.", "A lei natural tomista é culturalmente relativa."], g: "B", j: "A arquitetura tomista das leis: lei eterna (plano divino na mente de Deus) → lei natural (razão humana participando dessa lei) → lei humana (leis positivas derivando da natural) → lei divina (Escrituras para verdades supranaturais). A implicação política decisiva: uma lei humana injusta que contradiz a lei natural 'não é lei, mas corrupção da lei' (Suma, I-II, q.96, a.4). Esse princípio fundamenta toda a tradição de direito natural — de Tomás a Locke a Martin Luther King Jr." }
    ],
  },
  {
    id: "soc", icon: "👥", nome: "Sociologia",

    conteudo: [
      { h2: "CAPÍTULO 4 — FAMÍLIA E ESCOLA: COMO A SOCIEDADE SE REPRODUZ", items: [
        { tipo: "p", txt: "Como as pessoas aprendem a ser parte de uma sociedade? Como os valores, normas e comportamentos se transmitem de uma geração para a próxima? É para isso que servem as instituições sociais — estruturas estáveis que organizam o comportamento coletivo e garantem que a vida em sociedade funcione mesmo quando os indivíduos mudam." },
        { tipo: "p", txt: "Durkheim via as instituições como 'fatos sociais': maneiras de agir externas ao indivíduo e dotadas de poder coercitivo — elas existem independentemente de nós e nos moldam mesmo sem percebemos. Marx via as instituições como reflexo das relações de produção — ferramentas que a classe dominante usa para reproduzir sua dominação. Weber as via como cristalizações de ações sociais repetidas que ganham sentido e estabilidade." }
      ]},
      { h2: "A FAMÍLIA — PRIMEIRA ESCOLA DO SER HUMANO", items: [
        { tipo: "p", txt: "A família é a instituição mais universal da humanidade — presente em todas as culturas conhecidas, embora com formas extremamente variadas. É onde ocorre a socialização primária: a internalização mais profunda e duradoura de valores, linguagem, papéis de gênero e normas básicas de conduta." },
        { tipo: "p", txt: "Berger e Luckmann (A Construção Social da Realidade, 1966) mostraram que a socialização primária é a mais poderosa de todas — ela forma a identidade básica do indivíduo de uma maneira que as socializações posteriores dificilmente conseguem desfazer completamente. É por isso que os primeiros anos de vida importam tanto." },
        { tipo: "ul", items: [
          "TIPOS CONTEMPORÂNEOS: nuclear (pai-mãe-filhos), extensa (avós, tios), monoparental (um adulto responsável com filhos — majoritariamente mães), homoparental, reconstituída (após separação, com filhos de uniões anteriores).",
          "TRANSFORMAÇÕES RECENTES: queda da natalidade, aumento do divórcio, reconhecimento legal de uniões homoafetivas (STF, 2011), maior inserção feminina no mercado de trabalho, famílias 'LAT' (casais que não coabitam).",
          "FUNÇÃO IDEOLÓGICA: para Marx e Engels, a família burguesa nuclear não é 'natural' — é uma construção histórica que serve à reprodução da propriedade privada e da ordem capitalista. A divisão sexual do trabalho doméstico é uma das bases da opressão feminina."
        ]}
      ]},
      { h2: "A ESCOLA — ONDE A SOCIEDADE SE FABRICA", items: [
        { tipo: "p", txt: "A escola é a principal instituição de socialização secundária — ela complementa, amplia e às vezes contradiz o que a família ensinou. Mas a sociologia crítica descobriu algo perturbador sobre a escola: ela não apenas transmite conhecimento — ela reproduz desigualdades." },
        { tipo: "p", txt: "Pierre Bourdieu e Jean-Claude Passeron, em 'A Reprodução' (1970), fizeram uma análise que sacudiu a educação: a escola não é neutra. Ela valoriza e premia o 'capital cultural' das classes dominantes — o vocabulário, os gostos, as referências, as disposições corporais que os filhos de famílias ricas adquirem antes mesmo de entrar na escola. Ao tratar isso como 'mérito', a escola converte vantagem de classe em aparente capacidade individual." },
        { tipo: "ul", items: [
          "VIOLÊNCIA SIMBÓLICA: a imposição dos valores das classes dominantes como se fossem universais, sem que os dominados reconheçam isso como violência. É mais eficaz que a coerção física porque os próprios dominados a interiorizam e participam de sua própria dominação — atribuindo seus fracassos a si mesmos, não às estruturas.",
          "CURRÍCULO OCULTO (Philip Jackson, 1968): além do currículo formal (matemática, história...), a escola ensina implicitamente disciplina, pontualidade, aceitação da autoridade, conformidade com regras — valores funcionais para o mercado de trabalho e para a manutenção da ordem social.",
          "AIE (Althusser): para o filósofo marxista Louis Althusser, a escola é um 'Aparelho Ideológico de Estado' — ao lado da família, da Igreja e da mídia, ela produz sujeitos adaptados às relações de produção capitalistas, garantindo sua reprodução sem necessidade de coerção física."
        ]}
      ]},
      { h2: "CAPÍTULO 5 — DESIGUALDADE, POBREZA E CONFLITO", items: [
        { tipo: "h3", txt: "Desigualdade Social — o que é e como se mede" },
        { tipo: "p", txt: "O Brasil tem um dos maiores índices de desigualdade do mundo. O Coeficiente de Gini (que vai de 0, igualdade perfeita, a 1, desigualdade absoluta) historicamente acima de 0,5 coloca o país entre os mais desiguais do planeta. Mas a desigualdade não é só econômica." },
        { tipo: "ul", items: [
          "MARX: a desigualdade é estrutural — resultado da exploração. O capitalista extrai mais-valia do trabalhador (paga menos do que o trabalho produz) e acumula capital. A desigualdade não é acidente — é o mecanismo central do capitalismo.",
          "WEBER: três dimensões independentes de estratificação. CLASSE (posição econômica), STATUS (prestígio e honra social — pode ser alto com renda baixa, como um professor em certas culturas) e PODER POLÍTICO (capacidade de influenciar decisões coletivas). As três dimensões podem dissociar-se — daí a maior complexidade analítica de Weber.",
          "FUNCIONALISMO (Davis-Moore, 1945): a desigualdade é funcionalmente necessária. Posições mais importantes precisam ser mais remuneradas para atrair os mais capazes. Crítica: pressupõe que só os mais capazes chegam às posições mais remuneradas — ignora as barreiras estruturais de raça, classe e gênero."
        ]},
        { tipo: "h3", txt: "Pobreza — o que é e o que não é" },
        { tipo: "ul", items: [
          "ABSOLUTA: privação do mínimo para sobrevivência física — alimentação, abrigo, saúde básica.",
          "RELATIVA: abaixo do padrão médio de vida da sociedade. Alguém pode não passar fome mas ser pobre relativamente — sem acesso a lazer, tecnologia, educação de qualidade.",
          "MULTIDIMENSIONAL (Amartya Sen): a renda não captura tudo. Privações em saúde, educação, saneamento, participação política e segurança são formas de pobreza que o dinheiro sozinho não resolve. O IPM (Índice de Pobreza Multidimensional) do PNUD mede essas dimensões."
        ]},
        { tipo: "h3", txt: "Conflito Social — o motor das transformações" },
        { tipo: "ul", items: [
          "MARX: o conflito de classes é o motor da história. A contradição entre burguesia (detentora dos meios de produção) e proletariado (vendedor de força de trabalho) é irresolvível dentro do capitalismo — tende à revolução.",
          "DAHRENDORF: o conflito não se limita às classes econômicas. Toda organização hierárquica tem quem manda e quem obedece — e isso gera conflito. Escolas, igrejas, famílias, burocracia estatal têm seus próprios conflitos de autoridade.",
