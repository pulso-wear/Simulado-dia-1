<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudos 3.º Ano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;1,400&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2435;
    --border: #2a3045;
    --text: #e8eaf0;
    --muted: #7a82a0;
    --accent: #5b8dee;
    --accent-dim: rgba(91,141,238,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #f55f5f;
    --red-dim: rgba(245,95,95,0.12);
    --yellow: #f5c542;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .nav-list { padding: 8px 8px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-score {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 20px;
    color: var(--muted);
  }
  .nav-item.active .nav-score { background: var(--accent-dim); }
  .nav-score.perfect { background: var(--green-dim); color: var(--green); }

  /* ── MAIN ── */
  #main {
    flex: 1;
    padding: 32px 28px;
    max-width: 820px;
    overflow-y: auto;
  }

  .subject-title {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subject-subtitle {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-color: var(--accent); }

  /* ── CONTEÚDO ── */
  .content { display: none; }
  .content.visible { display: block; }

  .section-block { margin-bottom: 28px; }

  .section-h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--yellow);
    margin: 16px 0 8px;
  }
  .section-p { color: var(--text); margin-bottom: 10px; }

  .bullet-list { list-style: none; padding: 0; margin: 8px 0; }
  .bullet-list li {
    padding: 4px 0 4px 20px;
    position: relative;
    color: var(--text);
    font-size: 14px;
  }
  .bullet-list li::before {
    content: '›';
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: 700;
  }
  .example {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--muted);
    margin: 6px 0;
    font-style: italic;
  }

  /* ── QUESTÕES ── */
  .question-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-block.answered-correct { border-color: var(--green); }
  .question-block.answered-wrong { border-color: var(--red); }

  .question-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .alternatives { display: flex; flex-direction: column; gap: 8px; }

  .alt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .alt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .alt-btn:disabled { cursor: default; }

  .alt-letter {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    color: var(--muted);
    margin-top: 1px;
  }

  .alt-btn.correct { border-color: var(--green); background: var(--green-dim); }
  .alt-btn.correct .alt-letter { color: var(--green); }
  .alt-btn.wrong { border-color: var(--red); background: var(--red-dim); }
  .alt-btn.wrong .alt-letter { color: var(--red); }
  .alt-btn.reveal-correct { border-color: var(--green); background: var(--green-dim); opacity: 0.7; }
  .alt-btn.reveal-correct .alt-letter { color: var(--green); }

  .feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-dim); border: 1px solid rgba(62,207,142,0.3); }
  .feedback.wrong { background: var(--red-dim); border: 1px solid rgba(245,95,95,0.3); }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 13px; }
  .feedback.correct strong { color: var(--green); }
  .feedback.wrong strong { color: var(--red); }

  /* ── SCORE BAR ── */
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .score-label { font-size: 13px; color: var(--muted); }
  .score-count { font-size: 22px; font-weight: 700; color: var(--text); }
  .score-count span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; }
  .progress-bar-fill {
    height: 6px;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .reset-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text); }



  /* ── DIAGRAMA ── */
  .diagram {
    background: #0d1117;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
    margin: 10px 0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--accent);
    white-space: pre;
    overflow-x: auto;
    line-height: 1.6;
  }


  /* ── SVG DIAGRAMA ── */
  .svg-diagram {
    margin: 14px 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .svg-diagram svg {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── NOTAS ── */
  .notes-wrap { display: flex; flex-direction: column; gap: 12px; }
  .notes-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .notes-title { font-size: 14px; font-weight: 700; color: var(--accent); }
  .notes-saved { font-size: 12px; color: var(--muted); transition: color 0.3s; }
  .notes-area {
    width: 100%; min-height: 380px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 14px; line-height: 1.7; resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); font-style: italic; }
  .notes-actions { display: flex; gap: 10px; }
  .notes-btn {
    padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .notes-btn.save { background: var(--accent); color: #fff; border-color: var(--accent); }
  .notes-btn.save:hover { opacity: 0.85; }
  .notes-btn.clear { background: transparent; color: var(--muted); }
  .notes-btn.clear:hover { color: var(--red); border-color: var(--red); }


  /* ── CANVAS PENCIL ── */
  .mode-switch { display: flex; gap: 8px; margin-bottom: 4px; }
  .mode-btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .mode-btn:hover { color: var(--text); border-color: var(--text); }
  .mode-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .canvas-toolbar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
  }
  .tool-btn {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; font-size: 18px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .tool-btn:hover { background: var(--surface2); }
  .tool-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
  .tool-label { font-size: 12px; color: var(--muted); }

  .notes-canvas {
    width: 100%; border-radius: 10px; border: 1px solid var(--border);
    display: block; touch-action: none; cursor: crosshair;
  }

  /* ── MOBILE ── */
  #menu-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(91,141,238,0.4);
  }

  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      bottom: 0;
      z-index: 50;
      transition: left 0.25s ease;
    }
    #sidebar.open { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.5); }
    #main { padding: 20px 16px; }
    #menu-toggle { display: flex; align-items: center; justify-content: center; }
    .subject-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header">
      <h1>Estudos<br>3.º Ano</h1>
      <p>Selecione uma matéria</p>
    </div>
    <div class="nav-list" id="nav-list"></div>
  </nav>

  <main id="main"></main>
</div>

<button id="menu-toggle" onclick="toggleMenu()">☰</button>

<script>
// ═══════════════════════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════════════════════

const MATERIAS = [
  {
    id: "port", icon: "📝", nome: "Língua Portuguesa",
    topico: "Aposto, Vocativo e Funções do 'Que'",
    conteudo: [
      { h2: "1. APOSTO — quando uma frase explica a outra", items: [
        { tipo: "p", txt: "Imagine que você apresenta alguém: 'Este é João, meu melhor amigo.' A expressão 'meu melhor amigo' não muda a estrutura da frase — ela apenas acrescenta uma informação sobre João. Isso é um aposto: um termo que se 'cola' a outro para explicar, nomear, enumerar ou resumir." },
        { tipo: "p", txt: "A grande sacada do aposto é que você pode tirá-lo da frase e ela continua correta. 'Este é João.' — perfeito. O aposto é bônus, não estrutura." },
        { tipo: "h3", txt: "Os 5 tipos que caem em prova" },
        { tipo: "ul", items: [
          "EXPLICATIVO — o mais cobrado. Vem entre vírgulas, travessões ou parênteses e explica o termo anterior. Ex.: 'Brasília, capital do Brasil, foi inaugurada em 1960.' Pode tirar? Sim. A frase funciona sem.",
          "ENUMERATIVO — lista os elementos de um conjunto. Geralmente vem depois de dois-pontos. Ex.: 'Dois vícios o destruíram: o álcool e o jogo.' O conjunto é 'dois vícios'; a lista é o aposto.",
          "RESUMITIVO — é o inverso do enumerativo: vem DEPOIS de uma lista e a resume. Sempre introduzido por tudo, nada, ninguém, tudo isso. Ex.: 'Honra, família, dinheiro — tudo se foi.' Dica: se vem antes, é enumerativo; se resume o que veio antes, é resumitivo.",
          "ESPECIFICATIVO — o único SEM pontuação. Restringe o sentido de um substantivo genérico. Ex.: 'O escritor Clarice Lispector revolucionou a prosa brasileira.' Sem vírgula, 'Clarice Lispector' especifica qual escritor.",
          "DISTRIBUTIVO — distribui características entre os elementos de um conjunto. Ex.: 'Dois perfis dividiam a sala: uns estudiosos, outros dispersos.'"
        ]},
        { tipo: "ex", txt: "⚠️ ARMADILHA CLÁSSICA: 'O filósofo Sócrates não deixou escritos.' (especificativo — sem vírgula) VS 'Sócrates, o filósofo grego, não deixou escritos.' (explicativo — com vírgula). Mesma ideia, funções diferentes." }
      ]},
      { h2: "2. VOCATIVO — chamando quem vai ouvir", items: [
        { tipo: "p", txt: "O vocativo é o termo mais solitário da gramática: ele não tem função dentro da oração. Não é sujeito, não é objeto, não é complemento. É como se fosse uma chamada antes de falar: você primeiro chama a pessoa, depois diz o que tem a dizer." },
        { tipo: "p", txt: "Por isso ele é sempre separado por vírgula — porque ele está fora da oração. E essa vírgula não é opcional. A frase 'Vamos comer, crianças!' significa uma coisa completamente diferente de 'Vamos comer crianças!' — a vírgula salva vidas (das crianças)." },
        { tipo: "ul", items: [
          "Pode aparecer em três posições: no início ('Professora, tenho uma dúvida.'), no meio ('Tenho, professora, uma dúvida.') ou no fim ('Tenho uma dúvida, professora.').",
          "Pode ser qualquer coisa: nome ('Ana, vem cá.'), pronome de tratamento ('Senhor, aguarde.'), adjetivo ('Querida, escuta.'), até oração ('Quem me dera, vem ver isso!').",
          "Na literatura, o vocativo se dirige a seres inanimados — isso se chama APÓSTROFE. 'Ó mar salgado, quanto do teu sal são lágrimas de Portugal!' (Pessoa). Mar não vai responder, mas o efeito poético é poderoso."
        ]},
        { tipo: "ex", txt: "TESTE RÁPIDO: Como saber se é vocativo? Pergunte: esse termo está sendo chamado para ouvir o que vem depois? Se sim, é vocativo. 'Meu Deus, que calor!' — Deus está sendo invocado. Vocativo." }
      ]},
      { h2: "3. AS MÚLTIPLAS FACES DO 'QUE'", items: [
        { tipo: "p", txt: "O 'que' é provavelmente a palavra mais versátil do português. Dependendo do contexto, ela pode ser pronome, conjunção, advérbio, partícula ou interjeição. O segredo para identificá-la? Sempre teste a substituição." },
        { tipo: "h3", txt: "As funções e como testar cada uma" },
        { tipo: "ul", items: [
          "PRONOME RELATIVO — retoma um substantivo anterior (o antecedente) e exerce função dentro da oração seguinte. Teste: substitua por 'o qual / a qual'. 'O livro que li' → 'O livro o qual li' ✓. Funciona? É relativo.",
          "CONJUNÇÃO INTEGRANTE — introduz oração que funciona como substantivo (sujeito, objeto, predicativo). Teste: substitua por 'o fato de'. 'Espero que você venha' → 'Espero o fato de você vir' ✓.",
          "PARTÍCULA EXPLETIVA (de realce) — não tem função alguma. Teste: retire-o. 'Há anos que não chove' → 'Há anos não chove' ✓. O sentido não mudou? É expletivo.",
          "ADVÉRBIO DE INTENSIDADE — aparece antes de adjetivo ou advérbio e intensifica. Teste: substitua por 'quão'. 'Que bela tarde!' → 'Quão bela é esta tarde!' ✓.",
          "PRONOME INTERROGATIVO — aparece em perguntas diretas ou indiretas. 'Que horas são?' / 'Não sei que dizer.'",
          "CONJUNÇÃO COORDENATIVA ADITIVA — equivale a 'e' ou 'ora'. Aparece em estruturas paralelas. 'Ora ri, que chora' = 'ora ri, ora chora'.",
          "INTERJEIÇÃO — expressa emoção isolada. 'Que! Você está aqui?'"
        ]},
        { tipo: "ex", txt: "MACETE DOS 3 TESTES: (1) Troca por 'o qual'? → Relativo. (2) Tira sem perder sentido? → Expletivo. (3) Troca por 'o fato de'? → Integrante. Se nenhum funcionar, analise o contexto." }
      ]}
    ],
    questoes: [
  { q: "Leia: 'O Pantanal, maior planície alagável do mundo, enfrenta devastação.' Qual alternativa apresenta aposto do MESMO tipo que o destacado?", alts: ["O escritor Machado de Assis nasceu no Rio de Janeiro em 1839.", "Tudo se perdeu naquela noite: a casa, os livros e as memórias afetivas.", "Ela cultivava um único sonho: viver em paz longe das cidades grandes.", "A Amazônia — pulmão do planeta — precisa de proteção urgente e contínua.", "Dois países firmaram o acordo histórico: Brasil e Argentina em Brasília."], g: "D", j: "O aposto 'maior planície alagável do mundo' é explicativo — vem entre vírgulas e acrescenta informação sem restringir. Em B, 'pulmão do planeta' entre travessões cumpre a mesma função: explica 'Amazônia' sem ser estruturalmente necessário. A tem aposto especificativo (sem pontuação). C e E têm aposto enumerativo. D tem aposto enumerativo com elemento único." },

  { q: "Analise os períodos e identifique a sequência correta das funções do 'que': I. 'Que ótima ideia você teve!' — II. 'Não sei que dizer diante disso.' — III. 'O problema que enfrentamos é grave.' — IV. 'Há meses que não chove no sertão.'", alts: ["pronome exclamativo / conjunção integrante / pronome relativo / partícula expletiva", "pronome indefinido / pronome interrogativo / conjunção integrante / partícula expletiva", "interjeição / pronome interrogativo / pronome relativo / conjunção subordinativa", "advérbio de intensidade / pronome indefinido / pronome relativo / partícula expletiva", "advérbio de intensidade / conjunção integrante / pronome relativo / conjunção aditiva"], g: "D", j: "I: 'Que ótima' intensifica o adjetivo — advérbio de intensidade (equivale a 'quão ótima'). II: 'que dizer' = 'o que dizer' — pronome indefinido com sentido vago. III: 'que enfrentamos' retoma 'problema' como objeto direto — pronome relativo (substituível por 'o qual'). IV: pode ser retirado sem perda de sentido — partícula expletiva." },

  { q: "'Não há quem não saiba que a educação transforma vidas.' Classifique o segundo 'que' (em 'que a educação transforma'):", alts: ["pronome relativo com antecedente implícito 'coisa que'", "partícula expletiva que pode ser removida sem alterar o sentido", "conjunção coordenativa explicativa equivalente a 'pois' ou 'porque'", "pronome interrogativo em pergunta indireta introduzida por 'quem'", "conjunção subordinativa integrante introduzindo oração objetiva direta de 'saber'"], g: "E", j: "O verbo 'saber' é transitivo direto e exige objeto. O 'que' introduz a oração que funciona como esse objeto direto oracional ('que a educação transforma vidas') — é conjunção subordinativa integrante, não pronome relativo, pois não retoma nenhum antecedente expresso na frase." },

  { q: "Em qual frase a AUSÊNCIA da vírgula provoca mudança de sentido mais grave?", alts: ["'Vamos alimentar as crianças mãe!' vs 'Vamos alimentar as crianças, mãe!'", "'Maria, sua redação ficou muito boa desta vez.'", "'Professor, pode começar a aula agora mesmo.'", "'Tenho, professora, uma dúvida importante.'", "'Atenção, passageiros, o voo está atrasado.'"], g: "A", j: "Em 'Vamos alimentar as crianças, mãe!', a vírgula indica que 'mãe' é vocativo — alguém chama a mãe para ajudar a alimentar as crianças. Sem a vírgula, 'mãe' torna-se adjunto de 'crianças', sugerindo que serão alimentadas crianças-mãe — sentido absurdo. Nas outras frases, a vírgula pode ser omitida ou deslocada sem criar absurdo semântico comparável." },

  { q: "No período 'No caminho havia um obstáculo intransponível, a pedra', o termo 'a pedra' exerce função de:", alts: ["aposto especificativo, pois restringe 'obstáculo' sem pontuação adicional", "aposto explicativo, pois identifica com precisão aquele obstáculo específico", "vocativo que interpela simbolicamente o leitor sobre o tema do texto", "adjunto adnominal de 'obstáculo', indicando qual tipo de obstáculo é", "predicativo do sujeito 'obstáculo', indicando uma característica permanente"], g: "B", j: "O aposto explicativo identifica e individualiza o termo anterior — não restringe uma classe ('especificativo'), mas nomeia aquele referente específico. 'A pedra' diz exatamente qual obstáculo era. A vírgula antes confirma: é explicativo. O especificativo, ao contrário, não leva pontuação e serve para distinguir entre múltiplos membros de uma classe." },

  { q: "Leia: 'Rubião fitou o espelho, o vasto espelho do seu quarto.' O aposto 'o vasto espelho do seu quarto' classifica-se como:", alts: ["resumitivo, pois sintetiza os elementos descritos anteriormente no texto", "explicativo, pois retoma 'espelho' acrescentando informação individualizadora", "especificativo, pois restringe qual espelho sem o uso de pontuação", "distributivo, pois distribui características entre diferentes objetos do quarto", "enumerativo, pois lista os elementos que compõem a cena descrita"], g: "B", j: "O aposto explicativo retoma 'espelho' e acrescenta informação precisa: 'vasto' (tamanho) e 'do seu quarto' (localização). A repetição do artigo definido e a vírgula são marcas formais do aposto explicativo. O especificativo não leva vírgula e serve para distinguir entre múltiplos membros de uma classe — o que não é o caso aqui, já que há apenas um espelho mencionado." },

  { q: "'Tudo lhe fugia: a juventude, a fortuna, os amigos.' O trecho após os dois-pontos é aposto:", alts: ["enumerativo, pois especifica os elementos concretos que integram o conjunto 'tudo'", "explicativo, pois esclarece o sentido abstrato da palavra 'tudo' com exemplos", "especificativo, pois restringe o alcance de 'tudo' sem usar pontuação", "resumitivo, pois resume o sentido do período anterior com palavra totalizadora", "distributivo, pois distribui os elementos pelos diferentes sujeitos da frase"], g: "A", j: "O enumerativo especifica os elementos que compõem o conjunto indicado pelo termo anterior. 'Tudo' é o conjunto; 'a juventude, a fortuna, os amigos' é a enumeração dos seus componentes. O resumitivo faz o movimento INVERSO: vem APÓS uma enumeração para condensá-la com 'tudo', 'nada', 'ninguém' etc." },

  { q: "Identifique a frase em que o 'que' funciona como CONJUNÇÃO COORDENATIVA ADITIVA:", alts: ["'O caminho que escolhemos foi longo e difícil.'", "'Espero que tudo se resolva o mais breve possível.'", "'Não sei que rumo tomar diante da situação atual.'", "'Ora ri, que chora — ninguém o entende direito.'", "'Há tanto tempo que não nos encontramos pessoalmente.'"], g: "D", j: "Em 'Ora ri, que chora', o 'que' equivale a 'ora' — coordena dois membros paralelos ('ora ri, ora chora'). É conjunção coordenativa aditiva com valor de alternância. A: pronome interrogativo. B: pronome relativo (substituível por 'o qual'). D: conjunção integrante (substituível por 'o fato de'). E: partícula expletiva (pode ser removida sem perda de sentido)." },

  { q: "Analise: 'Os dois irmãos — Pedro, o mais velho, e Paulo, o caçula — partiram juntos.' Os apostos 'o mais velho' e 'o caçula' são:", alts: ["distributivos, pois distribuem uma característica distinta a cada elemento do conjunto", "enumerativos, pois enumeram os diferentes membros da família mencionada", "resumitivos, pois sintetizam as características listadas anteriormente no período", "especificativos, pois restringem sem pontuação o sentido dos nomes próprios", "explicativos, pois cada um acrescenta informação sobre o irmão ao qual se refere"], g: "A", j: "O aposto distributivo combina enumeração e distribuição de predicados: 'Pedro' recebe 'o mais velho'; 'Paulo' recebe 'o caçula'. Cada elemento do conjunto recebe uma característica específica e diferente. Difere do explicativo puro (que apenas acrescenta informação a um único referente) por distribuir atributos distintos entre múltiplos elementos." },

  { q: "Em qual alternativa o 'que' NÃO é pronome relativo?", alts: ["'A cidade que visitei ficou para sempre na memória afetiva.'", "'O livro que você indicou está esgotado nas livrarias.'", "'O argumento que ela apresentou foi convincente e bem fundamentado.'", "'Há muitos anos que não frequento o teatro por falta de tempo.'", "'A proposta que recusaram era justa e beneficiava a todos.'"], g: "D", j: "Em C, 'que não frequento o teatro' não tem antecedente expresso a ser retomado — 'anos' não funciona como antecedente desse 'que'. Trata-se de partícula expletiva: remove-se sem perda de sentido ('Há muitos anos não frequento o teatro'). Nas demais, o 'que' retoma claramente um substantivo anterior e exerce função sintática dentro da oração adjetiva." },

  { q: "Leia: 'Professor, o senhor, mestre desta turma há vinte anos, sempre nos inspirou.' Identifique corretamente os termos destacados:", alts: ["'Professor' é aposto de 'o senhor'; 'mestre desta turma' é vocativo paralelo", "'Professor' é sujeito elíptico; 'mestre desta turma' é predicativo do sujeito 'o senhor'", "'Professor' e 'mestre desta turma' são dois vocativos coordenados por vírgula", "'Professor' é vocativo; 'mestre desta turma há vinte anos' é aposto explicativo de 'o senhor'", "'Professor' é aposto especificativo sem pontuação do sujeito 'o senhor'"], g: "D", j: "'Professor' vem antes da primeira vírgula, chama o interlocutor sem integrar sujeito ou predicado — é vocativo. 'Mestre desta turma há vinte anos' vem entre vírgulas após 'o senhor' (sujeito), acrescenta informação individualizadora — é aposto explicativo. Os dois termos têm funções completamente distintas: um chama, o outro explica." }
],

  {
    id: "hist1", icon: "🏛️", nome: "História 1",
    topico: "Governo Joanino e Primeiro Reinado",
    conteudo: [
      { h2: "1. O GOVERNO JOANINO (1808–1821)", items: [
        { tipo: "p", txt: "Em novembro de 1807, Napoleão Bonaparte deu a Portugal um ultimato: feche os portos para a Inglaterra ou será invadido. D. João VI estava espremido: obedecer significava perder o aliado britânico que protegia o Atlântico; resistir significava invasão. A solução foi inédita na história: transferir a sede do Império para a colônia." },
        { tipo: "p", txt: "Em 29 de novembro de 1807, com a névoa ainda cobrindo Lisboa, uma frota de 15 navios carregou a família real, nobres, funcionários, arquivos e até a biblioteca real — cerca de 15 mil pessoas — rumo ao Brasil. Para a colônia, era uma transformação que ninguém havia imaginado possível." },
        { tipo: "h3", txt: "Principais medidas e seus impactos" },
        { tipo: "ul", items: [
          "ABERTURA DOS PORTOS (jan. 1808): primeiro ato ao desembarcar na Bahia. Acabou com o exclusivo colonial — a obrigação de o Brasil comerciar só com Portugal. A Inglaterra, que escoltara os navios, foi a principal beneficiada. Primeiro passo para a independência, mesmo sem intenção.",
          "TRATADOS DE 1810: tarifas de 15% para produtos britânicos (vs 16% para os próprios portugueses e 24% para os demais). O Brasil entrou na órbita econômica britânica. Isso gerou a chamada 'desindustrialização precoce': sem proteção tarifária, manufaturas locais não conseguiam competir.",
          "BANCO DO BRASIL (1808): primeira instituição financeira do país. Necessário para financiar o Estado transplantado.",
          "IMPRENSA RÉGIA (1808): primeiro jornal impresso no Brasil — a Gazeta do Rio de Janeiro. Antes disso, a imprensa era proibida na colônia.",
          "MISSÃO ARTÍSTICA FRANCESA (1816): Debret (cotidiano e escravidão), Grandjean de Montigny (arquitetura). Paradoxo: o Brasil foi modernizado culturalmente por franceses — os mesmos que haviam forçado a fuga de D. João.",
          "ELEVAÇÃO A REINO UNIDO (1815): Brasil equiparado juridicamente a Portugal. Tornou ilegítima qualquer recolonização futura — o que as Cortes tentariam em 1820.",
          "REVOLUÇÃO DO PORTO (1820): revolução liberal em Portugal exigiu o retorno de D. João e a recolonização do Brasil. Foi exatamente essa ameaça que empurrou as elites brasileiras — até então satisfeitas — para a independência."
        ]},
        { tipo: "h3", txt: "O paradoxo joanino" },
        { tipo: "ex", txt: "D. João satisfez as elites coloniais (sem pacto opressivo), adiando a independência — mas ao criar banco, imprensa, academia e burocracia, montou o arcabouço institucional do futuro Estado. Quanto mais modernizava, mais tornava a independência viável e inevitável." }
      ]},

      { h2: "2. O PROCESSO DE INDEPENDÊNCIA (1820–1822)", items: [
        { tipo: "p", txt: "A independência do Brasil não foi um evento isolado — foi um processo com várias etapas que envolveu cálculos políticos, pressões externas e interesses econômicos das elites coloniais. Não houve guerra prolongada, nem mobilização popular ampla." },
        { tipo: "ul", items: [
          "DIA DO FICO (9/1/1822): as Cortes de Lisboa exigiram o retorno de D. Pedro a Portugal. A elite brasileira, temendo perder as conquistas joaninas, mobilizou-se. D. Pedro declarou 'Fico!'. Primeiro ato concreto de ruptura.",
          "GRITO DO IPIRANGA (7/9/1822): ao receber correspondências das Cortes revogando suas decisões, D. Pedro proclamou a independência às margens do Ipiranga em São Paulo. 'Independência ou Morte!'",
          "RECONHECIMENTO (1825): Portugal só reconheceu em 1825, mediante £2 milhões de indenização — emprestados da própria Inglaterra. O Brasil nascia endividado."
        ]},
        { tipo: "h3", txt: "Por que foi uma independência conservadora?" },
        { tipo: "ul", items: [
          "Escravidão mantida — o Brasil foi o último país do Ocidente a abolir (1888).",
          "Latifúndio intacto — a estrutura fundiária colonial não foi tocada.",
          "Monarquia preservada — diferente das repúblicas hispano-americanas.",
          "Liderada por e para a elite — sem participação das camadas populares.",
          "D. Pedro I era Bragança — membro da própria dinastia colonial. A ruptura foi política com Portugal, não social."
        ]}
      ]},

      { h2: "3. PRIMEIRO REINADO (1822–1831)", items: [
        { tipo: "p", txt: "D. Pedro I herdou um país enorme, mal integrado, economicamente dependente e com uma elite que queria autonomia sem abrir mão dos privilégios. Seu governo foi marcado por uma contradição central: era o símbolo da independência e ao mesmo tempo um Bragança." },
        { tipo: "h3", txt: "Constituição de 1824 — outorgada, não constituinte" },
        { tipo: "p", txt: "D. Pedro convocou uma Assembleia Constituinte em 1823, mas a dissolveu por considerá-la radical demais. Depois, impôs sua própria Constituição — sem aprovação parlamentar. Características principais:" },
        { tipo: "ul", items: [
          "QUATRO PODERES: Executivo, Legislativo, Judiciário e o PODER MODERADOR — exclusivo do imperador. Permitia dissolver o Parlamento, nomear senadores vitalícios e suspender magistrados. Era absolutismo disfarçado de constitucionalismo.",
          "VOTO CENSITÁRIO: por renda — excluía pobres, mulheres e escravizados. Sufrágio 'universal' era mito.",
          "SENADO VITALÍCIO: D. Pedro escolhia senadores de lista tríplice — controle total sobre o Legislativo.",
          "MAIS LONGEVA: vigeu de 1824 a 1891 — 67 anos. A mais duradoura da história brasileira."
        ]},
        { tipo: "h3", txt: "Crises do Primeiro Reinado" },
        { tipo: "ul", items: [
          "CONFEDERAÇÃO DO EQUADOR (1824): revolta republicano-federalista no Nordeste, liderada por Frei Caneca em Pernambuco. Propunha república federalista inspirada nos EUA. D. Pedro reprimiu com violência e mandou executar Frei Caneca.",
          "GUERRA DA CISPLATINA (1825–1828): tentativa de manter o atual Uruguai sob domínio brasileiro. Terminou em derrota — Uruguai tornou-se país independente. Custo enorme, resultado humilhante, desgaste militar e político graves.",
          "QUESTÃO SUCESSÓRIA PORTUGUESA: com a morte de D. João VI (1826), D. Pedro herdou o trono português. Isso gerou suspeita: ele queria reunificar o Império? A elite brasileira desconfiou.",
          "NOITE DAS GARRAFADAS (1831): conflito entre brasileiros e portugueses no Rio de Janeiro. Sinalizou o esgotamento do governo.",
          "ABDICAÇÃO (7/4/1831): pressionado por todos os lados, D. Pedro abdicou em favor do filho de 5 anos. Começava o Período Regencial — a fase mais turbulenta do século XIX."
        ]},
        { tipo: "ex", txt: "POR QUE A CRISE ERA ESTRUTURAL: O Poder Moderador gerava ressentimento permanente. O centralismo antagonizava as elites regionais. A Constituição outorgada nunca foi legitimada. A Confederação do Equador, a Cisplatina e a Noite das Garrafadas foram sintomas — não causas — de um modelo politicamente insustentável." }
      ]}
    ],
    questoes: [
  { q: "A Abertura dos Portos (1808) é considerada o 'primeiro ato de emancipação' do Brasil porque:", alts: ["rompeu com o pacto colonial ao permitir comércio direto com outras nações", "transferiu o controle administrativo das províncias para as elites coloniais", "declarou formalmente a independência do Brasil de Portugal ainda em 1808", "expulsou os comerciantes portugueses e entregou o mercado à burguesia brasileira", "criou o Banco do Brasil e financiou a infraestrutura do futuro Estado nacional"], g: "A", j: "O pacto colonial impunha que toda produção colonial passasse pela metrópole. A Abertura dos Portos rompeu esse monopólio, permitindo comércio direto — sobretudo com a Inglaterra. Foi o primeiro passo para a autonomia econômica do Brasil, mesmo sem intenção declarada de emancipação política." },

  { q: "O historiador José Murilo de Carvalho chama a independência brasileira de 'revolução conservadora feita de cima para baixo'. Qual das afirmações é INCOMPATÍVEL com essa interpretação?", alts: ["A monarquia foi mantida como garantia de unidade territorial e hierarquia social.", "A estrutura fundiária colonial foi preservada sem alterações sob o Império.", "Setores populares participaram amplamente das decisões sobre o modelo político.", "A independência foi liderada por membros da própria dinastia colonial, os Bragança.", "A escravidão foi mantida intacta após a proclamação da independência em 1822."], g: "C", j: "A interpretação de Carvalho afirma exatamente o oposto: os setores populares — escravizados, índios, camponeses — foram excluídos do processo decisório. A independência foi conduzida pelas elites sem mobilização das camadas subalternas. Isso é o que a define como 'feita de cima para baixo'." },

  { q: "Sobre a Constituição de 1824, analise: I. Estabeleceu o voto censitário, excluindo pobres e escravizados. II. O Poder Moderador permitia ao imperador intervir nos três poderes clássicos. III. Foi aprovada pela Assembleia Constituinte convocada por D. Pedro I. IV. Foi a mais longeva constituição brasileira, vigorando até 1891. Estão CORRETAS apenas:", alts: ["I, II, III e IV", "II e IV", "I e III", "II, III e IV", "I, II e IV"], g: "E", j: "III é falsa: a Assembleia Constituinte foi DISSOLVIDA por D. Pedro em 1823 — ele a considerou radical demais. A Constituição de 1824 foi OUTORGADA, imposta pelo imperador sem aprovação parlamentar. As demais são corretas: I (voto censitário por renda), II (Poder Moderador com amplas prerrogativas), IV (1824 a 1891 = 67 anos, a mais longeva)." },

  { q: "Os Tratados de 1810 entre Portugal e Inglaterra geraram o que economistas chamam de 'desindustrialização precoce' porque:", alts: ["criaram monopólio inglês sobre o comércio de escravizados no Brasil colonial", "transferiram o controle das manufaturas coloniais para capitais ingleses", "fixaram tarifas preferenciais para produtos britânicos menores que as cobradas dos próprios portugueses, inviabilizando manufaturas locais", "impediram a importação de tecnologia britânica necessária para a industrialização", "proibiram a produção artesanal nas províncias mais industrializadas do Brasil"], g: "C", j: "Produtos britânicos pagavam 15% de tarifa no Brasil; os portugueses pagavam 16%. Essa vantagem estrutural tornou impossível qualquer concorrência industrial local frente à indústria britânica, a mais produtiva do mundo. O Brasil foi inserido na divisão internacional do trabalho como exportador de matérias-primas." },

  { q: "A Confederação do Equador (1824) evidenciou principalmente:", alts: ["a influência direta da Revolução Industrial sobre o pensamento político nordestino", "a tentativa de restaurar o domínio português sobre as províncias do Norte", "o conflito entre produtores de açúcar nordestinos e cafeicultores do Sudeste", "o apoio das elites nordestinas à Constituição outorgada por D. Pedro I", "a insatisfação das elites nordestinas com o centralismo e com a Constituição outorgada, propondo república federalista"], g: "E", j: "Liderada por Frei Caneca em Pernambuco, a Confederação expressou o projeto das elites nordestinas: república federalista, autonomia provincial e constituição liberal — contra o centralismo autoritário de D. Pedro I. Alastrou-se por Ceará, Rio Grande do Norte e Paraíba, sendo violentamente reprimida." },

  { q: "A abdicação de D. Pedro I (1831): qual afirmação representa uma análise ESTRUTURAL — e não meramente conjuntural — da crise?", alts: ["A influência britânica forçou D. Pedro a abdicar para instalar governo mais liberal.", "A Noite das Garrafadas e a perda de apoio do Exército foram as causas determinantes.", "A contradição entre o modelo centralizador, os interesses regionais e a Constituição outorgada tornava a crise inevitável a longo prazo.", "A questão da sucessão ao trono português foi o fator exclusivo do desgaste político.", "A crise financeira provocada pela guerra da Cisplatina foi o único fator relevante."], g: "C", j: "Análise estrutural identifica causas sistêmicas: o Poder Moderador criava ressentimento permanente; o centralismo antagonizava elites regionais; a Constituição outorgada nunca foi legitimada. Cada crise individual (Cisplatina, Noite das Garrafadas) foi insuperável porque o modelo político era intrinsecamente conflitivo. A Noite das Garrafadas foi o estopim de um barril de pólvora estrutural." },

  { q: "A Revolução Liberal do Porto (1820) funcionou como 'catalisador' da independência brasileira porque:", alts: ["D. João VI financiou a revolução criando pretexto para declarar independência", "as Cortes aprovaram imediatamente a independência para evitar conflito armado", "a ameaça de recolonização unificou setores da elite brasileira em torno de uma identidade nacional comum", "as Cortes reconheceram a independência antes mesmo de sua proclamação formal", "a revolução trouxe ideias liberais que inspiraram diretamente os patriotas brasileiros"], g: "C", j: "Antes de 1820, as elites estavam satisfeitas com o status de Reino Unido. As Cortes criaram o inimigo comum: ao ameaçar reverter as conquistas joaninas e exigir o retorno de D. João, provocaram a coesão de setores que antes não cogitavam a independência. A ameaça externa construiu o sentimento nacional que a tornou possível." },

  { q: "O Poder Moderador instituído pela Constituição de 1824 era considerado o eixo do sistema político imperial porque:", alts: ["limitava os poderes do imperador em benefício do equilíbrio entre os poderes", "era exercido coletivamente pelo imperador e pelo Conselho de Estado eleito", "era apenas simbólico, sem atribuições executivas reais sobre os outros poderes", "permitia ao imperador nomear ministros, dissolver a Câmara e intervir nos três poderes sem responsabilização", "estava subordinado ao Poder Legislativo em suas atribuições mais importantes"], g: "D", j: "O artigo 99 da Constituição de 1824 declarava o imperador inviolável. Ao mesmo tempo, o Poder Moderador lhe dava prerrogativas imensuráveis: nomear senadores vitalícios da lista tríplice, dissolver a Câmara, nomear e demitir ministros. Era poder máximo sem responsabilidade — o que juristas como Zacarias de Góis chamavam de 'poder pessoal do imperador'." },

  { q: "A elevação do Brasil a Reino Unido de Portugal, Brasil e Algarves (1815) foi relevante para a independência porque:", alts: ["declarou formalmente a extinção do pacto colonial e o fim das restrições comerciais", "tornou juridicamente ilegítima qualquer tentativa posterior de recolonização do Brasil", "permitiu que o Brasil cobrasse impostos diretamente sem repasse a Lisboa", "criou um parlamento bicameral representando tanto Portugal quanto o Brasil", "concedeu ao Brasil autonomia militar completa em relação a Portugal"], g: "B", j: "Ao equiparar o Brasil juridicamente à metrópole como 'reino', D. João tornou incompatível qualquer recolonização futura com o próprio direito português. Quando as Cortes tentaram em 1820 reverter esse status, estavam tecnicamente violando a constituição do Império. Essa contradição jurídica deu às elites brasileiras um argumento poderoso para resistir." },

  { q: "O período joanino (1808-1821) é descrito por historiadores como 'acidente criador'. Qual transformação melhor exemplifica esse caráter estrutural duradouro?", alts: ["A abertura dos portos, revertida pelas Cortes portuguesas em 1820.", "A Missão Artística Francesa, cujo impacto limitou-se às elites cariocas.", "A instalação de instituições estatais modernas que criaram classe letrada, burocracia e cultura política tornando inviável o retorno ao status colonial.", "A criação do Banco do Brasil, que foi extinto logo após o retorno de D. João.", "Os tratados de 1810, rapidamente renegociados após a independência."], g: "C", j: "O 'acidente criador' refere-se às consequências não intencionais: as instituições joaninas formaram uma classe dirigente, burocracia letrada e cultura política que não podiam ser desfeitas. Mesmo que Portugal tentasse a recolonização, havia juízes, professores, militares e comerciantes com interesses enraizados no Brasil — tornando o retorno ao status colonial estruturalmente impossível." },

  { q: "A independência do Brasil (1822) diferiu das independências hispano-americanas principalmente porque:", alts: ["ambas as regiões seguiram trajetórias políticas idênticas após a independência", "o Brasil travou guerra prolongada de mais de dez anos contra Portugal para se libertar", "a independência brasileira foi liderada pela burguesia comercial local sem envolvimento da nobreza", "o Brasil manteve a unidade territorial sob monarquia centralizada, enquanto a América hispânica fragmentou-se em múltiplas repúblicas com frequentes guerras civis", "o Brasil aboliu a escravidão imediatamente após a independência, diferente dos vizinhos"], g: "D", j: "A monarquia centralizada brasileira garantiu a unidade territorial — o Brasil não se fragmentou como as ex-colônias espanholas, que geraram mais de 15 repúblicas e décadas de guerras civis. As elites brasileiras temiam exatamente essa fragmentação. A forma monárquica foi o instrumento da unidade, ao custo de conservar a escravidão e o latifúndio." }

      { h2: "1. ABSOLUTISMO MONÁRQUICO (séculos XVI–XVIII)", items: [
        { tipo: "p", txt: "Luís XIV da França resumiu o absolutismo em uma frase: 'L'État, c'est moi' — O Estado sou eu. Entre os séculos XVI e XVIII, a Europa Ocidental foi dominada por monarquias que concentravam todos os poderes: legislar, executar e julgar eram prerrogativas do mesmo homem." },
        { tipo: "p", txt: "O absolutismo não surgiu do nada — foi a resposta ao caos feudal. A burguesia comercial, que precisava de segurança jurídica e mercados estáveis, apoiou ativamente a centralização monárquica. Foi uma aliança de interesses: o rei precisava de dinheiro, a burguesia precisava de ordem." },
        { tipo: "h3", txt: "Características do Estado Absolutista" },

      { h2: "2. TRANSIÇÃO DA IDADE MÉDIA PARA A IDADE MODERNA", items: [

        { tipo: "h3", txt: "Crise do feudalismo" },
        { tipo: "ul", items: [

          "CRISE DA IGREJA: Cisma do Ocidente (dois papas simultâneos), corrupção do clero, escândalos da Inquisição. Quando a Igreja perde credibilidade, o mundo que ela organizava também vacila.",

          "EXPANSÃO MARÍTIMA: Portugal e Espanha abriram rotas para a Ásia e Américas. O ouro e a prata americanos inundaram a Europa, financiaram os Estados nacionais e criaram um capitalismo comercial global.",
          "CENTRALIZAÇÃO POLÍTICA: aliança rei + burguesia contra a nobreza feudal. A burguesia financiou as monarquias em troca de proteção e mercados. A nobreza feudal foi progressivamente esvaziada de poder."

        { tipo: "h3", txt: "A queda de Constantinopla (1453)" },

      { h2: "3. HUMANISMO RENASCENTISTA (séculos XIV–XVI)", items: [
        { tipo: "p", txt: "Durante a Idade Média, a resposta para qualquer pergunta importante começava e terminava em Deus. A arte representava santos. A filosofia era serva da teologia. O ser humano era criatura passageira neste vale de lágrimas. O Renascimento virou essa lógica: o humano no centro." },
        { tipo: "h3", txt: "Características do Humanismo" },
        { tipo: "ul", items: [

        { tipo: "ex", txt: "NÃO CONFUNDA: O Renascimento não rompeu completamente com a Idade Média. As Madonas de Rafael são tecnicamente renascentistas (perspectiva, naturalismo) e tematicamente medievais (a Virgem). A ruptura foi de MÉTODO e ESTÉTICA, não de tema. O Renascimento reinterpretou — não destruiu — a herança medieval." }

    questoes: [
  { q: "Hobbes escreveu Leviatã (1651) respondendo a um contexto histórico específico. Qual foi esse contexto e como moldou sua teoria?", alts: ["A expansão colonial britânica o levou a teorizar sobre direitos dos povos colonizados.", "A Revolução Gloriosa de 1688 demonstrou a Hobbes a viabilidade da monarquia constitucional.", "A Guerra Civil Inglesa e a execução de Carlos I forneceram a Hobbes a experiência empírica do colapso estatal, justificando o soberano absoluto como alternativa ao caos.", "As guerras de religião na França o inspiraram a propor separação entre Igreja e Estado.", "A prosperidade comercial holandesa levou Hobbes a defender o livre mercado como base do contrato."], g: "C", j: "Hobbes viveu a Guerra Civil Inglesa e testemunhou a decapitação de Carlos I em 1649 — dois anos antes de publicar Leviatã. O colapso político que ele observou não era metáfora: era o 'estado de natureza' acontecendo na prática. A teoria absolutista foi resposta direta à experiência concreta de um Estado destruído." },

  { q: "A expressão 'o fim justifica os meios', associada a Maquiavel, representa qual ruptura filosófica com o pensamento político medieval?", alts: ["A criação de um contrato social racional que substitui a autoridade da Igreja.", "A autonomia da política em relação à moral religiosa: o critério do bom governo é a eficácia, não a bondade cristã.", "A proposta de abolir completamente a moral cristã da vida pública e privada.", "A fundamentação do poder monárquico na vontade divina, como defenderá Bossuet depois.", "A defesa da tirania como forma de governo superior às monarquias constitucionais."], g: "B", j: "Maquiavel inaugura a ciência política ao separar o domínio político do moral-religioso. A tradição medieval dos 'espelhos de príncipes' julgava o governante pela bondade e piedade cristã. Maquiavel inverte: o critério é a eficácia na manutenção do Estado e da ordem. Um príncipe bondoso que perde o poder é, nesse critério, pior que um cruel que o mantém." },

  { q: "O mercantilismo apresentava uma contradição interna que antecipava seu próprio colapso. Qual era essa contradição?", alts: ["Dependia de um equilíbrio de poder entre nações que a guerra permanente tornava impossível.", "Era intrinsecamente democrático e incompatível com as monarquias absolutas que o sustentavam.", "Exigia que os reis abdicassem de seus poderes soberanos em favor das corporações comerciais.", "Era incompatível com a manutenção da escravidão colonial, sua principal fonte de riqueza.", "A lógica de soma zero — todos querendo maximizar exportações e minimizar importações — inviabilizava o crescimento do comércio internacional de que o próprio sistema dependia."], g: "E", j: "Se todos os Estados tentam simultaneamente maximizar exportações e minimizar importações, o comércio global se contrai — pois cada exportação de um é a importação de outro. Essa lógica de soma zero exigia conflito permanente por mercados e colônias, gerando as guerras comerciais que, ironicamente, enfraqueciam os próprios Estados que o mercantilismo pretendia fortalecer." },

  { q: "A Peste Negra (1347-1353) contribuiu para a transição feudal-capitalista por qual mecanismo socioeconômico específico?", alts: ["Destruiu os arquivos feudais, liberando juridicamente os servos de suas obrigações.", "A redução da população diminuiu a demanda por alimentos, tornando inviável a grande propriedade.", "Os médicos que combateram a epidemia acumularam capital suficiente para fundar os primeiros bancos.", "A mortalidade maciça gerou escassez de mão de obra, invertendo a relação de poder: servos sobreviventes passaram a negociar condições, introduzindo proto-relações salariais.", "Enfraqueceu a Igreja Católica, que perdeu o controle sobre a produção artesanal das cidades."], g: "D", j: "Com 30-60% da população morta, a escassez de mão de obra inverteu a relação de forças: senhores que antes coagiam servos agora precisavam atraí-los. Camponeses negociavam condições, migravam para cidades que ofereciam melhores salários. Esse comportamento era incompatível com a servidão feudal e introduziu elementos proto-capitalistas nas relações de produção." },

  { q: "Qual afirmação estabelece com mais precisão a distinção entre os fundamentos políticos de Hobbes e Bossuet?", alts: ["Hobbes defende monarquia constitucional; Bossuet defende a tirania sem limites.", "Bossuet precede historicamente Hobbes e influenciou diretamente a redação do Leviatã.", "Ambos chegam às mesmas conclusões por fundamentos filosóficos praticamente idênticos.", "Bossuet é mais radical que Hobbes porque não admite nenhuma exceção ao poder real.", "Hobbes fundamenta o absolutismo no contrato social racional; Bossuet o fundamenta na vontade divina — epistemologias políticas opostas para o mesmo resultado."], g: "E", j: "O mesmo resultado político (monarquia absoluta), dois caminhos filosóficos opostos. Hobbes: os homens racionalmente cedem direitos ao soberano para escapar do caos — argumento secular e contratual. Bossuet: Deus ordena o poder monárquico e contestá-lo é sacrilégio — argumento teológico. O argumento de Hobbes pode ser questionado racionalmente; o de Bossuet é sagrado e intocável." },

  { q: "O Renascimento é frequentemente apresentado como ruptura total com a Idade Média. Qual afirmação qualifica melhor essa visão?", alts: ["Os temas da arte renascentista continuaram predominantemente religiosos, representados com novas técnicas; foi ruptura de método, não de conteúdo.", "A ruptura com o Medievo foi simultânea em toda a Europa, sem diferenças regionais significativas.", "A ruptura foi total: o Renascimento negou completamente a herança intelectual medieval.", "Os humanistas rejeitaram completamente a filosofia escolástica e o legado de Aristóteles.", "O Renascimento ocorreu exclusivamente em países protestantes, sem influência da Igreja Católica."], g: "A", j: "A interpretação revisionista (Panofsky, Huizinga) mostra que os temas permaneceram medievais: as Madonas de Rafael são tecnicamente renascentistas (perspectiva, naturalismo) e tematicamente medievais (virgem, devoção). O Renascimento reinterpretou, não rompeu. A novidade foi de método e estética — não de conteúdo ou temática religiosa." },

  { q: "A queda de Constantinopla (1453) como marco do fim da Idade Média recebe qual crítica historiográfica?", alts: ["A data é imprecisa — o evento ocorreu efetivamente em 1451, segundo fontes otomanas.", "A periodização é eurocêntrica: para o Império Otomano é conquista; para a China ou o mundo islâmico é irrelevante — 'Idade Média' é categoria construída pelo Ocidente.", "O evento afetou apenas o comércio veneziano, sem impacto cultural amplo.", "A periodização é válida apenas para o Oriente Médio, não para a Europa ocidental.", "A queda não teve nenhuma relevância histórica e foi superestimada pelos historiadores."], g: "B", j: "A crítica pós-colonial aponta que 'Idade Média' descreve a experiência europeia — para o Império Otomano, 1453 é conquista gloriosa; para a China Ming, é irrelevante; para o Mali, inexistente. Usar essas categorias como universais impõe a perspectiva europeia como se fosse a história da humanidade. Toda periodização é uma escolha historiográfica, não um dado natural." },

  { q: "A imprensa de Gutenberg (c. 1450) é chamada de 'tecnologia disruptiva'. Qual foi sua consequência mais desestabilizadora para a ordem medieval?", alts: ["Fortaleceu o monopólio eclesiástico sobre o saber ao produzir Bíblias padronizadas em série.", "Substituiu o latim pelas línguas vernáculas como idiomas oficiais das nações europeias.", "Foi criada exclusivamente para produzir Bíblias, sem impacto cultural mais amplo.", "Ao democratizar o acesso aos textos e permitir Bíblias em línguas vernáculas, quebrou o monopólio clerical sobre a interpretação religiosa, tornando a Reforma Protestante irreversível.", "Seu custo elevado manteve o saber restrito às mesmas elites eclesiásticas de sempre."], g: "D", j: "A consequência mais disruptiva foi a quebra do monopólio hermenêutico: quando a Bíblia em alemão (Lutero, 1522) circulou em massa, cada fiel podia interpretá-la diretamente — o sacerdote deixou de ser mediador obrigatório. As 95 Teses de Lutero se espalharam pela Europa em semanas. A imprensa não criou a Reforma, mas a tornou irreversível." },

  { q: "O humanismo nórdico (Erasmo, Thomas More) é chamado de 'humanismo cristão' para distingui-lo do italiano. O que justifica esse adjetivo?", alts: ["O humanismo nórdico rejeitava completamente os textos greco-romanos como influência pagã.", "Era exclusivamente filosófico e abstrato, sem preocupações religiosas ou políticas.", "Os humanistas nórdicos eram ateus que usavam o discurso cristão como cobertura política.", "Articulava a retomada dos clássicos com crítica interna à Igreja e proposta de reforma moral do cristianismo, sem romper com a fé — preparando o terreno para a Reforma Protestante.", "Os humanistas nórdicos eram todos sacerdotes, ao contrário dos artistas italianos."], g: "D", j: "'Elogio da Loucura' de Erasmo e 'Utopia' de More criticam a corrupção eclesiástica e a hipocrisia clerical — mas a partir de dentro da fé cristã, propondo reforma, não ruptura. Esse humanismo 'cristão' foi o caldo de cultura da Reforma: Lutero reconhecia dívida intelectual com Erasmo, embora os dois tenham se separado radicalmente quanto às consequências." },

  { q: "A aliança entre burguesia e monarquia na formação dos Estados modernos foi uma 'aliança de interesses convergentes'. O que tornava esses interesses convergentes?", alts: ["A nobreza feudal financiou a aliança em troca de proteção militar garantida.", "A aliança foi imposta pelas Cruzadas, que exigiram cooperação obrigatória entre os dois grupos.", "A burguesia precisava de estabilidade jurídica e mercados que só o Estado centralizado oferecia; os reis precisavam de recursos financeiros que só a burguesia comercial podia fornecer.", "A Igreja Católica mediou a aliança impondo condições a ambos os lados.", "A burguesia queria assumir diretamente o poder político, dispensando os reis."], g: "C", j: "A complementaridade é a chave: a burguesia precisava de Estado forte (estradas, tribunais, moeda estável, leis de contratos) para expandir o comércio — incompatível com a fragmentação feudal. Os reis precisavam de dinheiro para manter exércitos e burocracia — que a nobreza feudal não fornecia mais. Ambos tinham o que o outro precisava, contra o mesmo adversário: a nobreza feudal." },

  { q: "O conceito de 'razão de Estado' em Maquiavel representa ruptura com qual tradição política medieval?", alts: ["Com o tomismo que fundamentava a lei humana na lei natural derivada da lei eterna.", "Com a tradição aristotélica que via a política como extensão da ética natural.", "Com a tradição dos 'espelhos de príncipes', que julgava o governante pela virtude cristã e conformidade à lei divina — substituída pelo critério da eficácia política.", "Com o agostinismo político que separava a Cidade de Deus da Cidade do Homem.", "Com a tradição nominalista de Ockham que negava qualquer fundamento universal da política."], g: "C", j: "Os 'espelhos de príncipes' medievais — gênero de conselhos a governantes — avaliavam o soberano pela bondade, piedade e conformidade à lei divina. Maquiavel inverte o critério: não importa se o príncipe é bom, importa se é eficaz. Essa inversão é a fundação da ciência política moderna e a ruptura mais profunda com o pensamento político medieval." }
],

    questoes: [
  { q: "No verão 2021-2022, o Sul e Sudeste do Brasil sofreram enchentes históricas enquanto o Nordeste enfrentava seca severa simultaneamente. Qual combinação de fatores explica essa assimetria?", alts: ["A mPa intensificada causou enchentes no Sul e bloqueou as chuvas no Nordeste.", "A mTc avançou pelo Sudeste trazendo umidade anômala e reduziu as chuvas no Nordeste.", "A ZCAS concentrou chuvas no Sudeste (mEc+mTa), enquanto o El Niño suprimiu as chuvas no Norte e Nordeste — padrão típico de anos de El Niño no verão.", "A ZCAS atuou no Nordeste enquanto o El Niño causou as enchentes no Sul do Brasil.", "El Niño no Sul e La Niña no Nordeste atuando ao mesmo tempo sobre o mesmo país."], g: "C", j: "Durante El Niño, a circulação atmosférica favorece chuvas acima da média no Sul/Sudeste (frentes frias mais frequentes e ZCAS intensificada) e seca no Norte/Nordeste (convecção suprimida). A ZCAS — interação mEc+mTa — amplifica ainda mais as chuvas no Sudeste. Esse padrão assimétrico simultâneo é característico de anos de El Niño forte." },

  { q: "O conceito de 'sombra de chuva' explica parte da aridez do semiárido nordestino. Em que consiste esse fenômeno na região?", alts: ["A umidade proveniente do Atlântico é absorvida completamente antes de atingir o litoral nordestino.", "O fenômeno só ocorre em regiões com montanhas acima de 3.000 metros de altitude.", "Ocorre quando nuvens de grande extensão bloqueiam completamente a radiação solar na região.", "A nebulosidade do litoral impede que a radiação solar atinja o interior sertanejo.", "As chuvas precipitam no litoral e nas chapadas (barlavento), e o interior fica no sotavento com ar já ressecado que desceu pelas serras."], g: "E", j: "As chuvas atlânticas (ventos de leste) atingem o litoral nordestino, sobem pelas chapadas e serras, precipitam no barlavento e chegam ao interior ressecadas — o sotavento fica na 'sombra de chuva'. Esse efeito, combinado com a posição subtropical, a influência do El Niño e o Anticiclone Subtropical, explica a singular aridez do sertão nordestino." },

  { q: "Em anos de La Niña intensa, a geração hidroelétrica no Sul do Brasil tende a cair enquanto no Norte aumenta. Qual mecanismo climático explica essa assimetria?", alts: ["La Niña provoca secas no Norte e chuvas no Sul — o oposto do descrito na questão.", "A redução da geração se deve exclusivamente ao desmatamento, independente da La Niña.", "La Niña intensifica os ventos alísios, favorecendo chuvas na Amazônia e Norte enquanto reduz as chuvas e a vazão dos rios no Sul.", "La Niña aumenta as chuvas em todo o Brasil de forma uniforme e simultânea.", "La Niña afeta apenas a temperatura do ar superficial, sem impacto direto na precipitação."], g: "C", j: "La Niña intensifica os ventos alísios → acumulação de água quente no Pacífico Oeste → mais convecção na Amazônia → mais chuvas no Norte/Nordeste. No Sul, ocorre o inverso: menos chuvas, maior frequência de veranicos e diminuição da vazão dos rios e dos reservatórios das hidrelétricas como Itaipu." },

  { q: "Sobre a relação entre aquecimento global e ciclones tropicais, qual afirmação reflete o consenso científico atual do IPCC?", alts: ["O aquecimento aumenta linearmente o número total de ciclones, pois há mais energia disponível.", "Os ciclones tropicais são completamente independentes da temperatura oceânica superficial.", "A relação entre aquecimento e ciclones é especulativa, sem base em dados observados.", "O aquecimento só afeta ciclones no Hemisfério Norte, sem impacto nas bacias do Hemisfério Sul.", "O aquecimento pode reduzir a frequência total de ciclones, mas aumenta a proporção dos mais intensos, pois oceanos mais quentes fornecem mais energia latente aos sistemas que se formam."], g: "E", j: "O IPCC AR6 (2021) indica que o aquecimento global não necessariamente aumenta o número total de ciclones (outros fatores dinâmicos também mudam), mas intensifica os que se formam. O padrão observado no Atlântico Norte desde 1980 confirma: menos ciclones, porém com ventos máximos e precipitação mais intensos." },

  { q: "A Massa Tropical Continental (mTc) origina-se no Chaco. Qual combinação de fatores geográficos explica seu caráter quente e seco?", alts: ["Forma-se sobre interior continental de baixas latitudes sem influência oceânica direta, com alta insolação e baixa umidade — condições que geram massa quente e seca.", "Não avança além do Mato Grosso do Sul, sem influência sobre o Sudeste brasileiro.", "Origina-se sobre o oceano Atlântico e perde umidade ao longo da travessia continental.", "Traz chuvas abundantes ao Centro-Oeste por ser quente e termodinamicamente instável.", "É sempre fria por se originar em latitudes médias do interior sul-americano."], g: "A", j: "A gênese da mTc está nas condições do Chaco: interior continental (sem oceano próximo para fornecer umidade), baixas latitudes (insolação intensa), relevo baixo (sem barreiras para umidade do Pacífico). O resultado é massa quente e seca. Ao avançar sobre o Brasil, produz ondas de calor extremo no Centro-Oeste e Sudeste — muito diferente das massas quentes e ÚMIDAS (mEc, mTa)." },

  { q: "O Sul do Brasil é a única região sem estação seca definida. Qual combinação de sistemas atmosféricos explica essa regularidade pluviométrica?", alts: ["O Sul recebe exclusivamente chuvas orográficas, uniformemente distribuídas pelas serras.", "Frentes frias da mPa penetram o Sul o ano todo combinadas com a umidade da mTa — sem massa de alta pressão dominante que bloqueie as chuvas por estação.", "A mEc domina o Sul durante todo o ano com sua umidade de origem amazônica.", "A ZCAS atua sobre o Sul durante todo o ano, garantindo chuvas regulares em todas as estações.", "A ausência completa da mPa no Sul explica a regularidade das precipitações anuais."], g: "B", j: "O Sul não tem estação seca pois a mPa penetra durante todo o ano — não apenas no inverno, como ocorre mais raramente no Sudeste. Frentes frias regulares trazem chuvas frontais em todas as estações. Esse padrão contrasta com o Nordeste (dependente das ITCs sazonais) e o Sudeste (ZCAS no verão, estiagem no inverno)." },

  { q: "A ZCAS (Zona de Convergência do Atlântico Sul) é responsável pelas maiores catástrofes climáticas do Sudeste brasileiro. Qual interação de massas de ar a forma?", alts: ["mEa (equatorial atlântica) e mPa (polar atlântica) interagindo sobre o Sudeste.", "mEc (equatorial continental) e mTa (tropical atlântica), que convergem do Noroeste amazônico para o Sudeste atlântico no verão.", "mTa (tropical atlântica) e mTc (tropical continental) criando instabilidade sobre o interior.", "mPa (polar atlântica) e mTc (tropical continental) convergindo sobre o litoral.", "mEc (equatorial continental) e mPa (polar atlântica) em colisão sobre o Brasil Central."], g: "B", j: "A ZCAS é formada pela convergência entre a mEc (quente e úmida da Amazônia) e a mTa (quente e úmida do Atlântico Sul). No verão, essas massas se encontram em diagonal do Noroeste amazônico ao Sudeste atlântico, criando faixa de intensa instabilidade. Quando persiste por mais de 4 dias consecutivos, é classificada como ZCAS — responsável por enchentes históricas em MG, RJ e SP." },

  { q: "O ENOS é descrito como 'acoplamento oceano-atmosfera'. Por que essa denominação é mais precisa do que 'fenômeno oceânico'?", alts: ["Porque afeta apenas a atmosfera tropical, sem conexão com os oceanos de outras regiões.", "Porque é sistema de retroalimentação mútua: anomalias oceânicas alteram a atmosfera, que por sua vez modifica as correntes oceânicas — ciclo que amplifica o fenômeno.", "Porque é causado exclusivamente pelos ventos alísios, sem influência das temperaturas do oceano.", "Porque o termo 'acoplamento' é apenas técnico, sem descrever mecanismo funcional diferente.", "Porque ocorre exclusivamente na atmosfera, sem envolvimento direto das correntes oceânicas."], g: "B", j: "O 'acoplamento' é o coração do ENOS: El Niño não começa só no oceano nem só na atmosfera — é retroalimentação mútua. Alísios enfraquecem → menos ressurgência → oceano aquece → convecção diminui → alísios enfraquecem ainda mais. Esse ciclo de retroalimentação positiva transforma uma pequena anomalia em fenômeno global com impactos em todos os continentes." },

  { q: "A chuva convectiva tropical segue padrão horário regular com precipitação vespertina. Qual mecanismo explica essa regularidade?", alts: ["Os ventos alísios trazem umidade oceânica apenas no período da tarde, após o meio-dia.", "O resfriamento noturno dispara a convecção nas primeiras horas da tarde do dia seguinte.", "O aquecimento progressivo da superfície ao longo da manhã eleva o ar até superar o inibidor convectivo; após o meio-dia, a energia acumulada forma cumulonimbus que precipitam à tarde.", "O aquecimento solar é máximo pela manhã, provocando precipitação ainda na primeira metade do dia.", "As chuvas convectivas são predominantemente noturnas nas regiões tropicais brasileiras."], g: "C", j: "Mecanismo termodinâmico: insolação progressiva → aquecimento do solo → transferência de calor para o ar → correntes ascendentes → condensação adiabática → formação de cumulonimbus → precipitação intensa. A regularidade vespertina (14h-17h) deve-se ao tempo necessário para acumular energia suficiente para superar a inibição convectiva presente nas manhãs tropicais." },

  { q: "O conceito de 'ilha de calor urbana' descreve anomalias climáticas positivas nas cidades. Qual processo físico explica por que cidades são sistematicamente mais quentes que o campo?", alts: ["A substituição de vegetação por asfalto e concreto aumenta absorção de calor e elimina o resfriamento por evapotranspiração; somado ao calor antropogênico (veículos, ar-condicionado), resulta em temperatura 3-8°C superior à do campo.", "É causado exclusivamente pela poluição do ar, que retém radiação infravermelha.", "As cidades recebem mais radiação solar por terem menos nuvens do que áreas rurais.", "As cidades são mais quentes por estarem em altitudes mais elevadas que o campo.", "O fenômeno ocorre apenas em cidades costeiras, sem impacto no interior continental."], g: "A", j: "Dois mecanismos simultâneos: (1) asfalto e concreto têm baixo albedo e alta capacidade calorífica — absorvem mais radiação e não evaporam água para resfriar como a vegetação faz; (2) calor antropogênico de motores, indústrias e sistemas de climatização acrescenta energia. Com aquecimento global, esse diferencial tende a aumentar, intensificando riscos de saúde pública em áreas urbanas." },

  { q: "Qual afirmação sobre a Massa Tropical Continental (mTc) é INCORRETA?", alts: ["Favorece a formação de ondas de calor no Centro-Oeste e Sudeste do Brasil.", "É caracterizada por ser quente e seca, diferente das massas tropicais oceânicas.", "É responsável pelos incêndios do Cerrado ao trazer ar quente e baixa umidade relativa.", "Traz chuvas abundantes ao interior do Brasil por sua alta temperatura e instabilidade.", "Origina-se sobre o interior continental sul-americano, principalmente no Chaco."], g: "D", j: "A mTc é quente e SECA — não úmida nem instável. Sua origem em interior continental sem influência oceânica é exatamente o que a diferencia das massas tropicais oceânicas (mTa, mEa). Ao contrário de trazer chuvas, ela favorece a estiagem, os incêndios e as ondas de calor. Confundir quente com chuvoso é um erro conceitual grave sobre massas de ar." }

      { h2: "2. AGROECOLOGIA — AGRICULTURA QUE CONVERSA COM A NATUREZA", items: [
        { tipo: "p", txt: "O Brasil tem um paradoxo perturbador: é o maior exportador de alimentos da América Latina e simultaneamente tem milhões de pessoas em insegurança alimentar. Produzimos comida para mais de 1 bilhão de pessoas, mas parte dos brasileiros não consegue comprar o suficiente para comer. O problema não é de produção — é de ACESSO, resultado da desigualdade de renda e da concentração fundiária." },
        { tipo: "p", txt: "Ao mesmo tempo, o Brasil é o maior consumidor de agrotóxicos per capita do mundo. O modelo do agronegócio — monocultura em larga escala, mecanização total, dependência de agroquímicos — é extremamente produtivo em volume, mas tem custos enormes: contaminação de mananciais, intoxicação de trabalhadores, perda de biodiversidade e dependência de insumos importados." },
        { tipo: "h3", txt: "O que é agroecologia" },
        { tipo: "p", txt: "Não é apenas técnica agrícola — é uma ciência, uma prática e um movimento social que integra princípios ecológicos, sociais e econômicos." },
        { tipo: "ul", items: [
          "POLICULTIVO: diferentes espécies cultivadas juntas. Cada uma ocupa um nicho, reduz pressão de pragas, cicla nutrientes de forma complementar e torna o sistema mais resistente a secas e eventos extremos.",
          "CONTROLE BIOLÓGICO: predadores naturais em vez de agrotóxicos. Vespas parasitóides contra lagartas, fungos contra insetos praga.",

          "MST: um dos principais promotores da agroecologia nos assentamentos. Policultivos como estratégia econômica: geram renda ao longo do ano todo, reduzem custos com insumos e tornam a pequena propriedade viável."
        ]},
        { tipo: "h3", txt: "Agronegócio × Agroecologia — não é dicotomia simples" },
        { tipo: "diagram", txt: "Entre a monocultura convencional e a agroecologia pura existe um ESPECTRO de práticas:\\n\\nMonocultura     Orgânico     ILPF*     Agroecologia\\nconvencional    certificado             plena\\n(agrotóxico)    (sem agrot.)  (misto)   (biodiversidade)\\n\\n*ILPF = Integração Lavoura-Pecuária-Floresta: reduz impactos mantendo escala.\\nA transição exige políticas concretas (crédito, assistência técnica, mercados)." },
        { tipo: "ex", txt: "AGROECOLOGIA ≠ ROMANTISMO: não é voltar à enxada do século XVIII. É ciência moderna aplicada a sistemas sustentáveis. Mas é também um MOVIMENTO POLÍTICO que questiona quem controla as sementes, a terra e os mercados — por isso enfrenta resistência do agronegócio convencional." }
