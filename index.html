    questoes: [
      { q: "Pierre Bourdieu usa o conceito de 'violência simbólica' para descrever a função da escola na reprodução das desigualdades. Em que consiste essa violência e por que é mais eficaz que a coerção física?", alts: ["Violência simbólica é a violência física exercida por professores contra alunos pobres.", "Violência simbólica é a imposição dos valores, gostos e disposições das classes dominantes como se fossem universais e legítimos — sem que os dominados a reconheçam como violência. É mais eficaz porque os próprios dominados interiorizam esses valores e atribuem seus fracassos à incompetência pessoal, participando ativamente de sua própria dominação.", "É a exclusão explícita dos alunos pobres das escolas de qualidade.", "O conceito foi criado por Marx, não por Bourdieu.", "É menos eficaz que a coerção física por não ter consequências reais."], g: "B", j: "O insight de Bourdieu: a dominação mais eficaz é a que não se reconhece como dominação. Filhos de classes dominantes chegam à escola com capital cultural (conhecimento, linguagem, gostos) valorizado pelo sistema escolar. Ao premiar esse capital como 'mérito', a escola converte vantagem de classe em aparente mérito individual. Os alunos que 'falham' atribuem o fracasso a si mesmos — não às estruturas. É dominação autoinfligida: incomparavelmente mais estável que qualquer coerção física." },
      { q: "O sociólogo Anthony Giddens usa o conceito de 'destradicionalização' para descrever a família contemporânea. O que esse conceito descreve e quais são suas ambivalências?", alts: ["Destradicionalização significa que as famílias abandonaram a religião.", "Destradicionalização descreve o processo pelo qual as formas familiares perdem seu caráter normativo obrigatório (casamento heterossexual permanente, papéis fixos de gênero) e passam a ser organizadas por escolha reflexiva. A ambivalência: por um lado amplia liberdades; por outro, cria insegurança ontológica pois os indivíduos devem construir identidades sem o suporte das certezas tradicionais.", "É sinônimo de secularização familiar.", "Giddens defende o retorno às formas tradicionais como solução para a anomia.", "Afeta apenas famílias de classe alta."], g: "B", j: "Giddens (A Transformação da Intimidade, 1992): nas modernidades tardias, as relações íntimas tornaram-se 'relacionamentos puros' — mantidos enquanto satisfazem ambas as partes, sem garantias externas (religião, tradição, lei). Liberdade e insegurança são as duas faces da mesma moeda: mais autonomia para construir formas familiares diversas, mas também mais ansiedade existencial, pois não há roteiro pronto para os papéis familiares. A destradicionalização é libertadora e desorientadora ao mesmo tempo." },
      { q: "O conceito de 'meritocracia' é amplamente usado para justificar desigualdades sociais. Qual crítica sociológica mais precisa pode ser feita a ele no contexto brasileiro?", alts: ["A meritocracia é completamente justa e não tem críticas válidas.", "A meritocracia pressupõe igualdade de condições de partida — só é justo avaliar mérito quando todos partem do mesmo ponto. No Brasil, com desigualdades históricas estruturadas por raça, classe e gênero, a meritocracia legitima o resultado de uma corrida desigual como se fosse produto exclusivo do esforço individual — naturalizando a injustiça social.", "Crítica à meritocracia equivale a defender que ninguém deve se esforçar.", "É problema exclusivo das universidades privadas.", "A meritocracia incentiva excessivamente a competição."], g: "B", j: "Michael Sandel (A Tirania do Mérito, 2020) e Bourdieu demonstram que o sistema avalia desempenho produzido por condições sociais desiguais como se fosse capacidade individual. Um estudante negro, pobre, de escola pública que chega ao ENEM já enfrentou décadas de desvantagens estruturais. Declarar que seu resultado é 'só mérito' é ideologia — naturaliza a injustiça estrutural e transfere a responsabilidade pelas desigualdades coletivas para o fracasso individual." },
      { q: "Émile Durkheim escolheu o suicídio como objeto de estudo em 'O Suicídio' (1897). Por que essa escolha é metodologicamente estratégica para demonstrar a autonomia explicativa dos 'fatos sociais'?", alts: ["Durkheim escolheu o suicídio por ser o tema mais dramático disponível.", "Ao demonstrar que as taxas de suicídio variam regularmente conforme o grau de integração e regulação social — e não pelas psicologias individuais —, Durkheim provou que mesmo o ato mais aparentemente individual é determinado por forças sociais externas, estabelecendo a autonomia explicativa da sociologia.", "O suicídio foi escolhido pela disponibilidade exclusiva de dados estatísticos.", "Durkheim nunca estudou o suicídio; a obra é de um discípulo.", "A escolha foi arbitrária, sem estratégia metodológica."], g: "B", j: "A escolha é um coup de maître metodológico: se o fato social tem poder explicativo mesmo sobre o ato mais íntimo e privado (o suicídio — decisão absolutamente individual), a sociologia demonstra sua autonomia de forma irrefutável. A regularidade das taxas por grupo social (protestantes > católicos em suicídios; solteiros > casados; períodos de anomia > períodos estáveis) mostra forças coletivas operando independentemente das psicologias individuais." },
      { q: "Max Weber distingue 'classe', 'estamento' e 'partido' como dimensões independentes da estratificação social. Qual exemplo ilustra a dissociação entre essas dimensões?", alts: ["É impossível que alguém tenha status elevado com baixa renda — as dimensões são sempre correlatas.", "O intelectual ou professor universitário em certas culturas pode ter alto status de estamento (prestígio, autoridade reconhecida) com renda modesta; o novo rico pode ter alta classe econômica com baixo status social. A dissociação é central no argumento weberiano contra o economicismo marxista.", "Classe econômica e status são sempre idênticos.", "A distinção é apenas teórica, sem exemplos empíricos.", "Weber desenvolveu as três dimensões para descrever exclusivamente a sociedade medieval."], g: "B", j: "Weber criou as três dimensões para capturar realidades que o marxismo (classe = tudo) não conseguia explicar. Exemplos históricos: o sacerdote medieval tinha enorme status de estamento com renda mínima; o comerciante rico tinha alta classe econômica com baixo status aristocrático; o líder político tinha poder sem necessariamente ter renda ou prestígio. No Brasil contemporâneo: o professor universitário (status + poder simbólico, renda modesta) vs. o empresário sem escolaridade (alta classe, baixo status intelectual)." },
      { q: "O conceito de 'pobreza multidimensional' (Amartya Sen) é apresentado como crítica ao conceito de 'linha de pobreza' (renda mínima). Qual é o argumento central dessa crítica?", alts: ["A linha de pobreza superestima a pobreza; a abordagem multidimensional é mais conservadora.", "A linha de pobreza pressupõe que a privação é unidimensional e que a renda resolve automaticamente todas as outras privações. Sen argumenta que privações em saúde, educação, participação política e dignidade não são conversíveis em renda — uma família pode estar acima da linha de pobreza e ainda sofrer privações estruturais.", "A linha de pobreza é superior por ser objetiva; a multidimensional é subjetiva.", "A pobreza multidimensional é exclusiva para países desenvolvidos.", "São equivalentes com apenas diferenças metodológicas."], g: "B", j: "Sen (Desenvolvimento como Liberdade, 1999): renda é apenas um meio para expandir 'capacidades' — a liberdade real de levar a vida que se valoriza. Mas um trabalhador com renda formal pode ser 'pobre em capacidades' se não tem saúde, educação ou segurança. A pandemia de COVID-19 demonstrou isso: famílias acima da linha de pobreza monetária perderam empregos, filhos pararam de estudar, adoeceram sem acesso a serviços de saúde — privações multidimensionais que a renda sozinha não captura." },
      { q: "Ralf Dahrendorf propõe teoria do conflito como alternativa ao marxismo. Qual é a contribuição específica de sua abordagem?", alts: ["Dahrendorf aplicou a teoria marxista a contextos pós-industriais sem modificações.", "Dahrendorf propõe que o conflito social deriva das relações de autoridade — não da propriedade dos meios de produção. Toda organização tem quem manda e quem obedece, gerando conflito estrutural. Isso amplia a teoria para além da fábrica: escolas, igrejas, famílias e Estados têm seus próprios conflitos de dominação-subordinação.", "Dahrendorf nega a existência de conflito social nas democracias.", "A contribuição é puramente metodológica.", "Dahrendorf defende que o funcionalismo de Parsons explica o conflito adequadamente."], g: "B", j: "A generalização de Dahrendorf é o avanço: ao substituir 'propriedade dos meios de produção' por 'relações de autoridade', ele libera a teoria do conflito das limitações do marxismo clássico. O conflito não é exclusivo do capitalismo industrial — existe em toda organização hierárquica. Isso permite analisar conflitos em contextos que Marx ignorava: burocracia estatal, famílias patriarcais, instituições religiosas — sem precisar reduzi-los a conflitos de classe econômica." },
      { q: "A perspectiva interseccional de Kimberlé Crenshaw critica as teorias clássicas de estratificação. Qual é o argumento central da interseccionalidade?", alts: ["A interseccionalidade defende que raça é a única variável relevante.", "Sistemas de opressão (classe, raça, gênero, sexualidade) não operam independentemente como variáveis somáveis — eles se intersectam e se constituem mutuamente, criando posições sociais específicas que não são explicáveis pela análise isolada de cada eixo.", "Apenas a classe econômica é variável relevante, como Marx defende.", "O conceito foi desenvolvido por Bourdieu.", "A interseccionalidade rejeita as categorias de raça e gênero."], g: "B", j: "Crenshaw (1989) desenvolveu a interseccionalidade a partir de um caso jurídico: mulheres negras processando a GM por discriminação não conseguiam provar discriminação racial (havia homens negros na empresa) nem de gênero (havia mulheres brancas). O direito — como a sociologia — não tinha categorias para a posição específica de 'mulher negra'. A interseccionalidade propõe que as categorias não se somam — se constituem mutuamente, criando posições singulares irredutíveis a qualquer eixo isolado." },
      { q: "Analise: anomia (Durkheim) e alienação (Marx) são conceitos distintos frequentemente confundidos. Qual é a diferença fundamental?", alts: ["São sinônimos utilizados por autores de tradições diferentes.", "A anomia é estado de desregulação social em que os indivíduos perdem as normas coletivas que guiam o comportamento — causada por mudanças sociais rápidas. A alienação é a separação do trabalhador do produto de seu trabalho, de sua atividade e de outros humanos — causada estruturalmente pelas relações de produção capitalistas.", "Anomia é conceito econômico; alienação é psicológico.", "Anomia refere-se apenas ao suicídio; alienação, apenas ao trabalho.", "São diagnósticos idênticos com soluções políticas diferentes."], g: "B", j: "A distinção é de natureza e causa: anomia (Durkheim) = déficit de normas — o indivíduo não sabe como agir porque as normas coletivas foram dissolvidas por transformações sociais rápidas (industrialização, urbanização). Alienação (Marx) = expropriação da essência humana — o trabalhador é separado do produto, da atividade, da espécie e dos outros. Anomia pode ser resolvida por mais integração social (regulação); alienação exige transformação das relações de produção. São diagnósticos distintos de patologias distintas." },
      { q: "A teoria de Robert Putnam sobre 'capital social' distingue-se do 'capital cultural' de Bourdieu. Qual é essa diferença e qual implicação política ela gera?", alts: ["Os dois conceitos são idênticos.", "O capital cultural de Bourdieu é recurso de distinção e dominação de classe (conhecimento, gostos, disposições que favorecem grupos dominantes). O capital social de Putnam é a rede de relações de confiança e reciprocidade que permitem a ação coletiva. A implicação: Bourdieu aponta que o capital cultural reproduz desigualdade; Putnam aponta que o capital social (confiança, associativismo) é condição para a democracia.", "Capital social é sinônimo de dinheiro acumulado por uma classe.", "Putnam rejeita completamente o conceito de capital cultural.", "São conceitos do mesmo campo teórico aplicados a fenômenos idênticos."], g: "B", j: "Bourdieu: capital cultural como recurso de reprodução da dominação — opera em campos de disputa por posição social (escola, arte, academia). Putnam (Bowling Alone, 2000): capital social como infra-estrutura cívica — redes de confiança que permitem cooperação para fins coletivos (associações, voluntariado, participação política). O declínio do capital social explica, para Putnam, a crise da democracia americana. São perspectivas complementares sobre dois aspectos diferentes da vida social." },
      { q: "A análise funcionalista de Davis e Moore sobre a desigualdade social afirma que ela é 'funcionalmente necessária'. Qual crítica sociológica mais direta pode ser feita a essa posição?", alts: ["Não existe crítica válida — a teoria é correta.", "A crítica fundamental é que o funcionalismo pressupõe que as posições mais remuneradas são necessariamente as mais importantes e que só os mais talentosos as ocupam — ignorando que barreiras estruturais (raça, classe de origem, gênero) impedem que os mais talentosos cheguem a essas posições, tornando a desigualdade resultado de exclusão histórica, não de seleção meritocrática.", "A crítica é que a teoria não se aplica ao capitalismo moderno.", "A teoria de Davis-Moore é marxista, não funcionalista.", "A crítica é que a desigualdade não existe nas sociedades modernas."], g: "B", j: "Davis e Moore (1945) argumentam que posições importantes precisam ser mais remuneradas para atrair os mais capazes — a desigualdade seria, portanto, funcional. A crítica estruturalista: se barreiras de raça, classe e gênero impedem que os 'mais talentosos' cheguem às posições mais remuneradas, a desigualdade resultante não é funcional — é produto de exclusão histórica sendo naturalizada como mérito. Melvin Tumin (1953) foi o primeiro a sistematizar essa crítica ao funcionalismo estratificacionista." }
    ],
  }
];
// ═══════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════

const state = {
  current: 0,
  tab: 'content',
  scores: MATERIAS.map(m => ({ total: m.questoes.length, answered: 0, correct: 0 })),
  answers: MATERIAS.map(m => Array(m.questoes.length).fill(null))
};

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = MATERIAS.map((m, i) => {
    const sc = state.scores[i];
    const done = sc.answered;
    const pct = done > 0 ? Math.round((sc.correct / sc.answered) * 100) : null;
    const scoreText = done > 0 ? `${sc.correct}/${sc.answered}` : '';
    const scoreClass = done === sc.total && sc.correct === sc.total ? 'perfect' : '';
    return `<div class="nav-item${i === state.current ? ' active' : ''}" onclick="selectMateria(${i})">
      <span class="icon">${m.icon}</span>
      <span style="flex:1">${m.nome}</span>
      ${scoreText ? `<span class="nav-score ${scoreClass}">${scoreText}</span>` : ''}
    </div>`;
  }).join('');
}

function buildContent(m) {
  return m.conteudo.map(sec => {
    const items = sec.items.map(item => {
      if (item.tipo === 'p') return `<p class="section-p">${item.txt}</p>`;
      if (item.tipo === 'h3') return `<div class="section-h3">${item.txt}</div>`;
      if (item.tipo === 'ex') return `<div class="example">${item.txt}</div>`;
      if (item.tipo === 'ul') return `<ul class="bullet-list">${item.items.map(li => `<li>${li}</li>`).join('')}</ul>`;
      return '';
    }).join('');
    return `<div class="section-block"><div class="section-h2">${sec.h2}</div>${items}</div>`;
  }).join('');
}

function buildQuestions(mIdx) {
  const m = MATERIAS[mIdx];
  const sc = state.scores[mIdx];
  const pct = sc.answered > 0 ? Math.round((sc.correct / sc.answered) * 100) : 0;
  const barColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--accent)';

  let html = `<div class="score-bar">
    <div>
      <div class="score-label">Acertos</div>
      <div class="score-count">${sc.correct} <span>/ ${sc.total}</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${sc.answered > 0 ? pct : 0}%;background:${barColor}"></div>
    </div>
    <button class="reset-btn" onclick="resetMateria(${mIdx})">Refazer</button>
  </div>`;

  m.questoes.forEach((q, qi) => {
    const ans = state.answers[mIdx][qi];
    const letters = ['A','B','C','D','E'];
    const answered = ans !== null;
    const correct = answered && letters[ans] === q.g;

    html += `<div class="question-block${answered ? (correct ? ' answered-correct' : ' answered-wrong') : ''}" id="q-${mIdx}-${qi}">
      <div class="question-num">Questão ${qi + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="alternatives">`;

    q.alts.forEach((alt, ai) => {
      let cls = '';
      if (answered) {
        if (letters[ai] === q.g) cls = 'reveal-correct';
        if (ai === ans && !correct) cls = 'wrong';
        if (ai === ans && correct) cls = 'correct';
      }
      html += `<button class="alt-btn ${cls}" 
        ${answered ? 'disabled' : `onclick="answer(${mIdx},${qi},${ai})"`}>
        <span class="alt-letter">${letters[ai]}</span>
        <span>${alt}</span>
      </button>`;
    });

    html += `</div>`;

    if (answered) {
      html += `<div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <strong>${correct ? '✓ Correto!' : '✗ Incorreto'}</strong>
        ${q.j}
      </div>`;
    }

    html += `</div>`;
  });

  return html;
}

function renderMain() {
  const m = MATERIAS[state.current];
  const mIdx = state.current;

  document.getElementById('main').innerHTML = `
    <div class="subject-subtitle">${m.icon} ${m.nome}</div>
    <h1 class="subject-title">${m.topico}</h1>
    <div class="tabs">
      <div class="tab${state.tab === 'content' ? ' active' : ''}" onclick="switchTab('content')">📖 Conteúdo</div>
      <div class="tab${state.tab === 'questions' ? ' active' : ''}" onclick="switchTab('questions')">✏️ Questões</div>
    </div>
    <div class="content${state.tab === 'content' ? ' visible' : ''}" id="tab-content">
      ${buildContent(m)}
    </div>
    <div class="content${state.tab === 'questions' ? ' visible' : ''}" id="tab-questions">
      ${buildQuestions(mIdx)}
    </div>
  `;
}

function render() {
  renderNav();
  renderMain();
}

// ═══════════════════════════════════════════════════════════════
// AÇÕES
// ═══════════════════════════════════════════════════════════════

function selectMateria(i) {
  state.current = i;
  state.tab = 'content';
  render();
  document.getElementById('main').scrollTop = 0;
  if (window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function switchTab(tab) {
  state.tab = tab;
  renderMain();
}

function answer(mIdx, qi, ai) {
  if (state.answers[mIdx][qi] !== null) return;
  state.answers[mIdx][qi] = ai;
  const letters = ['A','B','C','D','E'];
  const correct = letters[ai] === MATERIAS[mIdx].questoes[qi].g;
  state.scores[mIdx].answered++;
  if (correct) state.scores[mIdx].correct++;
  renderNav();
  // Rebuild apenas as questões sem recriar o main inteiro
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
  // Scroll para a questão respondida
  const el = document.getElementById(`q-${mIdx}-${qi}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetMateria(mIdx) {
  state.scores[mIdx] = { total: MATERIAS[mIdx].questoes.length, answered: 0, correct: 0 };
  state.answers[mIdx] = Array(MATERIAS[mIdx].questoes.length).fill(null);
  renderNav();
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

render();
</script>
</body>
