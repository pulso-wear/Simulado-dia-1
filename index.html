<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudos 3.º Ano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;1,400&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2435;
    --border: #2a3045;
    --text: #e8eaf0;
    --muted: #7a82a0;
    --accent: #5b8dee;
    --accent-dim: rgba(91,141,238,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #f55f5f;
    --red-dim: rgba(245,95,95,0.12);
    --yellow: #f5c542;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .nav-list { padding: 8px 8px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-score {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 20px;
    color: var(--muted);
  }
  .nav-item.active .nav-score { background: var(--accent-dim); }
  .nav-score.perfect { background: var(--green-dim); color: var(--green); }

  /* ── MAIN ── */
  #main {
    flex: 1;
    padding: 32px 28px;
    max-width: 820px;
    overflow-y: auto;
  }

  .subject-title {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subject-subtitle {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-color: var(--accent); }

  /* ── CONTEÚDO ── */
  .content { display: none; }
  .content.visible { display: block; }

  .section-block { margin-bottom: 28px; }

  .section-h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--yellow);
    margin: 16px 0 8px;
  }
  .section-p { color: var(--text); margin-bottom: 10px; }

  .bullet-list { list-style: none; padding: 0; margin: 8px 0; }
  .bullet-list li {
    padding: 4px 0 4px 20px;
    position: relative;
    color: var(--text);
    font-size: 14px;
  }
  .bullet-list li::before {
    content: '›';
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: 700;
  }
  .example {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--muted);
    margin: 6px 0;
    font-style: italic;
  }

  /* ── QUESTÕES ── */
  .question-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-block.answered-correct { border-color: var(--green); }
  .question-block.answered-wrong { border-color: var(--red); }

  .question-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .alternatives { display: flex; flex-direction: column; gap: 8px; }

  .alt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .alt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .alt-btn:disabled { cursor: default; }

  .alt-letter {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    color: var(--muted);
    margin-top: 1px;
  }

  .alt-btn.correct { border-color: var(--green); background: var(--green-dim); }
  .alt-btn.correct .alt-letter { color: var(--green); }
  .alt-btn.wrong { border-color: var(--red); background: var(--red-dim); }
  .alt-btn.wrong .alt-letter { color: var(--red); }
  .alt-btn.reveal-correct { border-color: var(--green); background: var(--green-dim); opacity: 0.7; }
  .alt-btn.reveal-correct .alt-letter { color: var(--green); }

  .feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-dim); border: 1px solid rgba(62,207,142,0.3); }
  .feedback.wrong { background: var(--red-dim); border: 1px solid rgba(245,95,95,0.3); }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 13px; }
  .feedback.correct strong { color: var(--green); }
  .feedback.wrong strong { color: var(--red); }

  /* ── SCORE BAR ── */
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .score-label { font-size: 13px; color: var(--muted); }
  .score-count { font-size: 22px; font-weight: 700; color: var(--text); }
  .score-count span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; }
  .progress-bar-fill {
    height: 6px;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .reset-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── MOBILE ── */
  #menu-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(91,141,238,0.4);
  }

  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      bottom: 0;
      z-index: 50;
      transition: left 0.25s ease;
    }
    #sidebar.open { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.5); }
    #main { padding: 20px 16px; }
    #menu-toggle { display: flex; align-items: center; justify-content: center; }
    .subject-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header">
      <h1>Estudos<br>3.º Ano</h1>
      <p>Selecione uma matéria</p>
    </div>
    <div class="nav-list" id="nav-list"></div>
  </nav>

  <main id="main"></main>
</div>

<button id="menu-toggle" onclick="toggleMenu()">☰</button>

<script>
// ═══════════════════════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// DADOS
// ═══════════════════════════════════════════════════════════════

const MATERIAS = [
  {
    id: "port", icon: "📝", nome: "Língua Portuguesa",
    topico: "Aposto, Vocativo e Funções do 'Que'",
    conteudo: [
      { h2: "1. APOSTO — quando uma frase explica a outra", items: [
        { tipo: "p", txt: "Imagine que você apresenta alguém: 'Este é João, meu melhor amigo.' A expressão 'meu melhor amigo' não muda a estrutura da frase — ela apenas acrescenta uma informação sobre João. Isso é um aposto: um termo que se 'cola' a outro para explicar, nomear, enumerar ou resumir." },
        { tipo: "p", txt: "A grande sacada do aposto é que você pode tirá-lo da frase e ela continua correta. 'Este é João.' — perfeito. O aposto é bônus, não estrutura." },
        { tipo: "h3", txt: "Os 5 tipos que caem em prova" },
        { tipo: "ul", items: [
          "EXPLICATIVO — o mais cobrado. Vem entre vírgulas, travessões ou parênteses e explica o termo anterior. Ex.: 'Brasília, capital do Brasil, foi inaugurada em 1960.' Pode tirar? Sim. A frase funciona sem.",
          "ENUMERATIVO — lista os elementos de um conjunto. Geralmente vem depois de dois-pontos. Ex.: 'Dois vícios o destruíram: o álcool e o jogo.' O conjunto é 'dois vícios'; a lista é o aposto.",
          "RESUMITIVO — é o inverso do enumerativo: vem DEPOIS de uma lista e a resume. Sempre introduzido por tudo, nada, ninguém, tudo isso. Ex.: 'Honra, família, dinheiro — tudo se foi.' Dica: se vem antes, é enumerativo; se resume o que veio antes, é resumitivo.",
          "ESPECIFICATIVO — o único SEM pontuação. Restringe o sentido de um substantivo genérico. Ex.: 'O escritor Clarice Lispector revolucionou a prosa brasileira.' Sem vírgula, 'Clarice Lispector' especifica qual escritor.",
          "DISTRIBUTIVO — distribui características entre os elementos de um conjunto. Ex.: 'Dois perfis dividiam a sala: uns estudiosos, outros dispersos.'"
        ]},
        { tipo: "ex", txt: "⚠️ ARMADILHA CLÁSSICA: 'O filósofo Sócrates não deixou escritos.' (especificativo — sem vírgula) VS 'Sócrates, o filósofo grego, não deixou escritos.' (explicativo — com vírgula). Mesma ideia, funções diferentes." }
      ]},
      { h2: "2. VOCATIVO — chamando quem vai ouvir", items: [
        { tipo: "p", txt: "O vocativo é o termo mais solitário da gramática: ele não tem função dentro da oração. Não é sujeito, não é objeto, não é complemento. É como se fosse uma chamada antes de falar: você primeiro chama a pessoa, depois diz o que tem a dizer." },
        { tipo: "p", txt: "Por isso ele é sempre separado por vírgula — porque ele está fora da oração. E essa vírgula não é opcional. A frase 'Vamos comer, crianças!' significa uma coisa completamente diferente de 'Vamos comer crianças!' — a vírgula salva vidas (das crianças)." },
        { tipo: "ul", items: [
          "Pode aparecer em três posições: no início ('Professora, tenho uma dúvida.'), no meio ('Tenho, professora, uma dúvida.') ou no fim ('Tenho uma dúvida, professora.').",
          "Pode ser qualquer coisa: nome ('Ana, vem cá.'), pronome de tratamento ('Senhor, aguarde.'), adjetivo ('Querida, escuta.'), até oração ('Quem me dera, vem ver isso!').",
          "Na literatura, o vocativo se dirige a seres inanimados — isso se chama APÓSTROFE. 'Ó mar salgado, quanto do teu sal são lágrimas de Portugal!' (Pessoa). Mar não vai responder, mas o efeito poético é poderoso."
        ]},
        { tipo: "ex", txt: "TESTE RÁPIDO: Como saber se é vocativo? Pergunte: esse termo está sendo chamado para ouvir o que vem depois? Se sim, é vocativo. 'Meu Deus, que calor!' — Deus está sendo invocado. Vocativo." }
      ]},
      { h2: "3. AS MÚLTIPLAS FACES DO 'QUE'", items: [
        { tipo: "p", txt: "O 'que' é provavelmente a palavra mais versátil do português. Dependendo do contexto, ela pode ser pronome, conjunção, advérbio, partícula ou interjeição. O segredo para identificá-la? Sempre teste a substituição." },
        { tipo: "h3", txt: "As funções e como testar cada uma" },
        { tipo: "ul", items: [
          "PRONOME RELATIVO — retoma um substantivo anterior (o antecedente) e exerce função dentro da oração seguinte. Teste: substitua por 'o qual / a qual'. 'O livro que li' → 'O livro o qual li' ✓. Funciona? É relativo.",
          "CONJUNÇÃO INTEGRANTE — introduz oração que funciona como substantivo (sujeito, objeto, predicativo). Teste: substitua por 'o fato de'. 'Espero que você venha' → 'Espero o fato de você vir' ✓.",
          "PARTÍCULA EXPLETIVA (de realce) — não tem função alguma. Teste: retire-o. 'Há anos que não chove' → 'Há anos não chove' ✓. O sentido não mudou? É expletivo.",
          "ADVÉRBIO DE INTENSIDADE — aparece antes de adjetivo ou advérbio e intensifica. Teste: substitua por 'quão'. 'Que bela tarde!' → 'Quão bela é esta tarde!' ✓.",
          "PRONOME INTERROGATIVO — aparece em perguntas diretas ou indiretas. 'Que horas são?' / 'Não sei que dizer.'",
          "CONJUNÇÃO COORDENATIVA ADITIVA — equivale a 'e' ou 'ora'. Aparece em estruturas paralelas. 'Ora ri, que chora' = 'ora ri, ora chora'.",
          "INTERJEIÇÃO — expressa emoção isolada. 'Que! Você está aqui?'"
        ]},
        { tipo: "ex", txt: "MACETE DOS 3 TESTES: (1) Troca por 'o qual'? → Relativo. (2) Tira sem perder sentido? → Expletivo. (3) Troca por 'o fato de'? → Integrante. Se nenhum funcionar, analise o contexto." }
      ]}
    ],
    questoes: [
      { q: "Leia: 'O Pantanal, maior planície alagável do mundo, enfrenta devastação sem precedentes.' A expressão em destaque é um aposto. Assinale a alternativa que apresenta outro período com o MESMO tipo de aposto.", alts: ["O escritor Machado de Assis nasceu no Rio de Janeiro.", "Dois países assinaram o acordo: Brasil e Argentina.", "Tudo se perdeu: a casa, os livros, as memórias.", "A Amazônia — pulmão do planeta — precisa de proteção urgente.", "Ela tinha um único desejo: viver em paz."], g: "D", j: "'Maior planície alagável do mundo' é aposto explicativo (entre vírgulas, acrescenta informação sem restringir). Em D, 'pulmão do planeta' entre travessões cumpre exatamente a mesma função. A: aposto especificativo (sem pontuação). B e C: apostos enumerativos. E: aposto enumerativo com apenas um elemento." },
      { q: "Analise os períodos: I. 'Que ótima ideia você teve!' II. 'Não sei que dizer diante disso.' III. 'O problema que enfrentamos é grave.' IV. 'Há meses que não chove no sertão.' A sequência que identifica corretamente as funções do 'que' é:", alts: ["advérbio intensidade / pron. indefinido / pron. relativo / conj. integrante", "advérbio intensidade / pron. indefinido / pron. relativo / partícula expletiva", "pron. exclamativo / conj. integrante / pron. relativo / partícula expletiva", "interjeição / pron. interrogativo / pron. relativo / conj. integrante", "advérbio intensidade / conj. integrante / pron. relativo / partícula expletiva"], g: "B", j: "I: 'Que ótima' intensifica o adjetivo — advérbio. II: 'que dizer' = 'o que dizer', sentido indefinido — pronome indefinido. III: 'que enfrentamos' retoma 'problema', função de objeto direto — pronome relativo. IV: pode ser retirado sem alterar o sentido ('Há meses não chove') — partícula expletiva." },
      { q: "'Não há quem não saiba que a educação transforma.' Classifique o 'que' sublinhado em 'que a educação transforma':", alts: ["Pronome relativo, objeto direto de 'transforma'.", "Conjunção subordinativa integrante, introduzindo oração substantiva objetiva direta do verbo 'saber'.", "Partícula expletiva sem função sintática.", "Conjunção coordenativa explicativa equivalente a 'pois'.", "Pronome relativo com antecedente implícito 'coisa'."], g: "B", j: "O verbo 'saber' é transitivo direto. O 'que' introduz o objeto direto oracional ('que a educação transforma') — oração subordinada substantiva objetiva direta. É, portanto, conjunção subordinativa integrante, não pronome relativo (que retomaria um antecedente expresso)." },
      { q: "Identifique o vocativo e assinale a alternativa em que sua AUSÊNCIA provoca mudança de sentido:", alts: ["'Professor, pode começar a aula.'", "'Maria, sua redação ficou excelente.'", "'Vamos estudar, pessoal, que a prova é amanhã.'", "'Vamos alimentar as crianças, mãe!' × 'Vamos alimentar as crianças mãe!'", "'Atenção, passageiros, o voo está atrasado.'"], g: "D", j: "Em 'Vamos alimentar as crianças, mãe!', a vírgula indica que 'mãe' é vocativo — alguém chama a mãe para ajudar a alimentar as crianças. Sem a vírgula: 'Vamos alimentar as crianças mãe' — 'mãe' passa a ser adjunto de 'crianças', sugerindo que as crianças são mães (absurdo). Apenas nesse caso a vírgula altera estruturalmente o sentido." },
      { q: "No verso de Drummond — 'No meio do caminho tinha uma pedra / tinha uma pedra no meio do caminho' —, a reescrita em prosa: 'No caminho havia um obstáculo intransponível, a pedra'. O termo 'a pedra' é:", alts: ["Aposto especificativo — restringe 'obstáculo' sem pontuação.", "Aposto explicativo — identifica com precisão qual é o obstáculo, acrescentando informação individualizadora.", "Predicativo do sujeito 'obstáculo'.", "Vocativo — interpela o leitor simbolicamente.", "Adjunto adnominal de 'obstáculo'."], g: "B", j: "'A pedra' não restringe a classe dos obstáculos (especificativo), mas identifica precisamente aquele obstáculo específico — função individualizadora com vírgula. É aposto explicativo. A distinção é sutil: especificativo delimita ('o poeta Drummond'), explicativo individualiza com acréscimo de informação ('Drummond, o poeta itabirano,')." },
      { q: "'Rubião fitou o espelho, o vasto espelho do seu quarto.' O aposto 'o vasto espelho do seu quarto' classifica-se como:", alts: ["Resumitivo — sintetiza o período anterior.", "Especificativo — restringe sem pontuação.", "Explicativo — retoma 'espelho' com função identificadora e descritiva, acrescentando informação precisa.", "Distributivo — distribui características.", "Apositivo oracional — é formado por uma oração subordinada."], g: "C", j: "O aposto explicativo retoma 'o espelho' e acrescenta informação precisa ('vasto', 'do seu quarto'), individualizando o objeto mencionado anteriormente. A vírgula e a repetição do artigo defindo são marcas formais do aposto explicativo machadiano. Recurso estilístico usado para criar zoom narrativo sobre o objeto." },
      { q: "'Tudo lhe fugia: a juventude, a fortuna, os amigos.' O termo 'a juventude, a fortuna, os amigos' é aposto:", alts: ["Explicativo — esclarece o sentido de 'tudo'.", "Enumerativo — especifica os elementos contidos em 'tudo'.", "Resumitivo — sintetiza o período anterior.", "Distributivo — distribui papéis entre os elementos.", "Especificativo — delimita 'tudo' sem pontuação."], g: "B", j: "O aposto enumerativo especifica os elementos que compõem o todo ('tudo'). Difere do resumitivo, que faz o movimento inverso: vem após uma enumeração para sintetizá-la. Aqui, a enumeração vem depois do elemento resumidor ('tudo') — portanto, é enumerativo." },
      { q: "Assinale a frase em que o 'que' funciona como CONJUNÇÃO COORDENATIVA ADITIVA:", alts: ["Não sei que rumo tomar.", "O caminho que escolhemos foi longo.", "Ora chora, que ri, ninguém o entende.", "Espero que tudo se resolva logo.", "Há tanto tempo que não nos vemos!"], g: "C", j: "Em 'Ora chora, que ri' o 'que' equivale a 'ora' ou 'e' — coordena dois termos paralelos ('ora chora, ora ri'). É conjunção coordenativa aditiva com valor de alternância. A: pronome interrogativo. B: pronome relativo. D: conjunção integrante. E: partícula expletiva." },
      { q: "Analise o período: 'Os dois irmãos — Pedro, o mais velho, e Paulo, o caçula — partiram juntos.' Os termos em destaque são apostos do tipo:", alts: ["Explicativos — cada expressão explica o irmão a que se refere, individualizando-o.", "Enumerativos — enumeram os elementos do conjunto 'dois irmãos'.", "Resumitivos — sintetizam o período.", "Distributivos — distribuem características entre os dois irmãos.", "Especificativos — restringem sem pontuação."], g: "D", j: "O aposto distributivo combina enumeração e distribuição de predicados: 'Pedro' recebe 'o mais velho'; 'Paulo' recebe 'o caçula'. Cada elemento do conjunto recebe uma característica específica. Difere do explicativo puro (que apenas descreve um único referente) por distribuir atributos distintos entre os vários elementos." },
      { q: "Em qual alternativa o 'que' NÃO é pronome relativo?", alts: ["'O livro que você indicou é excelente.'", "'A cidade que visitei ficou na memória.'", "'Há muitos anos que não frequento o teatro.'", "'O argumento que apresentou foi convincente.'", "'A proposta que recusaram era justa.'"], g: "C", j: "Em C, 'que não frequento o teatro' não tem antecedente expresso a ser retomado — 'anos' não é antecedente do 'que' aqui. Trata-se de partícula expletiva: pode-se suprimir ('Há muitos anos não frequento o teatro') sem perda de sentido. Nas demais, o 'que' retoma um antecedente e exerce função sintática na oração adjetiva." },
      { q: "Releia: 'Professor, o senhor, mestre desta turma há vinte anos, sempre nos inspirou.' Identifique corretamente os termos destacados:", alts: ["'Professor' = vocativo; 'mestre desta turma há vinte anos' = aposto explicativo de 'o senhor'.", "'Professor' = vocativo; 'mestre desta turma há vinte anos' = predicativo do sujeito.", "'Professor' = aposto de 'o senhor'; 'mestre' = vocativo.", "'Professor' e 'mestre desta turma' = dois vocativos coordenados.", "'Professor' = sujeito; 'mestre desta turma' = aposto especificativo."], g: "A", j: "'Professor' está antes da vírgula, chama o interlocutor sem integrar sujeito ou predicado: é vocativo. 'Mestre desta turma há vinte anos' vem entre vírgulas, acrescenta informação a 'o senhor' (sujeito da oração), individualizando-o: é aposto explicativo. Os dois termos têm funções completamente distintas." }
    ],
  },
  {
    id: "hist1", icon: "🏛️", nome: "História 1",
    topico: "Governo Joanino e Primeiro Reinado",
    conteudo: [
      { h2: "1. A CORTE VIRA AS COSTAS PARA LISBOA", items: [
        { tipo: "p", txt: "Em novembro de 1807, Napoleão Bonaparte exigiu que Portugal fechasse seus portos para a Inglaterra ou seria invadido. D. João estava espremido entre dois gigantes: se obedecesse a Napoleão, perderia o aliado britânico que protegia as rotas do Atlântico; se recusasse, seria invadido. A solução foi fugir." },
        { tipo: "p", txt: "Em 29 de novembro de 1807, com a névoa ainda cobrindo Lisboa, uma frota de 15 navios carregados com a Corte portuguesa — cerca de 10 a 15 mil pessoas, incluindo a família real, nobres, funcionários, arquivos e até a biblioteca real — partiu para o Brasil sob escolta britânica. Para a colônia mais rica do Império, era uma mudança que ninguém havia imaginado possível." },
        { tipo: "h3", txt: "O que D. João fez que mudou tudo" },
        { tipo: "ul", items: [
          "ABERTURA DOS PORTOS (1808): primeiro ato ao desembarcar na Bahia. Acabou com o pacto colonial — a obrigação de o Brasil comerciar só com Portugal. A Inglaterra, que escoltara os navios, foi a principal beneficiada. Foi o primeiro passo para a independência, mesmo sem intenção.",
          "BANCO DO BRASIL (1808): primeira instituição financeira do país. Necessário para financiar a estrutura do Estado que estava sendo transplantada.",
          "MISSÃO ARTÍSTICA FRANCESA (1816): D. João convidou artistas franceses — Debret, Grandjean de Montigny — para modernizar as artes e a arquitetura. Paradoxo: o Brasil foi modernizado culturalmente por franceses, os mesmos que haviam forçado a fuga de D. João.",
          "REINO UNIDO (1815): o Brasil foi elevado de colônia a reino, em pé de igualdade com Portugal. Isso foi crucial: tornou juridicamente impossível reverter o status do Brasil para o de mera colônia — o que as Cortes portuguesas tentariam fazer em 1820.",
          "TRATADOS DE 1810: tarifas de 15% para produtos britânicos (vs 16% para os próprios portugueses). O Brasil entrou na órbita econômica britânica — o que duraria décadas."
        ]}
      ]},
      { h2: "2. O CAMINHO PARA A INDEPENDÊNCIA", items: [
        { tipo: "p", txt: "Em 1820, Portugal explodiu. Uma revolução liberal exigiu a volta de D. João e a reconstitucionalização do país. Mas havia um detalhe: as Cortes também queriam reverter tudo o que D. João havia feito no Brasil — recolonizar, em outras palavras." },
        { tipo: "p", txt: "Foi exatamente essa ameaça que empurrou as elites brasileiras — que até então estavam satisfeitas com o status de Reino Unido — para a independência. D. João voltou para Portugal em 1821, deixando seu filho D. Pedro como príncipe-regente." },
        { tipo: "ul", items: [
          "DIA DO FICO (9/1/1822): as Cortes exigiram o retorno de D. Pedro. Ele recusou com a célebre frase 'Fico!'. Foi o primeiro ato concreto de ruptura.",
          "GRITO DO IPIRANGA (7/9/1822): às margens do riacho Ipiranga em SP, D. Pedro proclamou a independência. 'Independência ou Morte!'",
          "INDEPENDÊNCIA CONSERVADORA: escravidão mantida, latifúndio intacto, monarquia preservada. Foi uma ruptura política com Portugal, não uma ruptura social. Por isso é chamada de 'revolução pelo alto' ou 'revolução conservadora'.",
          "RECONHECIMENTO (1825): Portugal só reconheceu a independência mediante pagamento de £2 milhões — emprestados da própria Inglaterra. O Brasil nascia endividado."
        ]}
      ]},
      { h2: "3. D. PEDRO I — O IMPERADOR QUE NÃO DUROU", items: [
        { tipo: "p", txt: "D. Pedro I herdou um país enorme, mal integrado, economicamente dependente e com uma elite que queria autonomia mas sem abrir mão de seus privilégios. Seu governo foi marcado por uma contradição central: ele era o símbolo da independência brasileira e ao mesmo tempo um Bragança — membro da dinastia que havia colonizado o Brasil." },
        { tipo: "ul", items: [
          "CONSTITUIÇÃO DE 1824 (outorgada): D. Pedro dissolveu a Assembleia Constituinte em 1823 por considerá-la radical demais. Depois, simplesmente impôs uma Constituição. O grande problema: ela criou o PODER MODERADOR — um 4º poder exclusivo do imperador que permitia dissolver o Parlamento, nomear senadores vitalícios e suspender magistrados. Era absolutismo disfarçado de constitucionalismo.",
          "CONFEDERAÇÃO DO EQUADOR (1824): nordestinos — especialmente em Pernambuco, liderados pelo padre Frei Caneca — se rebelaram contra o centralismo e a Constituição outorgada. Propunham uma república federalista. D. Pedro reprimiu com violência e mandou executar Frei Caneca.",
          "GUERRA DA CISPLATINA (1825-1828): tentativa de manter o atual Uruguai sob domínio brasileiro. Terminou em derrota — o Uruguai tornou-se país independente. Custo enorme, resultado humilhante.",
          "ABDICAÇÃO (7/4/1831): pressionado por crises econômicas, desgaste militar, tensões com as elites e a questão da sucessão ao trono português, D. Pedro abdicou em favor do filho de 5 anos. Começava o Período Regencial — a fase mais turbulenta do século XIX brasileiro."
        ]},
        { tipo: "ex", txt: "POR QUE A ABDICAÇÃO ERA INEVITÁVEL? O modelo de D. Pedro era estruturalmente conflitivo: o Poder Moderador criava ressentimento; o centralismo antagonizava as elites regionais; a dissolução da Constituinte nunca foi esquecida. A Noite das Garrafadas (1831) foi só o estopim — a crise era estrutural." }
      ]}
    ],
    questoes: [
      { q: "'A transferência da Corte portuguesa para o Brasil (1808) produziu efeitos contraditórios: antecipou a independência ao criar estruturas estatais modernas, mas também a adiou ao satisfazer provisoriamente as elites coloniais.' Qual elemento melhor sustenta a segunda parte dessa afirmação?", alts: ["Os Tratados de 1810 aprofundaram a dependência econômica em relação à Inglaterra.", "A elevação do Brasil a Reino Unido em 1815 colocou as elites coloniais em posição equivalente à metropolitana, reduzindo o incentivo imediato para a ruptura.", "A Missão Artística Francesa trouxe ideias liberais que aceleraram o movimento de independência.", "A abertura dos portos criou classe comercial interessada na independência imediata.", "A criação do Banco do Brasil gerou insatisfação das elites com a política monetária joanina."], g: "B", j: "A elevação a Reino Unido satisfez a demanda das elites por equiparação à metrópole. Sem o estigma colonial, a urgência pela independência diminuiu. Só quando as Cortes de 1820 ameaçaram reverter esse status é que as elites se mobilizaram. O paradoxo joanino: quanto mais D. João modernizava, mais adiava a ruptura — e quanto mais as Cortes queriam reverter, mais a aceleravam." },
      { q: "O historiador José Murilo de Carvalho descreve a independência brasileira como 'revolução conservadora feita de cima para baixo'. Qual das afirmações abaixo é INCOMPATÍVEL com essa interpretação?", alts: ["A escravidão foi mantida intacta após a independência.", "A estrutura fundiária colonial foi preservada sob o Império.", "A independência foi liderada por membros da própria dinastia colonial (os Bragança).", "Setores populares — escravizados, índios, camponeses — participaram ativamente das decisões sobre o modelo político adotado.", "A forma monárquica foi mantida como garantia de unidade territorial e hierarquia social."], g: "D", j: "A interpretação de Carvalho afirma exatamente o oposto do que D diz: os setores populares foram excluídos do processo. A independência foi conduzida pelas elites sem mobilização das camadas subalternas. Isso é o que a torna 'feita de cima para baixo' — ruptura política sem ruptura social." },
      { q: "Sobre a Constituição de 1824, analise as afirmativas: I. Estabeleceu o voto censitário, excluindo pobres e escravizados. II. O Poder Moderador permitia ao imperador intervir nos três poderes clássicos. III. Foi a constituição mais longeva da história brasileira, vigendo até 1891. IV. Foi aprovada pela Assembleia Constituinte convocada por D. Pedro I. Estão CORRETAS apenas:", alts: ["I e II", "II e III", "I, II e III", "II, III e IV", "I, II, III e IV"], g: "C", j: "IV é falsa: a Assembleia Constituinte foi DISSOLVIDA por D. Pedro em 1823 por considerá-la radical demais. A Constituição de 1824 foi OUTORGADA — imposta pelo imperador sem aprovação pelo parlamento. As demais são corretas: I (voto censitário real), II (Poder Moderador), III (1824–1891 = 67 anos, a mais longa)." },
      { q: "Os Tratados de 1810 são apontados como fator de 'desindustrialização precoce' do Brasil porque:", alts: ["Proibiram a importação de produtos manufaturados ingleses para proteger a produção portuguesa.", "Ao fixar tarifas preferenciais para produtos britânicos inferiores às cobradas dos próprios portugueses, inundaram o mercado colonial com manufaturados ingleses baratos, inviabilizando o desenvolvimento de indústrias locais.", "Obrigaram o Brasil a exportar exclusivamente produtos primários para a Inglaterra.", "Transferiram o controle do Banco do Brasil para capitais britânicos.", "Criaram monopólio inglês sobre o comércio de escravizados no Brasil."], g: "B", j: "Produtos britânicos: 15% de tarifa. Portugueses: 16%. Demais países: 24%. A vantagem estrutural dada à indústria britânica, a mais produtiva do mundo à época, tornou impossível qualquer concorrência local. O Brasil foi integrado à divisão internacional do trabalho como exportador de matérias-primas — padrão que persistiu por mais de um século." },
      { q: "A Confederação do Equador (1824) e a Balaiada (1838) são dois movimentos do período imperial. Qual afirmação descreve corretamente a diferença entre eles?", alts: ["Ambos foram movimentos exclusivamente de elites regionais contra o centralismo do Rio de Janeiro.", "A Confederação foi movimento de elites nordestinas com projeto republicano-federalista; a Balaiada foi revolta popular no Maranhão envolvendo escravizados, índios e camponeses sem projeto político unificado.", "A Confederação foi vitoriosa; a Balaiada foi derrotada.", "Ambos tiveram participação popular ampla e propunham a abolição da escravidão.", "A Confederação ocorreu durante o Período Regencial; a Balaiada, no Primeiro Reinado."], g: "B", j: "A Confederação (1824) foi liderada pelas elites pernambucanas com programa político claro: república federalista inspirada nos EUA. A Balaiada (1838–1841) foi revolta social de camadas subalternas — escravizados fugidos, índios, camponeses pobres — com demandas difusas e sem projeto político articulado. São expressões de conflitos de naturezas completamente distintas." },
      { q: "'Em 7 de abril de 1831, o imperador abdicou em favor de seu filho.' Qual conjunto de fatores ESTRUTURAIS — e não apenas conjunturais — explica essa abdicação?", alts: ["A Noite das Garrafadas e a perda de apoio do Exército foram as causas determinantes.", "A crise financeira causada pela guerra da Cisplatina foi o único fator relevante.", "A contradição entre o modelo centralizador do Poder Moderador e os interesses autonomistas das elites regionais, somada ao desgaste acumulado com a Confederação do Equador, a Cisplatina e a questão sucessória portuguesa, tornou a governabilidade estruturalmente inviável.", "A influência britânica forçou D. Pedro a abdicar para instalar um governo mais liberal.", "A pressão exclusiva do Partido Liberal provocou a abdicação."], g: "C", j: "Análise estrutural: o modelo de D. Pedro concentrava poder no Rio, conflitando com elites regionais que queriam autonomia. A Constituição outorgada gerava ressentimento permanente. A Cisplatina evidenciou incapacidade militar. A questão do trono português gerou suspeita de recolonização. Cada crise individual foi insuperável porque o modelo político era intrinsecamente conflitivo." },
      { q: "A Revolução Liberal do Porto (1820) é descrita por historiadores como 'catalisador' da independência brasileira. Qual mecanismo explica essa função catalisadora?", alts: ["As Cortes aprovaram imediatamente a independência do Brasil para evitar conflito.", "As Cortes exigiram o retorno de D. João e medidas de recolonização, transformando a ameaça externa em fator de coesão das elites brasileiras em torno de uma identidade comum — sem esse inimigo, a independência teria sido adiada indefinidamente.", "D. João financiou a Revolução do Porto para criar pretexto para a independência.", "A revolução portuguesa trouxe ideias liberais que inspiraram diretamente os patriotas brasileiros.", "As Cortes reconheceram imediatamente a independência para manter relações comerciais."], g: "B", j: "Antes de 1820, as elites brasileiras estavam razoavelmente satisfeitas com o status de Reino Unido — não havia urgência para a independência. As Cortes criaram o inimigo comum: ao ameaçar reverter as conquistas joaninas, unificaram setores divergentes da elite brasileira. O paradoxo: a Revolução Liberal portuguesa foi condição necessária para a independência conservadora brasileira." },
      { q: "O Poder Moderador, criado pela Constituição de 1824, foi criticado pelo jurista Zacarias de Góis e Vasconcellos como 'poder pessoal do imperador'. Qual aspecto da Constituição justifica essa crítica?", alts: ["O Poder Moderador era exercido pelo Conselho de Estado, não pelo imperador.", "O imperador era irresponsável politicamente — 'a pessoa do Imperador é inviolável e sagrada' — e simultaneamente detentor do poder de intervir nos três poderes, sem qualquer mecanismo de responsabilização.", "O Poder Moderador era apenas simbólico, sem atribuições reais.", "O poder legislativo controlava o Moderador por meio de comissões parlamentares.", "A Constituição previa eleições diretas para o exercício do Poder Moderador."], g: "B", j: "O artigo 99 da Constituição de 1824 declarava a inviolabilidade do imperador — ele não respondia por seus atos. Ao mesmo tempo, o Poder Moderador lhe dava prerrogativas imensuráveis: nomear senadores vitalícios da lista tríplice, dissolver a Câmara, nomear e demitir ministros. Era poder absoluto sem responsabilidade — precisamente o que Zacarias criticava como 'poder pessoal'." },
      { q: "Sobre a Missão Artística Francesa (1816), qual afirmação é INCORRETA?", alts: ["Foi composta por artistas como Jean-Baptiste Debret e Grandjean de Montigny.", "Introduziu o estilo neoclássico no Brasil, em substituição ao barroco colonial.", "Fundou a Academia Imperial de Belas Artes, instituição central na formação artística brasileira.", "Chegou ao Brasil como parte das negociações do Tratado de Aliança com a França napoleônica.", "Registrou visualmente a sociedade colonial — seus afrescos e litografias são fontes históricas fundamentais."], g: "D", j: "A Missão Artística Francesa foi contratada por D. João VI após a derrota de Napoleão, não como parte de qualquer aliança com a França napoleônica — que era o inimigo que havia forçado a fuga da Corte para o Brasil. O artista Lebreton liderou o grupo, que veio por iniciativa de D. João para modernizar as artes no Brasil." },
      { q: "A independência do Brasil em 1822 diferiu das independências hispano-americanas em vários aspectos. Qual diferença é mais relevante para compreender o desenvolvimento político posterior de ambas as regiões?", alts: ["O Brasil travou guerra prolongada contra Portugal; a América hispânica obteve independência por via diplomática.", "O Brasil manteve a unidade territorial sob monarquia centralizada; a América hispânica fragmentou-se em repúblicas, com frequentes guerras civis regionais.", "A independência hispano-americana foi liderada por membros da nobreza; a brasileira, pela burguesia comercial.", "O Brasil aboliu a escravidão imediatamente após a independência; a América hispânica a manteve.", "Ambas as regiões seguiram trajetórias idênticas após a independência."], g: "B", j: "A monarquia centralizada brasileira garantiu a unidade territorial — o Brasil não se fragmentou como as ex-colônias espanholas (que geraram mais de 15 repúblicas). Esse resultado foi intencional: as elites brasileiras temiam a fragmentação vista na América hispânica. A forma monárquica foi o instrumento da unidade, mas ao custo de conservar a escravidão e o latifúndio." },
      { q: "A noção de que a independência do Brasil foi 'negociada' e não 'conquistada' refere-se principalmente a:", alts: ["A ausência de qualquer conflito militar durante o processo de independência.", "O fato de que Portugal reconheceu a independência mediante indenização, com mediação britânica, preservando vínculos econômicos e dinásticos — sem ruptura violenta como nas independências hispano-americanas.", "A participação de Portugal nas negociações constitucionais de 1823.", "O papel exclusivo da Inglaterra na promoção da independência.", "A ausência de sentimento nacionalista entre as elites brasileiras de 1822."], g: "B", j: "A independência 'negociada': Portugal reconheceu em 1825 mediante £2 milhões de indenização (que o Brasil tomou emprestado da própria Inglaterra). D. Pedro era Bragança — filho do rei português. A ruptura foi política e geográfica, mas não dinástica nem econômica (os vínculos com a Inglaterra continuaram). Por isso 'negociada' — bem diferente das guerras de 10-15 anos que caracterizaram as independências hispano-americanas." }
    ],
  },
  {
    id: "hist2", icon: "👑", nome: "História 2",
    topico: "Absolutismo e Humanismo Renascentista",
    conteudo: [
      { h2: "1. O ABSOLUTISMO — QUANDO O REI ERA O ESTADO", items: [
        { tipo: "p", txt: "Luis XIV da França resumiu o absolutismo em uma frase que pode ou não ter dito, mas que captura perfeitamente o espírito do período: 'L'État, c'est moi' — O Estado sou eu. Entre os séculos XVI e XVIII, a Europa ocidental foi governada por monarquias que concentravam todos os poderes na figura do rei: legislar, executar e julgar eram prerrogativas do mesmo homem." },
        { tipo: "p", txt: "Mas o absolutismo não surgiu do nada. Ele foi a resposta política ao caos feudal — séculos de fragmentação do poder, guerras entre nobres e instabilidade crônica. A burguesia comercial, que precisava de estradas seguras, moeda estável e leis previsíveis, apoiou ativamente a centralização monárquica. Foi uma aliança de interesses: o rei precisava de dinheiro, a burguesia precisava de ordem." },
        { tipo: "h3", txt: "Os três teóricos — três fundamentos completamente diferentes" },
        { tipo: "ul", items: [
          "MAQUIAVEL (O Príncipe, 1513) — O pai da ciência política moderna. Escrevendo numa Itália fragmentada e invadida por potências estrangeiras, ele fez uma coisa inédita: separou a política da moral religiosa. Para ele, o critério do bom governo não é a bondade do príncipe, mas sua eficácia. Um príncipe bondoso que perde o poder é pior que um cruel que mantém a ordem. Isso choca, mas é a fundação do pensamento político moderno.",
          "HOBBES (Leviatã, 1651) — Escreveu durante a Guerra Civil Inglesa, depois de ver o rei Carlos I ser decapitado. Para ele, sem Estado há 'guerra de todos contra todos' e a vida humana é 'solitária, pobre, sórdida, brutal e curta'. A solução: um contrato social onde todos cedem seus direitos a um soberano absoluto e irrevogável. O Estado é o Leviatã — o monstro bíblico que todos temem. Sua justificativa é RACIONAL, não religiosa.",
          "BOSSUET (séc. XVII) — Bispo e conselheiro de Luis XIV. Para ele, o poder do rei vem DIRETAMENTE DE DEUS. Questionar o monarca é questionar a vontade divina — sacrilégio. É a justificativa mais simples e mais poderosa: ninguém argumenta com Deus."
        ]},
        { tipo: "ex", txt: "COMPARE OS TRÊS: Maquiavel = 'o poder funciona assim na prática' (pragmático). Hobbes = 'o poder é necessário pela razão' (racional). Bossuet = 'o poder vem de Deus' (teológico). Mesmo resultado (rei absoluto), três caminhos filosóficos opostos." }
      ]},
      { h2: "2. A TRANSIÇÃO — COMO O MUNDO MEDIEVAL VIROU MODERNO", items: [
        { tipo: "p", txt: "A Idade Média não acabou de um dia para o outro com uma data no calendário. Foi um processo lento, doloroso e desigual que durou séculos. Mas alguns eventos aceleraram a mudança de um jeito que ninguém esperava." },
        { tipo: "ul", items: [
          "PESTE NEGRA (1347-1353): matou entre 30% e 60% da população europeia. O impacto econômico foi paradoxalmente libertador: com menos camponeses vivos, os que sobreviveram passaram a negociar condições com os senhores feudais. Pela primeira vez, servos tinham poder de barganha. A rigidez feudal começou a se dissolver.",
          "CRISE DA IGREJA: o Cisma do Ocidente (dois papas ao mesmo tempo), a corrupção do clero e os escândalos da Inquisição minaram a autoridade espiritual que sustentava a ordem medieval. Quando a Igreja perde credibilidade, o mundo que ela organizava também vacila.",
          "A BURGUESIA E AS CIDADES: enquanto o feudalismo era rural e autossuficiente, o comércio era urbano e interdependente. As cidades cresceram, o dinheiro circulou, surgiram bancos e letras de câmbio. Uma nova classe — que não era nobre nem servo — acumulou poder econômico e precisava de proteção política.",
          "EXPANSÃO MARÍTIMA: Portugal e Espanha abriram rotas para a Ásia e as Américas. O ouro e a prata americanos inundaram a Europa, financiaram os Estados nacionais e criaram um capitalismo comercial global."
        ]}
      ]},
      { h2: "3. O HUMANISMO — O HOMEM NO CENTRO DO UNIVERSO", items: [
        { tipo: "p", txt: "Durante a Idade Média, a resposta para qualquer pergunta importante começava e terminava em Deus. A arte representava santos e virgens. A filosofia era serva da teologia. O ser humano era criatura passageira neste vale de lágrimas." },
        { tipo: "p", txt: "O Renascimento virou essa lógica de cabeça para baixo. Inspirados pelos textos greco-romanos — redescobertos após a queda de Constantinopla em 1453, quando intelectuais gregos fugiram para a Itália trazendo manuscritos originais — os humanistas colocaram o ser humano no centro. 'O homem é a medida de todas as coisas', dizia Protágoras, e os renascentistas concordavam." },
        { tipo: "ul", items: [
          "HUMANISMO ITALIANO (Petrarca, Leonardo, Michelangelo, Rafael): ênfase nas artes, na filosofia e na beleza humana. Florença dos Médici foi o epicentro — uma família de banqueiros que financiou os maiores artistas da história.",
          "HUMANISMO NÓRDICO (Erasmo de Rotterdam, Thomas More): mais crítico e reformador. 'Elogio da Loucura' de Erasmo ridicularizou a corrupção da Igreja por dentro da fé. 'Utopia' de More imaginou uma sociedade ideal. Esse humanismo cristão preparou o terreno para a Reforma Protestante.",
          "A IMPRENSA DE GUTENBERG (c.1450): a tecnologia que mudou tudo. Antes, copiar um livro levava meses e custava fortunas. Com os tipos móveis de Gutenberg, livros podiam ser produzidos em série. As 95 Teses de Lutero se espalharam pela Europa em semanas. Sem a imprensa, não haveria Reforma Protestante, nem Renascimento em escala continental."
        ]},
        { tipo: "ex", txt: "ATENÇÃO: o Renascimento não rompeu completamente com a Idade Média. Os temas das pinturas continuaram sendo religiosos (virgens, cristos, anunciações). A mudança foi de MÉTODO e ESTÉTICA, não de tema. Rafael pintava Madonas com técnica renascentista (perspectiva, naturalismo) sobre conteúdo medieval (a Virgem)." }
      ]}
    ],
    questoes: [
      { q: "Hobbes escreve Leviatã (1651) num contexto histórico específico que moldou sua teoria. Qual é esse contexto e como ele se manifesta na teoria?", alts: ["A prosperidade comercial holandesa levou Hobbes a defender o livre mercado.", "A Guerra Civil Inglesa (1642–1651) e a execução de Carlos I forneceram a Hobbes a experiência empírica do colapso estatal, justificando o soberano absoluto como única alternativa ao caos.", "As guerras religiosas francesas inspiraram Hobbes a propor separação entre Igreja e Estado.", "A expansão colonial levou Hobbes a teorizar sobre o direito dos povos colonizados.", "A Revolução Gloriosa de 1688 demonstrou a viabilidade da monarquia constitucional."], g: "B", j: "Hobbes viveu a Guerra Civil Inglesa e testemunhou a decapitação de Carlos I em 1649 — dois anos antes de publicar Leviatã. A experiência concreta de um Estado em colapso ('guerra de todos contra todos') não era metáfora, mas realidade observada. Isso explica a dureza de sua solução: soberano absoluto irrevogável, pois qualquer limitação abre caminho para o caos." },
      { q: "A afirmação 'o fim justifica os meios', associada a Maquiavel, é uma simplificação de seu pensamento. Qual interpretação mais precisa do projeto maquiavélico pode ser formulada?", alts: ["Maquiavel defendia que o governante devia sempre agir com crueldade para manter o poder.", "Maquiavel propunha a autonomia da política em relação à moral religiosa medieval: o governante deve agir pela eficácia na manutenção do Estado, usando virtù (habilidade política) e adaptando-se à fortuna — o critério é político, não moral.", "Maquiavel era defensor do absolutismo teológico, alinhado com Bossuet.", "Maquiavel defendia a democracia direta como sistema mais eficaz.", "O projeto maquiavélico era exclusivamente teórico, sem relação com a Itália fragmentada do século XVI."], g: "B", j: "Maquiavel inaugura a ciência política ao separar política de ética religiosa. Escrevendo na Itália fragmentada e invadida por potências estrangeiras, ele propunha um príncipe capaz de unificá-la. A 'virtù' maquiavélica não é virtude moral, mas habilidade política — a capacidade de adaptar os meios à necessidade do momento. O critério é estabilidade e eficácia do Estado." },
      { q: "O mercantilismo, política econômica do absolutismo, apresentava uma contradição interna que antecipava seu colapso. Qual era essa contradição?", alts: ["Era incompatível com a escravidão colonial, sua principal fonte de riqueza.", "Ao buscar maximizar exportações e minimizar importações, cada Estado tentava acumular metais às custas dos outros — lógica de soma zero que produzia guerras comerciais e bloqueava o desenvolvimento do comércio internacional.", "Era intrisecamente democrático, incompatível com as monarquias absolutas.", "A proibição de exportar metais preciosos inviabilizava o comércio.", "Ignorava completamente o papel da agricultura na economia nacional."], g: "B", j: "A contradição estrutural: se todos os Estados tentam simultaneamente maximizar exportações e minimizar importações, o comércio internacional se contrai — pois cada exportação de um é a importação de outro. Essa lógica de soma zero exigia conflito permanente por mercados e colônias, gerando as guerras comerciais que, ironicamente, enfraqueciam os próprios Estados que o mercantilismo pretendia fortalecer." },
      { q: "A Peste Negra (1347–1353) é apontada como fator de transição feudal-capitalista. Qual mecanismo socioeconômico explica essa conexão?", alts: ["A epidemia destruiu os arquivos feudais, liberando juridicamente os servos.", "A mortalidade maciça gerou escassez de mão de obra camponesa, invertendo a relação de forças: servos sobreviventes passaram a negociar condições, introduzindo proto-relações salariais e mobilidade social que corroíam a rigidez feudal.", "A epidemia enfraqueceu a Igreja, que perdeu o controle sobre a produção artesanal.", "Os médicos acumularam capital suficiente para fundar os primeiros bancos.", "A redução populacional diminuiu a demanda por alimentos, tornando inviável a grande propriedade."], g: "B", j: "O mecanismo é econômico e de poder: com 30–60% da população morta, a terra era abundante e a mão de obra escassa. Senhorios que antes podiam coagir os servos agora precisavam atraí-los. Camponeses negociavam, migravam para cidades, exigiam pagamento — comportamentos incompatíveis com a servidão feudal. A Peste Negra não 'causou' o capitalismo, mas acelerou a dissolução das relações servis que o antecediam." },
      { q: "Qual afirmação sobre a distinção entre os absolutismos de Hobbes e Bossuet é mais precisa?", alts: ["Hobbes defende monarquia constitucional; Bossuet, tirania absoluta.", "Bossuet e Hobbes chegam às mesmas conclusões políticas por fundamentos idênticos.", "Hobbes fundamenta o absolutismo no contrato social racional (os homens cedem direitos por autopreservação); Bossuet o fundamenta teologicamente (o rei recebe poder diretamente de Deus). São epistemologias políticas opostas.", "Hobbes é mais radical que Bossuet porque nega qualquer limite ao poder soberano.", "Bossuet precede historicamente Hobbes e influenciou diretamente o Leviatã."], g: "C", j: "A distinção é de fundamento: Hobbes justifica o absolutismo pela razão — os homens, racionalmente, escolhem ceder liberdade a um soberano para escapar da guerra. Bossuet o justifica pela teologia — Deus ordena o poder monárquico e questioná-lo é heresia. O mesmo resultado político (monarquia absoluta) com fundamentos filosóficos radicalmente distintos e consequências diferentes: o argumento de Hobbes é secular e pode ser questionado racionalmente; o de Bossuet é sagrado e intocável." },
      { q: "O Humanismo Renascentista é frequentemente apresentado como ruptura total com a Idade Média. Qual afirmação qualifica melhor essa visão?", alts: ["A ruptura foi total: o Renascimento negou completamente a herança medieval.", "Os temas da arte renascentista continuaram predominantemente religiosos — virgens, cristos, santos —, representados com novas técnicas (perspectiva, naturalismo). O Renascimento reinterpretou, mais do que rompeu, a tradição medieval.", "O Renascimento ocorreu exclusivamente em países protestantes, sem influência católica.", "Os humanistas rejeitaram completamente a filosofia escolástica medieval.", "A imprensa destruiu os manuscritos medievais, tornando impossível qualquer continuidade."], g: "B", j: "A interpretação revisionista (Panofsky, Huizinga) mostra que os temas permaneceram medievais: as Madonas de Rafael são tecnicamente renascentistas (perspectiva, naturalismo anatômico) e tematicamente medievais (virgem, divindade, devoção). O Renascimento não repudiou o Medievo — o reinterpretou com novos instrumentos técnicos e filosóficos. A ruptura foi de método, não de conteúdo." },
      { q: "A queda de Constantinopla (1453) é citada como marco do Renascimento. Porém, historiadores pós-coloniais criticam essa periodização. Qual é a crítica?", alts: ["A queda não tem relevância histórica.", "A periodização é eurocêntrica: 1453 marca transição para a Europa, mas é conquista para o Império Otomano e irrelevante para a China Ming ou o mundo islâmico. 'Idade Média' é categoria construída pelo Ocidente, sem equivalente universal.", "A data correta do início do Renascimento é 1400, não 1453.", "A queda não afetou o Renascimento italiano, já em curso.", "A periodização em 'idades' é científica e universalmente aceita."], g: "B", j: "A crítica pós-colonial é metodológica: toda periodização é uma escolha historiográfica que reflete o ponto de vista de quem a cria. 'Idade Média' descreve a experiência europeia — para o Império Otomano, 1453 é glorioso; para a China, é irrelevante; para o Mali, inexistente. Usar essas categorias como universais impõe a perspectiva europeia como se fosse a história da humanidade." },
      { q: "A imprensa de Gutenberg (c.1450) é chamada de 'tecnologia disruptiva'. Qual foi sua consequência mais desestabilizadora para a ordem medieval?", alts: ["Fortaleceu o monopólio eclesiástico ao produzir Bíblias em série.", "Ao democratizar o acesso aos textos e possibilitar Bíblias em línguas vernáculas, quebrou o monopólio clerical sobre a interpretação religiosa — cada leitor podia interpretar as Escrituras diretamente, tornando o sacerdote dispensável como mediador e criando condição estrutural para a Reforma Protestante.", "Foi criada exclusivamente para produzir Bíblias, sem impacto cultural amplo.", "Seu custo elevado manteve o saber restrito às elites eclesiásticas.", "Não teve impacto significativo até o século XVIII."], g: "B", j: "A consequência mais disruptiva foi a quebra do monopólio hermenêutico: quando a Bíblia em alemão (Lutero, 1522) circulou em massa, cada fiel podia lê-la e interpretá-la — tornando dispensável o sacerdote como mediador obrigatório. A imprensa não 'causou' a Reforma, mas a tornou irreversível: as 95 Teses de Lutero se espalharam pela Europa em semanas — impossível antes de Gutenberg." },
      { q: "O humanismo nórdico de Erasmo e Thomas More é chamado de 'humanismo cristão' para distingui-lo do italiano. Qual característica justifica esse adjetivo?", alts: ["Os humanistas nórdicos eram todos sacerdotes, ao contrário dos italianos.", "O humanismo nórdico articulava a retomada dos clássicos com a crítica interna à Igreja e proposta de reforma moral do cristianismo, sem romper com a fé — preparando intelectualmente a Reforma Protestante.", "O humanismo nórdico rejeitava os textos greco-romanos.", "Os humanistas nórdicos eram ateus que usavam o cristianismo como cobertura.", "Era exclusivamente filosófico, sem preocupações religiosas."], g: "B", j: "'Elogio da Loucura' de Erasmo e 'Utopia' de More criticam a corrupção eclesiástica e a hipocrisia clerical — mas a partir de dentro da fé cristã, propondo reforma, não ruptura. Esse humanismo 'cristão' foi o caldo de cultura da Reforma: Lutero reconhecia dívida intelectual com Erasmo, embora os dois tenham se separado quanto às consequências. O humanismo nórdico preparou o terreno sem sair da Igreja." },
      { q: "A aliança entre burguesia e monarquia na formação dos Estados nacionais modernos é descrita pela historiografia marxista como 'aliança de interesses convergentes'. O que tornou essa aliança possível e duradoura?", alts: ["A burguesia assumiu o poder político diretamente, dispensando os reis.", "A Igreja Católica mediou a aliança entre burguesia e monarquia.", "A burguesia precisava de estabilidade jurídica, moeda unificada e mercados seguros — coisas que só o Estado centralizado oferecia; os reis precisavam de recursos financeiros que só a burguesia comercial podia fornecer. Cada lado tinha o que o outro precisava.", "A nobreza feudal financiou a aliança em troca de proteção militar.", "A aliança foi imposta pela Igreja durante as Cruzadas."], g: "C", j: "A complementaridade é a chave: a burguesia precisava de Estado forte (estradas, tribunais, moeda estável, leis de contratos) para expandir o comércio — incompatível com a fragmentação feudal. Os reis precisavam de dinheiro para manter exércitos e burocracia — que a nobreza feudal não fornecia mais. Ambos tinham interesses objetivamente convergentes contra o mesmo adversário: a nobreza feudal." },
      { q: "O conceito de 'razão de Estado' em Maquiavel representa ruptura com qual tradição medieval?", alts: ["Com a tradição escolástica que defendia a separação entre filosofia e teologia.", "Com a tradição do 'espelho de príncipes' medieval, que avaliava o governante pela virtude cristã e pela conformidade à lei divina — Maquiavel substitui esse critério moral pelo critério político: o governante é julgado pela eficácia em manter o Estado.", "Com a tradição aristotélica da política como ciência prática.", "Com o nominalismo de Ockham que negava a existência de universais políticos.", "Com o agostinismo político que separava as duas cidades."], g: "B", j: "Os 'espelhos de príncipes' medievais — gênero literário de conselhos a governantes — avaliavam o soberano pela bondade, piedade e conformidade à lei divina. Maquiavel inverte o critério: o que importa não é se o príncipe é bom, mas se é eficaz. Um príncipe bondoso que perde o poder é pior do que um cruel que o mantém. Essa inversão de critério é a ruptura fundadora da ciência política moderna." }
    ],
  },
  {
    id: "geo1", icon: "🌎", nome: "Geografia 1",
    topico: "Climatologia: Ciclones, El Niño, Chuvas e Massas de Ar",
    conteudo: [
      { h2: "1. CICLONES E ANTICICLONES — A DANÇA DOS VENTOS", items: [
        { tipo: "p", txt: "Imagine o ar como um fluido que se comporta como água: ele sempre flui de onde há mais pressão para onde há menos. Um ciclone é uma área de baixa pressão — o ar de fora vai convergindo para dentro em espiral, como água indo para o ralo. O anticiclone é o oposto: área de alta pressão, com o ar se espalhando para fora." },
        { tipo: "p", txt: "Por que os ciclones giram? Pela Força de Coriolis — um efeito da rotação da Terra que desvia o movimento dos ventos para a direita no Hemisfério Norte e para a esquerda no Sul. Resultado: ciclones giram anti-horário no HN e horário no HS. Anticiclones fazem o oposto." },
        { tipo: "ul", items: [
          "CICLONE TROPICAL: forma-se sobre oceanos com temperatura acima de 26°C. A evaporação intensa alimenta o sistema. Pode ter ventos de até 300 km/h. Recebe nomes diferentes conforme a região: furacão (Atlântico Norte e Pacífico NE), tufão (Pacífico NW), ciclone (Índico e Pacífico Sul).",
          "CICLONE EXTRATROPICAL: forma-se em latitudes médias, pelo encontro de massas de ar quente e fria. Menos intenso que o tropical, mas mais frequente no Brasil (Sul e Sudeste).",
          "ANTICICLONE: o vilão das secas. Alta pressão = ar descendo e aquecendo = sem chuva. O Anticiclone Subtropical do Atlântico Sul é responsável pelo tempo estável no litoral e influencia as chuvas do Brasil."
        ]}
      ]},
      { h2: "2. EL NIÑO E LA NIÑA — O OCEANO QUE CONTROLA O CLIMA BRASILEIRO", items: [
        { tipo: "p", txt: "O ENOS (El Niño-Oscilação Sul) é um dos fenômenos climáticos mais estudados do mundo — e um dos que mais afetam o Brasil. A ideia central: o Pacífico equatorial e a atmosfera acima dele se afetam mutuamente em um ciclo de retroalimentação. Pequenas variações na temperatura do oceano alteram os ventos; ventos alterados mudam a temperatura do oceano; e isso se amplifica." },
        { tipo: "h3", txt: "El Niño — quando o Pacífico aquece o que não deveria" },
        { tipo: "p", txt: "Normalmente, ventos alísios empurram água quente do Pacífico Leste (costa da América do Sul) para o Oeste (costa da Ásia/Austrália). No El Niño, esses ventos enfraquecem — a água quente fica acumulada no Pacífico Leste. Resultado no Brasil:" },
        { tipo: "ul", items: [
          "Norte e Nordeste: seca intensa. As chuvas que normalmente caem sobre essas regiões são suprimidas.",
          "Sul e Sudeste: chuvas acima da média, risco de enchentes. As frentes frias ficam mais frequentes e intensas.",
          "Amazônia: aumento do risco de incêndios pela seca prolongada."
        ]},
        { tipo: "h3", txt: "La Niña — o oposto" },
        { tipo: "p", txt: "La Niña é o fenômeno inverso: os ventos alísios se intensificam, o Pacífico Leste esfria mais do que o normal. Os impactos no Brasil são praticamente opostos aos do El Niño:" },
        { tipo: "ul", items: [
          "Norte e Nordeste: chuvas acima da média — boas notícias para o sertão.",
          "Sul: seca e invernos mais rigorosos — problema para hidrelétricas e agropecuária.",
          "Duração: La Niña tende a ser mais prolongada que El Niño."
        ]},
        { tipo: "ex", txt: "COMO LEMBRAR: El Niño = El = 'ele aquece' o Pacífico Leste = seca no Nordeste, chuva no Sul. La Niña = La = 'ela esfria' = chuva no Nordeste, seca no Sul. É o inverso perfeito." },
        { tipo: "h3", txt: "ZCAS — a faixa de chuvas do verão brasileiro" },
        { tipo: "p", txt: "A Zona de Convergência do Atlântico Sul (ZCAS) é uma faixa de nebulosidade que se forma no verão entre a Amazônia e o Atlântico Sul, resultado da interação entre a massa Equatorial Continental (mEc) e a massa Tropical Atlântica (mTa). Quando a ZCAS se instala por mais de 4 dias seguidos, é responsável pelas enchentes históricas em Minas Gerais, Rio de Janeiro e São Paulo." }
      ]},
      { h2: "3. TIPOS DE CHUVA — POR QUE CHOVE DE FORMAS DIFERENTES", items: [
        { tipo: "ul", items: [
          "CONVECTIVA: o sol aquece intensamente o solo → o ar úmido sobe rapidamente → condensa → precipita em pancadas intensas e curtas, geralmente à tarde. É o padrão das tardes de verão na Amazônia e no Centro-Oeste. Cumulonimbus gigantescos em questão de horas.",
          "OROGRÁFICA (de relevo): massa de ar úmido encontra uma barreira montanhosa → é forçada a subir → esfria → condensa no barlavento (lado de onde vem o vento). O sotavento fica na 'sombra de chuva' — muito mais seco. Explica parte da aridez do sertão nordestino e a abundância de chuvas na Serra do Mar.",
          "FRONTAL: o encontro de massas de ar com temperaturas diferentes. A massa quente e úmida sobe sobre a fria → condensa → precipita. Mais duradoura e abrangente que a convectiva. Domina o Sul e Sudeste, especialmente no inverno."
        ]}
      ]},
      { h2: "4. MASSAS DE AR — OS PERSONAGENS DO CLIMA BRASILEIRO", items: [
        { tipo: "p", txt: "O Brasil é um país continental com cinco tipos de clima diferentes — e a explicação está nas massas de ar que o dominam. Pense nas massas de ar como personagens com personalidades distintas: algumas são quentes, outras frias; algumas são úmidas, outras secas. O clima de cada região depende de qual personagem domina o palco." },
        { tipo: "ul", items: [
          "mEc (Equatorial Continental) — nasce na Amazônia. QUENTE e ÚMIDA. É a massa das chuvas amazônicas e do verão do Brasil Central. No verão, avança sobre grande parte do país.",
          "mTa (Tropical Atlântica) — nasce no Atlântico Sul subtropical. QUENTE e ÚMIDA. É a principal fornecedora de chuvas do litoral leste e do Sudeste. No verão, interage com a mEc para formar a ZCAS.",
          "mTc (Tropical Continental) — nasce no Chaco (Paraguai/Bolívia). QUENTE e SECA. É a massa das ondas de calor e dos incêndios do Centro-Oeste. Não confunda: quente não significa chuvosa.",
          "mPa (Polar Atlântica) — nasce no Atlântico Sul polar. FRIA e ÚMIDA. É responsável pelas frentes frias do Sul. Em episódios intensos, avança até o Nordeste. Único agente que traz chuva frontal no inverno.",
          "mEa (Equatorial Atlântica) — nasce no Atlântico Norte. QUENTE e ÚMIDA. Atua no litoral Norte e Nordeste."
        ]},
        { tipo: "ex", txt: "POR QUE O SUL NÃO TEM SECA? Porque a mPa (Polar Atlântica) penetra o Sul durante TODO o ano, não só no inverno. Frentes frias regulares = chuvas em todas as estações = sem período seco definido. Unique no Brasil." }
      ]}
    ],
    questoes: [
      { q: "No verão 2021–2022, o Sul e Sudeste do Brasil registraram enchentes históricas enquanto o Nordeste enfrentava seca severa. Qual combinação de fatores explica simultaneamente as duas situações?", alts: ["El Niño no Sul/Sudeste e La Niña no Nordeste, atuando simultaneamente.", "A ZCAS ativa (mEc + mTa) concentrou chuvas no Sudeste, enquanto o El Niño suprimiu as chuvas no Nordeste — padrão assimétrico típico de anos de El Niño no verão brasileiro.", "A mPa intensificada causou enchentes no Sul e bloqueou as chuvas no Nordeste.", "A mTc avançou pelo Sudeste trazendo umidade e reduziu as chuvas no Nordeste.", "A ZCAS atuou no Nordeste; o El Niño causou as enchentes no Sul."], g: "B", j: "Durante El Niño, a circulação atmosférica favorece chuvas acima da média no Sul/Sudeste (via intensificação da ZCAS e das frentes frias) e seca no Norte/Nordeste (via supressão da convecção equatorial). A ZCAS — faixa de nebulosidade mEc+mTa — ativa no verão amplifica ainda mais as chuvas no Sudeste. Esse padrão assimétrico simultâneo é característico de anos de El Niño." },
      { q: "O conceito de 'sombra de chuva' explica a aridez de certas regiões. Qual exemplo brasileiro ilustra corretamente esse fenômeno?", alts: ["A Amazônia recebe mais chuvas que o Cerrado por estar mais próxima do equador.", "O semiárido nordestino é parcialmente explicado pelo efeito orográfico: as chuvas precipitam no litoral (barlavento) ao subir pelas serras; o interior fica no sotavento com ar ressecado.", "O litoral catarinense é mais úmido que o planalto gaúcho por receber frentes frias diretamente.", "A Amazônia ocidental é mais seca que a oriental por estar no sotavento dos alísios.", "A sombra de chuva não ocorre no Brasil por falta de montanhas elevadas."], g: "B", j: "As chuvas atlânticas (ventos de leste) atingem o litoral nordestino, sobem pelas chapadas e serras, precipitam no barlavento e chegam ao interior ressecadas — 'sombra de chuva' no sotavento. Esse efeito, combinado com a posição subtropical, a influência do El Niño e o Anticiclone Subtropical, explica a aridez singular do sertão nordestino." },
      { q: "La Niña intensa em anos recentes reduziu a geração hidrelétrica no Sul do Brasil. Qual mecanismo climático explica esse impacto?", alts: ["La Niña aumenta as chuvas em todo o Brasil, aumentando a geração no Sul.", "La Niña intensifica os ventos alísios, o que favorece chuvas na Amazônia (vazão dos rios nortistas) e reduz as chuvas no Sul (menor vazão dos reservatórios sulistas) — assimetria que impacta a geração hidroelétrica.", "La Niña provoca secas no Norte e chuvas no Sul.", "La Niña afeta apenas a temperatura do ar, sem impacto na precipitação.", "A redução da geração se deve exclusivamente ao desmatamento."], g: "B", j: "La Niña intensifica os ventos alísios → acumulação de água quente no Pacífico Oeste → mais convecção na Amazônia → mais chuvas no Norte/Nordeste. No Sul, ocorre o inverso: menos chuvas, maior frequência de veranicos, diminuição da vazão dos rios e dos reservatórios das usinas hidroelétricas de Itaipu e outras." },
      { q: "O aquecimento global e os ciclones tropicais: qual afirmação do IPCC AR6 é mais cientificamente precisa?", alts: ["O aquecimento aumenta o número total de ciclones, pois há mais energia disponível.", "O aquecimento pode reduzir a frequência total de ciclones, mas aumenta a proporção dos mais intensos (categorias 4 e 5) — oceanos mais quentes fornecem mais energia latente, intensificando os sistemas que se formam.", "Ciclones são independentes da temperatura oceânica.", "O aquecimento afeta apenas ciclones no Hemisfério Norte.", "A relação aquecimento-ciclones é especulativa, sem base científica."], g: "B", j: "O IPCC AR6 (2021) indica que o aquecimento global não necessariamente aumenta o número total de ciclones (pois outros fatores dinâmicos, como o cisalhamento vertical do vento, também se alteram), mas intensifica os que se formam. Oceanos mais quentes fornecem mais vapor d'água e energia. O padrão observado no Atlântico Norte desde 1980 confirma: menos ciclones, mas mais destrutivos." },
      { q: "A Massa Tropical Continental (mTc) forma-se no Chaco. Qual combinação de fatores geográficos explica seu caráter quente e seco e os efeitos que ela produz no Brasil?", alts: ["A mTc forma-se sobre o oceano Atlântico e perde umidade ao atravessar o continente.", "A mTc forma-se sobre o interior continental sul-americano (baixas latitudes, sem umidade oceânica direta, alta insolação), desenvolvendo caráter quente e seco; ao avançar sobre o Brasil, gera ondas de calor no Centro-Oeste e Sudeste e favorece incêndios.", "A mTc é sempre fria por se originar em latitudes médias.", "A mTc traz chuvas ao Centro-Oeste por ser quente e instável.", "A mTc não avança além do Mato Grosso do Sul."], g: "B", j: "A gênese da mTc está nas condições do Chaco paraguaio-boliviano: interior continental, baixíssima umidade relativa, insolação intensa. Esse ambiente gera massa quente e seca. Ao avançar sobre o Brasil, produz ondas de calor extremo. No verão, ao interagir com a mEc (quente e úmida), pode gerar instabilidade convectiva intensa após o calor seco — padrão do clima de savana (Aw) brasileiro." },
      { q: "O Sul do Brasil é a única região sem estação seca definida. Qual combinação de sistemas atmosféricos explica essa regularidade pluviométrica?", alts: ["A ZCAS atua o ano todo no Sul.", "A mEc domina o Sul durante todo o ano.", "Frentes frias da mPa penetram o Sul o ano todo (com maior frequência no inverno), combinadas com a mTa que fornece umidade atlântica — sem predomínio de massa de alta pressão que bloqueie as chuvas por estação.", "O Sul recebe apenas chuvas orográficas uniformes.", "A ausência da mPa no Sul explica a regularidade."], g: "C", j: "O Sul não tem estação seca pois está sujeito a frentes frias da mPa durante todo o ano — não apenas no inverno. Diferente do Sudeste (ZCAS no verão, estiagem no inverno) e do Nordeste (dependente das ITCs sazonais), o Sul tem entrada de frentes frias regulares que trazem chuvas em todas as estações, impedindo a formação de uma estação seca definida." },
      { q: "A ZCAS (Zona de Convergência do Atlântico Sul) é responsável pelas maiores catástrofes climáticas do Sudeste brasileiro. Quais massas de ar interagem para formá-la?", alts: ["mPa (polar) e mTc (tropical continental).", "mEc (equatorial continental) e mTa (tropical atlântica), que convergem do Noroeste para o Sudeste durante o verão, criando faixa de intensa nebulosidade e precipitação.", "mEa (equatorial atlântica) e mPa (polar atlântica).", "mTa (tropical atlântica) e mTc (tropical continental).", "mEc (equatorial continental) e mPa (polar atlântica)."], g: "B", j: "A ZCAS é formada pela interação da mEc (quente e úmida da Amazônia) com a mTa (quente e úmida do Atlântico Sul). No verão, essas massas convergem em diagonal do Noroeste amazônico para o Sudeste atlântico, criando faixa de instabilidade intensa. Quando persiste por mais de 4 dias consecutivos, é classificada como ZCAS — responsável pelas enchentes históricas em MG, RJ e SP." },
      { q: "O fenômeno ENOS é descrito como 'acoplamento oceano-atmosfera'. Por que essa denominação é mais precisa do que 'fenômeno oceânico'?", alts: ["Porque ocorre exclusivamente na atmosfera.", "Porque é sistema de retroalimentação: anomalias oceânicas alteram a circulação atmosférica (ventos, pressão, convecção), que por sua vez modifica as correntes oceânicas, criando ciclo que amplifica o fenômeno — nenhum dos dois domínios age isoladamente.", "Porque é causado exclusivamente pelos ventos alísios.", "O termo 'acoplamento' é apenas técnico, sem descrever mecanismo funcional diferente.", "Afeta apenas a atmosfera tropical."], g: "B", j: "O 'acoplamento' é o coração do ENOS: El Niño não começa só no oceano nem só na atmosfera — é retroalimentação mútua. Alísios enfraquecem → menos ressurgência → oceano aquece → menos convecção → alísios enfraquecem mais. Esse ciclo de retroalimentação positiva transforma uma pequena anomalia oceânica em fenômeno de escala global com impactos em todos os continentes." },
      { q: "A chuva convectiva típica das tardes tropicais segue padrão horário regular. Qual mecanismo termodinâmico explica essa regularidade?", alts: ["Os ventos alísios trazem umidade oceânica apenas no período vespertino.", "O aquecimento solar progressivo ao longo da manhã eleva o ar até o nível de convecção livre; após o meio-dia, a energia acumulada supera o inibidor convectivo, formando cumulonimbus que precipitam à tarde — o ciclo recomeça no dia seguinte.", "As chuvas convectivas são matutinas, não vespertinas.", "O resfriamento noturno dispara a convecção no meio do dia seguinte.", "A regularidade se deve à influência da Lua sobre os sistemas atmosféricos."], g: "B", j: "Mecanismo termodinâmico clássico: insolação progressiva → aquecimento da superfície → transferência de calor sensível para o ar → formação de correntes ascendentes → condensação adiabática → cumulus → cumulonimbus → precipitação intensa. A regularidade vespertina (14h–17h) está ligada ao tempo necessário para acumular energia suficiente para superar a inibição convectiva da manhã." },
      { q: "O conceito de 'ilha de calor urbana' está relacionado a anomalias climáticas positivas nas cidades. Qual processo físico explica por que as cidades são sistematicamente mais quentes que o campo?", alts: ["As cidades recebem mais radiação solar por terem menos nuvens.", "A substituição de vegetação por asfalto e concreto aumenta a absorção de radiação e elimina o resfriamento por evapotranspiração; somado ao calor antropogênico (veículos, ar-condicionado, indústria), resulta em temperatura 3–8°C superior à do campo.", "É causado exclusivamente pela poluição do ar.", "As cidades são mais quentes por estarem em maior altitude.", "O fenômeno ocorre apenas em cidades costeiras."], g: "B", j: "Dois mecanismos simultâneos: (1) Asfalto tem baixo albedo e alta capacidade calorífica — absorve mais radiação e não evapora água para se resfriar (como faz a vegetação via evapotranspiração); (2) Calor antropogênico de motores, indústrias e ar-condicionado acrescenta energia ao sistema. O resultado é temperatura urbana sistematicamente mais alta — fenômeno agravado pelo aquecimento global." },
      { q: "Massas de ar e suas características: assinale a alternativa que descreve INCORRETAMENTE uma massa de ar do Brasil.", alts: ["mEc: Amazônia, quente e úmida, responsável pelas chuvas abundantes do verão.", "mTa: Atlântico Sul subtropical, quente e úmida, principal fornecedora de umidade ao litoral leste e Sudeste.", "mTc: Chaco, quente e ÚMIDA, responsável pelas chuvas do Centro-Oeste no verão.", "mPa: Atlântico Sul polar, fria e úmida, responsável pelas frentes frias.", "mEa: Atlântico Norte, quente e úmida, atua no litoral Norte/Nordeste."], g: "C", j: "A mTc (Massa Tropical Continental) é quente e SECA — não úmida. Forma-se sobre o Chaco, região de interior continental sem influência oceânica direta, com alta temperatura e baixa umidade. É ela a responsável pelas ondas de calor seco e pelos incêndios do Centro-Oeste. A confusão com 'quente e úmida' é um erro comum mas grave — seca e úmida têm impactos opostos." }
    ],
  },
  {
    id: "geo2", icon: "🌱", nome: "Geografia 2",
    topico: "Desindustrialização e Agroecologia",
    conteudo: [
      { h2: "1. DESINDUSTRIALIZAÇÃO — QUANDO A FÁBRICA FECHA", items: [
        { tipo: "p", txt: "Em 1980, a indústria representava cerca de 35% do PIB brasileiro. Em 2022, estava abaixo de 12%. Esse encolhimento não é apenas um número — é fábricas fechando, empregos qualificados sumindo e capacidade tecnológica se perdendo. A desindustrialização é um dos processos econômicos mais debatidos do Brasil contemporâneo." },
        { tipo: "p", txt: "Existem dois tipos: a RELATIVA (a indústria cresce em termos absolutos, mas o setor de serviços cresce mais rápido — ela perde participação no PIB sem necessariamente encolher) e a ABSOLUTA (a produção industrial cai em termos reais — fábricas fecham, produção diminui). O Brasil vive a segunda, que é mais grave." },
        { tipo: "h3", txt: "Por que isso está acontecendo? As causas combinadas" },
        { tipo: "ul", items: [
          "DOENÇA HOLANDESA: o Brasil exporta muita soja, petróleo e minério. Essa abundância de dólares valoriza o real. Com o real valorizado, um carro brasileiro fica caro para o mundo e um carro importado fica barato para os brasileiros. A indústria perde dos dois lados — no mercado externo e no interno. O nome vem da Holanda dos anos 1960, que teve o mesmo problema com o gás natural.",
          "CUSTO BRASIL: é o apelido para o conjunto de obstáculos que encarecem a produção industrial no Brasil — carga tributária das mais altas do mundo, burocracia paralisante, infraestrutura precária (estradas, portos, energia) e crédito caro (juros altos). Uma fábrica aqui paga mais imposto, mais frete e mais juro que uma concorrente na Coreia.",
          "CHINA: a China se tornou a maior manufatureira do mundo com custos incomparáveis. Camisetas, eletrônicos, móveis, máquinas — tudo chegou mais barato da China. A abertura comercial dos anos 1990 expôs a indústria brasileira a essa concorrência sem políticas de compensação.",
          "REPRIMARIZAÇÃO: o resultado de tudo isso é que o Brasil exporta cada vez mais soja, petróleo e minério (primários, pouco valor agregado) e cada vez menos manufaturados. Volta ao papel colonial de exportador de matéria-prima."
        ]},
        { tipo: "ex", txt: "POR QUE ISSO É UM PROBLEMA DE SOBERANIA? A pandemia mostrou: o Brasil não tinha indústria farmacêutica suficiente para produzir vacinas e ficou dependente de outros países. Sem indústria de semicondutores, o país foi vulnerável à crise de chips de 2021. Indústria não é só emprego — é autonomia política." }
      ]},
      { h2: "2. AGROECOLOGIA — AGRICULTARA QUE CONVERSA COM A NATUREZA", items: [
        { tipo: "p", txt: "O Brasil tem um paradoxo alimentar perturbador: é o maior exportador de alimentos da América Latina e ao mesmo tempo tem milhões de pessoas em insegurança alimentar. Produzimos comida para mais de 1 bilhão de pessoas, mas parte dos brasileiros não consegue comprar o suficiente para comer. Produção e acesso são problemas diferentes." },
