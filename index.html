    questoes: [
  { q: "O economista Bresser-Pereira usa o conceito de 'doença holandesa' para explicar a desindustrialização brasileira. Qual é o mecanismo central desse fenômeno?", alts: ["A doença holandesa é exclusivamente monetária, sem relação com a estrutura produtiva do país.", "O fenômeno afeta apenas países exportadores de petróleo, não economias agrícolas como o Brasil.", "A exportação de commodities valoriza o câmbio, tornando a indústria cara para exportar e os importados baratos no mercado interno — ciclo vicioso que desincentiva a diversificação produtiva.", "Empresas industriais preferem investir em commodities por serem intrinsecamente mais lucrativas.", "A abundância de recursos naturais sempre beneficia o desenvolvimento econômico de longo prazo."], g: "C", j: "O mecanismo: exportações de commodities geram divisas → real valorizado → manufaturados brasileiros ficam caros para exportar E manufaturados importados ficam baratos internamente → indústria perde nos dois mercados. O resultado é especialização crescente em commodities, que por sua vez valoriza mais o câmbio — ciclo vicioso. Bresser-Pereira propõe câmbio administrado para neutralizar o efeito." },

  { q: "A 'reprimarização da pauta exportadora' representa risco estrutural para a economia brasileira porque:", alts: ["a pauta exportadora atual é mais diversificada que no período de industrialização do século XX.", "a dependência de commodities protege o país das crises financeiras internacionais.", "a exportação de commodities é sempre menos lucrativa que a de manufaturados em qualquer cenário.", "economias dependentes de commodities ficam vulneráveis à volatilidade dos preços internacionais e tendem a perder nos termos de troca no longo prazo.", "a reprimarização aumenta a geração de empregos qualificados nas regiões exportadoras."], g: "D", j: "Os riscos da reprimarização são múltiplos: (1) volatilidade — o preço da soja oscila muito mais que o de manufaturados; (2) deterioração dos termos de troca — tese Prebisch-Singer, confirmada empiricamente: commodities tendem a se depreciar relativamente aos manufaturados; (3) perda de externalidades tecnológicas — a indústria gera inovação que a agropecuária extensiva não gera na mesma escala." },

  { q: "A soberania alimentar (Via Campesina) distingue-se da segurança alimentar (FAO). Qual é a distinção central entre esses conceitos?", alts: ["Segurança alimentar garante acesso a alimentos suficientes (pode ser via importação corporativa); soberania alimentar afirma o direito dos povos de controlar suas sementes, métodos e mercados.", "A FAO defende soberania alimentar; a Via Campesina, o conceito de segurança alimentar.", "São sinônimos que diferem apenas na ênfase dada a aspectos políticos ou técnicos.", "São equivalentes e intercambiáveis em qualquer análise da literatura acadêmica especializada.", "Segurança alimentar é exclusiva dos países ricos; soberania alimentar, dos países em desenvolvimento."], g: "A", j: "A distinção é política: segurança alimentar é neutra quanto à origem — um país pode atingi-la importando tudo de corporações transnacionais. Soberania alimentar (Via Campesina, 1996) é reivindicação de autonomia: quem controla as sementes, os métodos de cultivo, os mercados? O conceito foi criado para contestar exatamente o modelo de segurança alimentar mediado pelo mercado global e pelas corporações." },

  { q: "O Brasil lidera o consumo de agrotóxicos per capita mundial. Qual combinação de fatores estruturais explica essa posição?", alts: ["O consumo elevado não tem consequências documentadas para a saúde pública brasileira.", "Monocultura extensiva em larga escala, registro facilitado com influência do agronegócio, ausência de alternativas difundidas de controle biológico e baixo custo relativo dos agrotóxicos criam dependência sistêmica.", "O clima tropical favorece mais pragas que os climas temperados, exigindo mais agroquímicos.", "O alto consumo resulta exclusivamente do volume exportado, não do uso interno no Brasil.", "O Brasil usa mais agrotóxicos simplesmente por ter a maior área agrícola total do mundo."], g: "B", j: "A liderança é sistêmica, não natural: monocultura em escala cria pressão uniforme de pragas; o processo de registro tem sido acelerado com pouca avaliação toxicológica independente; alternativas agroecológicas carecem de crédito e assistência técnica; o agrotóxico é mais barato que a mão de obra para colheita manual. Consequências documentadas: correlação com cânceres (INCA), contaminação de poços (IBGE) e intoxicações anuais (SINAN)." },

  { q: "A desindustrialização é apresentada como questão de soberania nacional. Qual argumento sustenta essa afirmação?", alts: ["A desindustrialização aumenta a soberania por reduzir a dependência de importações industriais.", "Soberania e capacidade industrial são conceitos sem relação na economia contemporânea.", "A soberania só é afetada pela desindustrialização em contextos de guerra declarada.", "Enfraquece o exército por reduzir diretamente a produção doméstica de armas militares.", "A perda de capacidade industrial implica dependência tecnológica em setores estratégicos (saúde, energia, defesa), tornando o país vulnerável a sanções ou rupturas da cadeia global de suprimentos."], g: "E", j: "A pandemia foi teste empírico: o Brasil não tinha indústria farmacêutica suficiente para produzir vacinas e dependeu de outros países. Sem indústria de semicondutores, foi vulnerável à crise de chips de 2021. A capacidade de produzir internamente bens estratégicos é condição de autonomia política — demonstrada pela geopolítica recente com força didática raramente vista em tempos de paz." },

  { q: "A dicotomia 'agroecologia versus agronegócio convencional' é criticada por analistas como simplista. Qual é a crítica mais sofisticada a essa oposição?", alts: ["A agroecologia é simplesmente mais eficiente que o agronegócio em todas as métricas produtivas.", "A dicotomia é necessária para simplificar a análise política sem qualquer perda de precisão.", "A dicotomia ignora o espectro de práticas existentes entre os extremos e que a transição agroecológica exige políticas concretas — não apenas discurso ideológico.", "O agronegócio não tem qualquer prática sustentável possível dentro de seu modelo produtivo.", "A agroecologia e o agronegócio são absolutamente incompatíveis, sem zona intermediária possível."], g: "C", j: "Entre a monocultura convencional e a agroecologia pura existe um espectro: sistemas ILPF reduzem impactos mantendo escala comercial; a agricultura de precisão usa menos insumos via GPS; a orgânica certificada elimina agrotóxicos sem adotar todos os princípios agroecológicos. A binarização pode impedir alianças estratégicas necessárias para políticas públicas efetivas de transição." },

  { q: "O PNAE (Lei 11.947/2009) é considerado instrumento de fomento à agroecologia. Por quê?", alts: ["Ao destinar 30% dos recursos à compra da agricultura familiar, cria demanda estável para pequenos produtores — muitos com práticas agroecológicas — viabilizando economicamente a produção diversificada local.", "Financia diretamente a compra de agrotóxicos certificados para a agricultura familiar.", "Obriga que 100% dos alimentos da merenda sejam orgânicos ou certificados agroecológicos.", "É programa exclusivo para escolas rurais, sem impacto nas escolas urbanas do país.", "Proíbe a compra de alimentos convencionais e agroquímicos nas escolas públicas brasileiras."], g: "A", j: "O PNAE resolve um problema central da agroecologia: a falta de mercado garantido. Agricultores familiares com policultivos agroecológicos têm produção diversificada em pequena escala — difícil de vender no mercado convencional dominado por grandes volumes. O programa garante compra regular e preços justos sem exigir escala industrial, tornando-se instrumento efetivo de política agroalimentar." },

  { q: "Qual argumento ecológico — além dos sociais e econômicos — justifica o policultivo em relação à monocultura?", alts: ["O policultivo recria a estrutura funcional dos ecossistemas naturais: espécies distintas reduzem pressão de pragas, ciclan nutrientes de forma mais eficiente e aumentam a resiliência a variações climáticas.", "O policultivo produz mais por hectare em todas as condições climáticas e tipos de solo.", "É menos produtivo e só se justifica por razões culturais e ideológicas, não científicas.", "O policultivo é ecologicamente equivalente à monocultura, diferindo apenas no aspecto visual.", "O argumento ecológico do policultivo é puramente teórico, sem confirmação em pesquisas."], g: "A", j: "O argumento ecológico baseia-se na teoria dos ecossistemas: biodiversidade aumenta resiliência e eficiência funcional. No policultivo: pragas específicas encontram barreiras entre plantas distintas; raízes complementares captam água e nutrientes em profundidades diferentes; a serapilheira diversa alimenta comunidades microbianas mais ricas; o sistema resiste melhor a eventos extremos — demonstrado por inúmeros estudos comparativos." },

  { q: "A desindustrialização brasileira é classificada como 'precoce'. O que distingue a desindustrialização precoce da madura?", alts: ["A precoce é positiva para o desenvolvimento; a madura é o problema real a ser evitado.", "A madura ocorre após alto nível de renda e capacidade tecnológica; a precoce ocorre antes desse desenvolvimento — o país perde competitividade industrial sem ter criado base tecnológica sólida.", "Na precoce, a indústria cresce em termos absolutos; na madura, só perde participação relativa.", "Ambas têm as mesmas causas e as mesmas consequências para o desenvolvimento econômico.", "São sinônimos com apenas diferenças terminológicas sem implicações práticas distintas."], g: "B", j: "Países como EUA e Alemanha desindustrializaram após décadas de liderança tecnológica e alto padrão de renda per capita — substituíram fábricas por serviços sofisticados de alto valor. O Brasil perde participação industrial antes de completar esse percurso: sem a base tecnológica e sem o nível de renda que permitiria absorver a mão de obra industrial em serviços de alto valor agregado." },

  { q: "O Brasil é o maior exportador de alimentos da América Latina e simultaneamente tem milhões em insegurança alimentar. Qual estrutura explica essa contradição?", alts: ["A insegurança alimentar é causada exclusivamente pela seca no Nordeste, sendo regional.", "O Brasil exporta apenas alimentos de baixa qualidade, consumindo internamente os melhores.", "A concentração fundiária e o modelo agroexportador direcionam a produção para mercados externos; a desigualdade de renda impede o acesso interno — produção e acesso são problemas distintos.", "A contradição é impossível — países que exportam alimentos não podem ter insegurança alimentar.", "O Brasil importa mais alimentos do que exporta na maior parte dos anos recentes."], g: "C", j: "Josué de Castro ('Geografia da Fome', 1946) já apontava: o problema não é de produção, mas de acesso. O Brasil produz alimentos para mais de 1 bilhão de pessoas. A insegurança alimentar resulta da desigualdade de renda e da concentração fundiária que expulsa camponeses e direciona a produção para exportação. São duas faces da mesma estrutura agrária — não uma contradição acidental." },

  { q: "Qual das opções apresenta uma causa que NÃO está diretamente ligada à desindustrialização brasileira?", alts: ["Câmbio sobrevalorizado pelas exportações de commodities (doença holandesa).", "Concorrência de manufaturados chineses a preços que a indústria local não consegue igualar.", "Elevada carga tributária e burocracia que encarecem a produção (Custo Brasil).", "Expansão da rede de saneamento básico nas cidades brasileiras nas últimas décadas.", "Juros elevados que inibem o investimento produtivo e encarecem o crédito industrial."], g: "D", j: "A expansão do saneamento básico é política de infraestrutura social e saúde pública — não está relacionada ao processo de desindustrialização. Ao contrário, poderia contribuir positivamente ao aumentar a produtividade da força de trabalho (menos doenças). Todos os outros fatores são amplamente reconhecidos na literatura econômica como causas diretas da perda de competitividade industrial brasileira." }
],

        { tipo: "h3", txt: "Estilo Românico (séculos X-XII) — a fortaleza espiritual" },
        { tipo: "p", txt: "O período românico surgiu num momento de profunda insegurança: invasões vikings pelo norte, húngaras pelo leste, sarracenas pelo sul. As igrejas com muros grossos, janelas estreitas e aspecto de fortaleza não são acidente estético — são resposta histórica. A Igreja era literalmente um lugar seguro num mundo ameaçador." },

        { tipo: "p", txt: "Para isso, precisava de muros mais finos e janelas maiores. O problema: muros finos não aguentavam o peso da abóbada. A solução foi a inovação técnica que define o gótico:" },

        { tipo: "ex", txt: "GIOTTO DI BONDONE (1267-1337): o artista que quebrou a arte medieval por dentro. Antes de Brunelleschi inventar a perspectiva, Giotto introduziu algo nunca visto: figuras com volume real, emoções individuais, interação espacial coerente. Sua Lamentação de Cristo (Cappella degli Scrovegni, Pádua) tem personagens chorando de formas diferentes — cada um com sua dor específica. Nunca havia acontecido na pintura ocidental. Giotto é a ponte entre o medieval e o renascentista." }

    questoes: [
  { q: "O Panteão romano (c. 125 d.C.) e o Partenon grego (447-432 a.C.) são ícones da arquitetura clássica. Qual diferença técnica fundamental distingue as soluções estruturais adotadas?", alts: ["O Partenon usa cúpula de concreto romano; o Panteão usa colunas de mármore grego.", "O Panteão usa cúpula de concreto romano para cobrir vão circular de 43m; o Partenon usa sistema trabeado (viga sobre coluna) de mármore, sem cobrir grandes espaços internos.", "O Partenon usa arco ogival; o Panteão usa arco semicircular de origem romana.", "Ambos usam o mesmo sistema estrutural, diferindo apenas nos materiais empregados.", "O Partenon tem interior monumental e o Panteão é pequeno e intimista por dentro."], g: "B", j: "O sistema trabeado grego (coluna + viga horizontal) não permite cobrir grandes espaços — a pedra não suporta tensões de flexão em vãos longos. Roma resolveu com o arco e a cúpula em concreto. O Panteão tem 43m de diâmetro (igual à sua altura) — maior cúpula do mundo por 1300 anos. Essa diferença técnica reflete ambições espaciais completamente distintas entre as duas civilizações." },

  { q: "A arte paleocristã nas catacumbas é chamada de 'arte do código'. Quais foram as consequências estéticas duradouras dessa necessidade de codificação?", alts: ["A codificação limitou-se ao período das catacumbas, sem influência sobre a arte posterior.", "Criou arte exclusivamente abstrata e geométrica, sem qualquer representação figurativa.", "Estabeleceu a tradição de arte simbólica que dominou o Medievo: a imagem serve ao significado espiritual, não à aparência visual — o que importa é o que representa, não como parece.", "Criou arte naturalista e realista para comunicar a fé diretamente aos fiéis perseguidos.", "Os símbolos paleocristãos foram completamente abandonados após o Édito de Milão em 313 d.C."], g: "C", j: "A arte catacumbal estabeleceu um princípio que durou séculos: a imagem serve ao significado, não à aparência. O peixe, o Bom Pastor, o Chi-Rho eram codificações que o iniciado reconhecia. Esse princípio tornou-se fundamento da iconografia cristã medieval: a hierarquia de tamanhos, a frontalidade e o fundo dourado não são limitações técnicas — são escolhas simbólicas deliberadas herdadas da tradição paleocristã." },

  { q: "O Abade Suger de Saint-Denis é considerado o 'inventor' do estilo gótico. Qual foi o fundamento teológico de suas inovações arquitetônicas?", alts: ["O gótico foi desenvolvido por razões exclusivamente práticas de estabilidade estrutural.", "Inspirado na Teologia da Luz de Pseudo-Dionísio, Suger acreditava que a luz material filtrada pelos vitrais conduzia o fiel à luz divina — as inovações estruturais eram meios técnicos para maximizar essa experiência.", "A teologia de Suger rejeitava qualquer uso de imagens e luz como instrumentos de devoção.", "Suger queria superar as catedrais românicas por razões de prestígio e poder político episcopal.", "Suger era engenheiro sem formação teológica, movido exclusivamente pela ambição construtiva."], g: "B", j: "Suger foi explícito em seus escritos: cada inovação tinha motivação teológica. A Teologia da Luz de Pseudo-Dionísio (séc. V) afirmava que Deus é luz pura e a luz material é caminho para ele. Suger aplicou isso literalmente: mais luz = mais proximidade de Deus. O arco ogival, a abóbada de nervuras e o arcobotante foram soluções técnicas para um problema essencialmente teológico." },

  { q: "A escultura grega é descrita como 'idealista' e a romana, como 'realista'. Qual aspecto cultural explica essa diferença de abordagem?", alts: ["A escultura grega buscava o ideal eterno de beleza humana; a romana valorizava o indivíduo concreto — suas rugas, calvícies e imperfeições — pois a identidade individual era valor central da cultura romana.", "Os artistas romanos eram tecnicamente inferiores aos gregos e não dominavam a idealização.", "Ambas as tradições são igualmente idealistas; a diferença é apenas uma questão de tema.", "Os romanos não tinham acesso ao mármore de qualidade suficiente para a escultura idealizada.", "A diferença é exclusivamente cronológica: romanos eram mais antigos e não dominavam a técnica."], g: "A", j: "A diferença reflete valores culturais distintos: os gregos valorizavam o tipo universal — o cidadão-atleta perfeito como expressão da harmonia cósmica. Os romanos valorizavam o indivíduo concreto — o general, o imperador, o paterfamilias — com toda sua especificidade física. O retrato romano hiper-realista era instrumento de legitimação política: as máscaras mortuárias (imagines) eram exibidas nas casas patrícias como demonstração de ancestralidade nobre." },

  { q: "Giotto di Bondone é chamado de 'pai da pintura ocidental'. O que em sua obra justifica esse título?", alts: ["Giotto introduziu nas figuras volume tridimensional convincente e gestos individualmente motivados, rompendo com a frontalidade hierática medieval e inaugurando a representação do humano como portador de emoções reais.", "Giotto pintou exclusivamente temas mitológicos greco-romanos, inaugurando o Renascimento.", "Giotto foi o primeiro a usar perspectiva geométrica linear com ponto de fuga definido.", "A inovação de Giotto foi técnica: introduziu a tinta a óleo na tradição pictórica ocidental.", "Giotto criou o estilo gótico tardio nas catedrais italianas do século XIV."], g: "A", j: "A perspectiva geométrica veio com Brunelleschi em 1420 — um século depois de Giotto. A inovação de Giotto foi de outra ordem: volume corporal, peso das figuras, emoções individuais. Na Lamentação de Cristo (Cappella degli Scrovegni, c. 1305), cada personagem expressa o luto de forma única e psicologicamente coerente — algo nunca visto antes na pintura ocidental. Foi uma ruptura antropológica antes de ser técnica." },

  { q: "A arte medieval é chamada de 'Bíblia dos analfabetos' por Gregório Magno. Como essa função pedagógica se expressa especificamente nas catedrais góticas?", alts: ["Os vitrais eram exclusivamente decorativos, sem conteúdo doutrinário ou narrativo.", "A iconografia — tímpanos esculpidos, vitrais narrativos, capitéis figurados — funcionava como enciclopédia visual da cosmologia cristã para populações iletradas que 'liam' as imagens como textos sagrados.", "Os fiéis medievais eram todos letrados e liam as Escrituras diretamente, sem mediação imagética.", "A função pedagógica era exclusiva das igrejas românicas, não das catedrais góticas.", "As catedrais eram exclusivamente espaços de devoção, sem qualquer função pedagógica."], g: "B", j: "Com mais de 90% de analfabetismo, a catedral era o 'livro em pedra' da população. O tímpano do portal mostrava o Juízo Final (instrução moral na entrada); os vitrais narravam vidas de santos (modelo de conduta); os capitéis contavam cenas bíblicas (catequese visual). O edifício inteiro era um texto teológico tridimensional — a arte servia diretamente à evangelização." },

  { q: "O fundo dourado dos mosaicos de Ravena (século VI) não equivale à representação do céu. Qual é seu significado teológico específico?", alts: ["O fundo dourado foi introduzido pelos artistas barrocos do século XVII, não pelos paleocristãos.", "O ouro simbolizava a riqueza do Império Romano do Oriente e seu poder político.", "O fundo dourado elimina o espaço terrestre, situando as figuras em eternidade atemporal — o ouro simboliza a luz divina incriada e eterna, não a luz solar física que muda e passa.", "O ouro era o material mais caro disponível, usado por razões de prestígio imperial.", "O fundo dourado era convenção técnica decorativa sem significado simbólico específico."], g: "C", j: "A arte greco-romana situava figuras em espaços naturalistas (céu azul, paisagem). O fundo dourado medieval dissolve esse espaço: as figuras não existem 'em algum lugar', mas na eternidade de Deus. O ouro não reflete a luz solar (variável) — é ele mesmo luminoso, símbolo da luz divina eterna e imutável. É escolha radicalmente anti-naturalista fundamentada na teologia da luz divina incriada." },

  { q: "A arquitetura românica é comparada a uma 'fortaleza espiritual'. Qual aspecto histórico-social explica essa metáfora?", alts: ["As igrejas foram construídas sobre antigas fortalezas militares romanas já existentes.", "As igrejas românicas eram usadas efetivamente como fortalezas militares nas guerras medievais.", "O estilo refletia apenas a limitação técnica dos construtores medievais, não uma escolha estética.", "O estilo emergiu num período de invasões vikings, húngaras e sarracenas: igrejas com muros espessos e janelas estreitas refletiam a função da Igreja como refúgio espiritual num mundo ameaçador.", "A aparência de fortaleza era puramente estética, sem qualquer relação com o contexto histórico."], g: "D", j: "O século X, quando o românico se consolidou, foi período de extrema instabilidade: invasões dos vikings pelo norte, húngaros pelo leste, sarracenos pelo sul. As igrejas maciças eram fisicamente seguras (muros grossos resistem) e psicologicamente reconfortantes — 'castelos de Deus' numa terra de conflitos permanentes. O estilo não é acidente técnico: é resposta histórica concreta." },

  { q: "A transição da técnica de 'figuras negras' para 'figuras vermelhas' na cerâmica grega representou qual avanço técnico?", alts: ["As figuras vermelhas introduziram a perspectiva linear na representação da cerâmica.", "As figuras vermelhas usavam tinta vermelha especial importada do Oriente Médio.", "As figuras vermelhas substituíram o barro por mármore nas peças mais sofisticadas.", "O avanço foi exclusivamente cromático, sem nenhuma diferença na técnica de produção.", "A inversão do processo — fundo negro, figuras na cor da argila — permitiu detalhar musculatura e expressões com pincel fino, impossível com a incisão das figuras negras."], g: "E", j: "Nas figuras negras: silhueta pintada em negro, detalhes internos por incisão — processo limitado. Com as figuras vermelhas (invertido): o fundo vai a negro com verniz, as figuras ficam na cor da argila e os detalhes são pintados livremente com pincel fino — possibilitando linhas curvas, variações de espessura e detalhamento anatômico incomparável. Foi uma revolução técnica que ampliou enormemente a expressividade." },

  { q: "O processo de 'christianização' de formas visuais pagãs na arte paleocristã é exemplificado pela figura do Bom Pastor. Qual é a origem pré-cristã dessa imagem?", alts: ["A figura deriva do moscóforo grego (portador de bezerro) e do Hermes psicopompo (guia das almas): a forma visual pagã foi ressignificada com conteúdo cristológico novo.", "A christianização foi unidirecional: apenas a arte pagã influenciou a cristã, sem o processo inverso.", "O Bom Pastor deriva de uma parábola exclusivamente hebraica sem relação com a cultura grega.", "A arte paleocristã rejeitou completamente qualquer herança visual da cultura greco-romana.", "A figura do Bom Pastor foi criação original dos artistas cristãos do século IV, sem precedentes."], g: "A", j: "O 'moscóforo' era tipo iconográfico grego para representar devoção religiosa. Hermes psicopompo era representado carregando um cordeiro ao guiar as almas. Os cristãos reutilizaram essa forma — familiar aos convertidos greco-romanos — e a ressignificaram: Jesus que carrega a ovelha perdida. A forma visual permanece; o significado é radicalmente novo. É inculturação: usar formas locais para transmitir conteúdo novo." },

  { q: "Se o estilo românico pode ser caracterizado como 'medo feito pedra', como o gótico poderia ser descrito em relação às transformações sociais do século XII?", alts: ["O gótico não tem relação com transformações sociais — é apenas uma mudança técnica.", "O gótico é idêntico ao românico em visão de mundo, diferindo apenas na solução técnica adotada.", "O gótico seria 'luxo feito pedra', reflexo apenas da riqueza crescente das cidades medievais.", "O gótico poderia ser 'aspiração feita pedra': cidades crescentes, burgos prósperos, escolástica que reconcilia fé e razão geraram mundo mais confiante em elevar-se — verticalidade e luz como metáforas arquitetônicas desse novo espírito.", "O gótico surgiu em oposição ao crescimento urbano como afirmação do poder rural dos bispos."], g: "D", j: "A relação forma-sociedade é central na história da arte. O românico nasce no feudalismo inseguro, nas invasões, na fragilidade da vida cotidiana. O gótico nasce no florescimento urbano, nas comunas, nas universidades, no 'renascimento do século XII'. A mesma fé, dois humores históricos completamente distintos — do maciço-fechado (refúgio defensivo) ao vertical-luminoso (aspiração transcendente)." }
],

    questoes: [
  { q: "Pero Vaz de Caminha era escrivão real da frota de Cabral, não escritor. Por que sua carta se tornou o texto fundador da literatura brasileira?", alts: ["Porque foi o primeiro texto literário escrito em língua portuguesa no continente americano.", "Porque descreveu com precisão científica a flora e fauna do território descoberto.", "Porque, sem intenção artística, produziu o primeiro registro escrito sobre o Brasil, com qualidade descritiva e relevância histórica fundadora — e também como documento do olhar colonial.", "Porque foi o primeiro documento a registrar em escrita a língua tupi dos indígenas.", "Porque propôs formalmente a colonização do Brasil ao rei D. Manuel I de Portugal."], g: "C", j: "Caminha não era escritor: era funcionário real cumprindo obrigação administrativa. Mas a qualidade descritiva da carta, seu olhar atento e sua importância histórica (primeiro documento sobre o Brasil) a tornaram texto fundador da literatura brasileira. Ao mesmo tempo, é documento de violência simbólica: o olhar etnocêntrico e erotizado sobre os indígenas revela a perspectiva colonial que marcou os séculos seguintes." },

  { q: "Qual problema historiográfico específico compromete as análises literárias da obra de Gregório de Matos?", alts: ["Gregório escreveu exclusivamente em espanhol, dificultando a análise em língua portuguesa.", "Gregório de Matos é um personagem fictício criado por historiadores do século XIX.", "O problema é apenas de datação: não se sabe com precisão quando cada poema foi escrito.", "Gregório de Matos nunca viveu no Brasil; sua obra foi criada em Portugal e mal atribuída.", "Nenhum manuscrito autógrafo de Gregório foi encontrado — toda a obra é conhecida por cópias tardias de copistas anônimos, gerando debates sobre quais poemas são genuinamente seus."], g: "E", j: "João Carlos Teixeira Gomes e outros filólogos demonstraram que o corpus 'gregoriano' contém poemas de autores distintos, coletados sob o nome de um poeta que se tornou 'marca' para a sátira colonial baiana. Sem autógrafos, é impossível distinguir com certeza o que é de Gregório do que foi a ele atribuído. Isso compromete análises que tratam o corpus como definitivo e autenticado." },

  { q: "No 'Sermão da Sexagésima', Vieira argumenta: 'A palavra de Deus é semente [...] como pode haver tanta semente e tão pouco fruto?' Qual recurso retórico ele usa e qual é seu efeito?", alts: ["Anáfora — repete a palavra 'semente' para criar efeito emocional e musical no sermão.", "Silogismo conceptista: a premissa (Palavra = semente perfeita) leva à conclusão de que o fruto escasso é culpa do pregador, não da semente — a lógica das Escrituras é usada contra os próprios pregadores.", "Hipérbole — exagera a quantidade de pregações para emocionar os ouvintes presentes.", "Metáfora simples da semente para ilustrar didaticamente a ação da pregação cristã.", "Cultismo de Góngora — vocabulário extremamente rebuscado para impressionar o público."], g: "B", j: "Vieira é mestre do conceptismo: engenho intelectual, não beleza formal. A estrutura é silogística: a Palavra de Deus é perfeita (semente boa) → o fruto escasso não pode ser culpa da semente → deve ser culpa do semeador (o pregador). Vieira usa a própria Escritura como arma contra os pregadores medíocres. O 'Sermão da Sexagésima' é modelo de argumentação indutiva conceptista." },

  { q: "O Barroco é descrito como 'estética da crise'. Qual crise histórica e filosófica específica ele expressa?", alts: ["A crise da consciência europeia diante do colapso da cosmovisão medieval: ciência, Reforma e ceticismo quebraram certezas sem substituí-las — o Barroco é a estética dessa tensão irresolvida.", "A crise apenas religiosa provocada pela Reforma Protestante e pela Contrarreforma católica.", "O conflito exclusivamente político entre monarquias absolutas e a nobreza feudal decadente.", "A prosperidade do século XVII, que gerou excesso de riqueza e ansiedade existencial.", "A crise exclusivamente econômica causada pelo declínio do comércio com as Índias orientais."], g: "A", j: "A 'crise da consciência europeia' (Paul Hazard): Copérnico tirou a Terra do centro, a Reforma fragmentou a cristandade, o ceticismo filosófico questionou verdades eternas. O homem barroco vivia entre dois mundos que não se reconciliavam. O Barroco é a estética dessa contradição não resolvida — daí as antíteses, os paradoxos, o pessimismo e a obsessão com a morte e a passagem do tempo." },

  { q: "O Quinhentismo não é, rigorosamente, uma escola literária. Qual argumento sustenta essa afirmação?", alts: ["O problema é cronológico: deveria abranger também o século XVII para ser completo.", "É escola literária menor, reconhecida apenas no Brasil, sem equivalente na Europa.", "A discussão é irrelevante para o estudo literário e não afeta nenhuma análise de texto.", "É escola literária bem definida com programa estético compartilhado pelos autores do período.", "Não há programa estético, manifesto coletivo nem autores que se reconheçam como pertencentes a um movimento: é reunião didática de textos documentais e catequéticos com propósitos completamente distintos."], g: "E", j: "Caminha era funcionário real, Anchieta era missionário, Gandavo era cronista. Nenhum se identificava com um movimento literário ou compartilhava objetivos estéticos com os outros. O agrupamento sob 'Quinhentismo' é construção didática do século XIX que retroativamente cria unidade onde havia apenas coexistência temporal. 'Literatura de informação' e 'literatura de catequese' descrevem melhor as funções reais desses textos." },

  { q: "Identifique o recurso estilístico dominante e a crítica social nos versos: 'A cada canto um grande conselheiro / que nos quer governar cabana e vinha; / não sabem governar sua cozinha / e já governam o mundo inteiro.'", alts: ["Religioso — crítica à corrupção do clero e da Igreja Católica na Bahia do século XVII.", "Lirismo amoroso — crítica indireta à vida doméstica e às relações afetivas coloniais.", "Conceptismo — a antítese irônica entre incompetência doméstica e pretensão política expõe sistematicamente os medíocres que se autoproclamam conselheiros no poder colonial.", "Cultismo — vocabulário rebuscado criticando a culinária colonial da Bahia seiscentista.", "Épico — ausência de grandes líderes políticos à altura do projeto colonial brasileiro."], g: "C", j: "O conceptismo de Gregório opera pela engenharia argumentativa, não pelo vocabulário rebuscado (isso seria cultismo). A estrutura do quarteto: premissa (a cada canto um conselheiro), aplicação (quer nos governar), contradição (não governa nem a cozinha), conclusão irônica (mas governa o mundo). A progressão lógica expõe o absurdo da pretensão política de incompetentes. O 'a cada canto' indica crítica sistêmica, não individual." },

  { q: "Padre Antônio Vieira defendeu os indígenas e os cristãos-novos em seus sermões. Como interpretar essas posições em relação ao seu papel missionário?", alts: ["Suas posições eram apenas retóricas, sem convicção religiosa ou política genuína.", "Vieira era humanista progressista que antecipava os direitos humanos do século XX.", "Vieira era contrário a toda forma de escravidão, inclusive a africana.", "Vieira era contraditório — suas posições carecem de coerência interna reconhecível.", "As posições eram coerentes segundo a lógica missionária: defender índios da escravidão viabilizava a catequese jesuíta; defender cristãos-novos da Inquisição preservava capitais necessários à expansão colonial."], g: "E", j: "A chave interpretativa: Vieira aceitava a escravidão africana — o que demonstra que sua 'defesa' não era humanista universal. Defendia índios porque escravos dos colonos eram indisponíveis para a catequese jesuíta. Defendia cristãos-novos porque a Inquisição expulsava seus capitais comerciais que financiavam a expansão missionária. Ambas as posições têm lógica instrumental, não ética principiológica." },

  { q: "O carpe diem barroco difere do horaciano em seu tom fundamental. Qual é essa diferença?", alts: ["Os dois são completamente idênticos em tom, conteúdo e tratamento filosófico do tema.", "O carpe diem barroco rejeita completamente qualquer forma de prazer terreno ou mundano.", "O horaciano celebra o presente como bem em si mesmo (tom epicurista); o barroco o ressignifica com angústia — o prazer é sempre assombrado pela culpa, pela vanidade e pelo memento mori.", "O horaciano é cristão e medieval; o barroco é pagão e renascentista em sua essência.", "O carpe diem não existe no Barroco — é tema exclusivamente renascentista e clássico."], g: "C", j: "Horácio: 'Aproveite o dia porque a vida é breve e bela' — tom de celebração, sem culpa. O Barroco reinterpreta: o homem quer o prazer (corpo) mas sabe que é pecado (alma), passageiro (tempo) e que será julgado (morte). O gozo barroco é sempre acompanhado de melancolia e culpa. O mesmo tema com dois humores filosóficos opostos — o abismo entre o otimismo renascentista e o pessimismo barroco." },

  { q: "'Prosopopeia' de Bento Teixeira (1601) é o marco inicial do Barroco brasileiro. Qual crítica literária pode ser feita a essa posição canônica?", alts: ["O problema é apenas a língua: foi escrita em espanhol, não em português.", "É obra-prima que merece plenamente sua posição de inaugural do Barroco brasileiro.", "Não tem nenhum problema literário — a crítica a ela é puramente ideológica.", "Bento Teixeira era português, tornando inadequada sua posição na literatura brasileira.", "É imitação tecnicamente inferior de Os Lusíadas: oitavas irregulares, herói histórico menor — sua posição canônica se deve à necessidade de um marco cronológico, não ao mérito literário."], g: "E", j: "A posição de Prosopopeia no cânone é mais periodológica que estética. A obra é tecnicamente modesta: as oitavas camonianas são mal executadas, o herói celebrado (capitão de Pernambuco) é historicamente menor, o poema carece do fôlego épico do modelo. O que a colocou no cânone foi a necessidade da historiografia literária de encontrar um marco para o início do Barroco — era o texto impresso mais antigo disponível." },

  { q: "A Contrarreforma foi o contexto histórico do surgimento do Barroco. Qual relação específica existe entre esse projeto e as características estéticas barrocas?", alts: ["O Barroco e a Contrarreforma são fenômenos históricos sem relação direta entre si.", "Após o Concílio de Trento, a Igreja adotou arte exuberante como instrumento de reafirmação da fé: grandiosidade, dramatismo e apelo emocional serviam para comover os fiéis e combater a sobriedade estética protestante.", "O Barroco surgiu em oposição à Contrarreforma como expressão do pensamento protestante.", "O Barroco foi desenvolvido exclusivamente em países protestantes da Europa do Norte.", "A Contrarreforma proibiu o Barroco por considerá-lo excessivamente mundano e sensorial."], g: "B", j: "O Concílio de Trento (1545-1563) estabeleceu a arte como propaganda fidelis: contra o iconoclasmo protestante, a Igreja respondeu com grandiosidade e apelo sensorial. A arte barroca devia comover (comoção = preparação para a fé), não apenas iluminar racionalmente. As obras de Bernini em Roma e as igrejas jesuítas são exemplos: o fiel entra num espaço que o esmaga com a grandeza de Deus." },

  { q: "O teatro jesuítico de Anchieta enfrentava o dilema da inculturação. Em que consistia esse dilema e como foi parcialmente resolvido?", alts: ["Os jesuítas não usavam teatro — preferiam a catequese oral direta e individual.", "O teatro era proibido pela Igreja, gerando conflito permanente com a hierarquia eclesiástica.", "O teatro jesuítico era idêntico ao medieval europeu, sem nenhuma adaptação ao contexto.", "Para tornar o cristianismo compreensível ao universo tupi, Anchieta usava personagens e narrativas indígenas — mas reconfigurava o sistema cosmológico tupi para apontar para o Deus cristão.", "O problema era exclusivamente linguístico: a língua tupi não tinha vocabulário para conceitos cristãos."], g: "D", j: "O dilema da inculturação: quanto adaptar sem comprometer a essência? Anchieta usava figuras do universo tupi (Guaixará — demônio local perdendo para o arcanjo Miguel), músicas em tupi e situações culturalmente reconhecíveis — mas reconfigurava o significado cosmológico. Era subversão cultural pela forma: usar as formas culturais tupis para substituir seu conteúdo pelo cristão. O dilema teológico permanecia: onde estava a linha entre evangelização e sincretismo herético?" }
],

  {
    id: "fil", icon: "🧠", nome: "Filosofia",
    topico: "Filosofia Medieval: Patrística e Escolástica",
    conteudo: [
      { h2: "1. O PROBLEMA CENTRAL DA FILOSOFIA MEDIEVAL", items: [
        { tipo: "p", txt: "A filosofia medieval tem uma pergunta central que organiza tudo o mais: como conciliar a revelação cristã (o que Deus revelou nas Escrituras) com a razão filosófica grega (especialmente Platão e Aristóteles)? Eles dizem coisas diferentes. O que fazer quando divergem?" },
        { tipo: "p", txt: "A resposta a essa pergunta divide a filosofia medieval em dois grandes períodos: a Patrística, que usa Platão para defender a fé, e a Escolástica, que usa Aristóteles para sistematizá-la. A fórmula clássica de Anselmo resume o espírito de toda a época: 'fides quaerens intellectum' — a fé que busca compreender." }
      ]},
      { h2: "2. PATRÍSTICA — DEFENDENDO O CRISTIANISMO COM FILOSOFIA GREGA", items: [
        { tipo: "p", txt: "Os 'Padres da Igreja' (Patres) eram teólogos dos primeiros séculos do Cristianismo que precisavam fazer três coisas ao mesmo tempo: explicar a doutrina cristã de forma coerente, defender essa doutrina contra as heresias que surgiam de todos os lados, e convencer o mundo greco-romano culto de que o Cristianismo não era superstição de gente simples." },
        { tipo: "p", txt: "Para isso, usaram a filosofia grega — especialmente o neoplatonismo de Plotino — como instrumento. A frase que resume essa relação é 'a filosofia é serva da teologia': a razão filosófica pode ser usada, mas sempre subordinada à fé. Se houver conflito, a fé prevalece." },
        { tipo: "h3", txt: "Santo Agostinho (354-430) — o maior pensador da Patrística" },
        { tipo: "p", txt: "Agostinho não chegou ao Cristianismo de forma simples. Passou pela seita maniqueísta (que acreditava em dois princípios eternos — bem e mal em combate eterno), pelo ceticismo e pelo neoplatonismo antes de se converter. Essa jornada intelectual marcou sua filosofia." },
        { tipo: "ul", items: [
          "ILUMINAÇÃO DIVINA: o conhecimento verdadeiro não vem dos sentidos (que só captam o mutável e particular) nem da razão sozinha — vem de Deus, que ilumina a mente humana. Base platônica: assim como o sol ilumina as coisas físicas, Deus ilumina as verdades eternas na mente.",
          "PRIVATIO BONI (o mal como ausência): contra o maniqueísmo, que dizia que o mal era uma substância eterna coexistente com o bem, Agostinho argumentou que o mal não tem existência própria — é privação de bem. Como a escuridão é ausência de luz, o mal é ausência de bem. Isso preserva a bondade de Deus: ele não criou o mal porque o mal não é uma coisa.",
          "DUAS CIDADES: a história humana é o drama de duas comunidades — a Cidade de Deus (os que amam a Deus acima de tudo) e a Cidade do Homem (os que amam a si mesmos acima de tudo). Não são Roma e Jerusalém geográficas — são comunidades espirituais que coexistem em qualquer sociedade.",
          "O TEMPO: nas Confissões, Agostinho faz uma análise fenomenológica do tempo que antecipa Husserl e Heidegger em 1500 anos. Se o passado não existe mais e o futuro ainda não existe, onde está o tempo? Na mente: o passado é memória, o presente é atenção, o futuro é expectativa. O tempo é 'distensio animi' — extensão da mente."
        ]}
      ]},
      { h2: "3. ESCOLÁSTICA — ORGANIZANDO A FÉ COM LÓGICA DE ARISTÓTELES", items: [
        { tipo: "p", txt: "No século XII, algo extraordinário aconteceu: os textos de Aristóteles foram traduzidos do árabe para o latim, chegando às recém-fundadas universidades medievais (Paris, Oxford, Bolonha). Aristóteles era o filósofo mais completo e sistemático da Antiguidade — tinha teorias sobre física, biologia, ética, política, lógica, metafísica. E era pagão." },
        { tipo: "p", txt: "O desafio da Escolástica: como usar Aristóteles sem que ele destrua o Cristianismo? A resposta de São Tomás de Aquino foi a mais brilhante." },
        { tipo: "h3", txt: "O Problema dos Universais — o debate filosófico central da Escolástica" },
        { tipo: "p", txt: "Quando dizemos 'cachorro', estamos nos referindo a uma coisa que existe realmente no mundo, ou apenas a uma palavra que criamos para agrupar animais parecidos? Os universais (conceitos gerais como 'humanidade', 'bondade', 'cachorro') existem na realidade ou apenas na mente?" },
        { tipo: "ul", items: [
          "REALISMO (Anselmo de Cantuária): os universais existem realmente, antes e independentemente das coisas individuais. 'Humanidade' é uma essência real que todos os humanos participam. Influência platônica.",
          "NOMINALISMO (Guilherme de Ockham): os universais são apenas nomes — convenções linguísticas que criamos para agrupar coisas semelhantes. Só existem indivíduos particulares. Perigoso para a teologia: como fundamentar a Trindade sem o realismo dos universais?",
          "CONCEITUALISMO (Abelardo): os universais existem como conceitos na mente, mas correspondem a algo real nas coisas. Solução de compromisso."
        ]},
        { tipo: "h3", txt: "São Tomás de Aquino (1225-1274) — a grande síntese" },
        { tipo: "p", txt: "Tomás realizou o que parecia impossível: sintetizou Aristóteles com o Cristianismo. Seu princípio fundamental: 'a graça não destrói a natureza, mas a aperfeiçoa'. Razão e fé não são inimigas — são complementares." },
        { tipo: "ul", items: [
          "CINCO VIAS: cinco provas racionais da existência de Deus, todas a posteriori (partem da experiência do mundo). Movimento → deve haver um Primeiro Motor. Causalidade → deve haver uma Causa Primeira. Contingência → deve haver um Ser Necessário. Graus de perfeição → deve haver um Ser Maximamente Perfeito. Finalidade → deve haver um Ordenador.",
          "LEI NATURAL: a razão humana participa da lei eterna de Deus. Todo ser humano, por sua natureza racional, tem acesso a princípios morais básicos (faça o bem, evite o mal). Fundamento do direito natural ocidental — de Tomás a Locke a Martin Luther King Jr."
        ]},
        { tipo: "h3", txt: "Anselmo de Cantuária — o argumento que não para de ser discutido" },
        { tipo: "p", txt: "Anselmo propôs o Argumento Ontológico: 'Deus é aquilo além do qual nada maior pode ser pensado.' Se Deus existisse só no pensamento, poderíamos imaginar algo ainda maior — um ser que existisse também na realidade. Mas isso contradiria a definição. Logo, Deus deve existir na realidade." },
        { tipo: "ex", txt: "KANT DERRUBOU O ARGUMENTO: existência não é uma propriedade que aumenta a perfeição. '100 reais que existem' e '100 reais que não existem' têm o mesmo conteúdo conceitual — a diferença está na relação com a realidade, não no conceito. Passar da definição conceitual para a existência real é um salto lógico ilegítimo." }
      ]}
    ],
    questoes: [
  { q: "Santo Agostinho escreve: 'Tu nos fizeste para Ti, e inquieto está o nosso coração, enquanto não repousa em Ti.' Qual problema filosófico essa frase trata e como a solução difere da aristotélica?", alts: ["Trata do problema do livre-arbítrio, sem relação com a questão da felicidade humana.", "A frase é puramente poética e devocional, sem conteúdo filosófico preciso e analisável.", "Agostinho e Aristóteles têm a mesma concepção de felicidade, diferindo apenas na terminologia.", "Trata do problema do mal: Deus criou o sofrimento humano como prova espiritual.", "Trata do bem supremo: Agostinho afirma que o desejo humano é orientado ao infinito — nenhum bem finito satisfaz. Difere de Aristóteles, para quem a eudaimonia é alcançável na vida presente pela prática das virtudes."], g: "E", j: "Aristóteles: eudaimonia = florescimento das faculdades humanas na vida presente; é imanente e alcançável sem transcendência divina. Agostinho: a beatitudo é transcendente — o coração humano tem capacidade de desejo infinita que só Deus pode preencher. É a passagem do teleologismo imanente aristotélico para o transcendente cristão — uma das maiores rupturas filosóficas da história ocidental." },

  { q: "O nominalismo de Guilherme de Ockham foi considerado perigoso para a teologia medieval. Por quê?", alts: ["Ockham questionava exclusivamente a autoridade temporal do Papa, não os dogmas da Igreja.", "Ockham era ateu declarado e negava explicitamente a existência de Deus em seus escritos.", "Ockham defendia o protestantismo, incompatível com a doutrina da Igreja Católica romana.", "Se universais são apenas nomes, a Trindade (que pressupõe uma 'natureza divina' universal) perde fundamento ontológico — o nominalismo ameaçava a arquitetura conceitual de toda a teologia medieval.", "O nominalismo era perigoso apenas em filosofia política, sem implicações teológicas."], g: "D", j: "A ameaça nominalista é estrutural: a Trindade pressupõe que Pai, Filho e Espírito Santo partilham uma 'natureza divina' — um universal real. Se universais são meros nomes, como pode haver três Pessoas 'num só Deus'? O mesmo vale para a Igreja como 'Corpo Místico' e os sacramentos como mediações universais. O nominalismo não atacava um dogma — atacava a arquitetura ontológica que sustentava todos eles." },

  { q: "São Tomás de Aquino afirma 'a graça não destrói a natureza, mas a aperfeiçoa'. Qual implicação filosófica essa afirmação tem para sua síntese entre razão e fé?", alts: ["Tomás rejeita o uso de Aristóteles por ser filósofo pagão sem acesso à revelação cristã.", "Tomás defende que a fé deve substituir completamente a razão em todos os domínios.", "A teologia torna-se desnecessária, pois a razão natural já alcança todas as verdades necessárias.", "A razão natural não é anulada pela revelação: pode conhecer certas verdades sobre Deus (as Cinco Vias), e a graça revela o que a razão sozinha não alcança — justificando o uso de Aristóteles na teologia.", "A frase é apenas retórica, sem implicações filosóficas precisas ou consequências doutrinárias."], g: "D", j: "O princípio 'gratia perficit naturam' é a chave do tomismo: razão e fé são ordens distintas e complementares. A razão alcança os 'preâmbulos da fé' (existência de Deus, imortalidade da alma); a fé revela os 'mistérios' (Trindade, Encarnação, Redenção). Isso legitima a 'baptização' de Aristóteles — usar o maior filósofo pagão a serviço da teologia cristã sem abandonar a especificidade da revelação." },

  { q: "Anselmo de Cantuária propôs o Argumento Ontológico para provar a existência de Deus. Kant o refutou com argumento específico. Em que consiste essa refutação?", alts: ["A refutação baseia-se na impossibilidade lógica de formar qualquer conceito coerente de Deus.", "Kant argumentou que 'existência' não é predicado que aumenta a perfeição: passar da definição conceitual para a existência real é salto lógico ilegítimo.", "Kant demonstrou empiricamente que Deus não existe por meio de experimentos científicos.", "Kant aceitou o argumento e o aperfeiçoou em sua filosofia crítica do século XVIII.", "Kant refutou demonstrando que 'maior' é conceito culturalmente relativo e não universal."], g: "B", j: "Kant (Crítica da Razão Pura, 1781): 'existência' não acrescenta nada ao conceito. '100 reais reais' e '100 reais possíveis' têm o mesmo conteúdo conceitual — a diferença está na relação com a realidade, não no conceito em si. Aplicado a Anselmo: 'Deus que existe na realidade' não é conceitualmente 'maior' do que 'Deus que existe só no pensamento', pois existência não é uma propriedade que aumenta a perfeição." },

  { q: "Qual diferença fundamental separa a Patrística da Escolástica em sua relação com a filosofia grega?", alts: ["A Patrística era pagã e a Escolástica, a primeira corrente autenticamente cristã.", "A Patrística usou o neoplatonismo para defender e sistematizar a fé; a Escolástica usou o aristotelismo traduzido para sistematizá-la nas universidades medievais do século XII.", "A Escolástica surgiu nos monastérios; a Patrística nas primeiras universidades medievais.", "A Escolástica rejeitava completamente a filosofia pagã grega por razões doutrinárias.", "A Patrística era aristotélica e a Escolástica usava exclusivamente o platonismo de Platão."], g: "B", j: "Agostinho leu Plotino (neoplatonista), não Platão diretamente. O neoplatonismo oferecia ferramentas para a apologética. A Escolástica emergiu após a tradução de Aristóteles do árabe para o latim no século XII — sua lógica tornou-se instrumento de sistematização teológica nas universidades de Paris, Oxford e Bolonha. Tomás é a síntese: não substituiu Platão por Aristóteles, mas os articulou em novo sistema." },

  { q: "As Cinco Vias de São Tomás para provar a existência de Deus diferem do Argumento Ontológico de Anselmo em que aspecto fundamental?", alts: ["São argumentos de autoridade baseados exclusivamente nas Escrituras sagradas.", "São argumentos fideístas que rejeitam completamente o uso da razão na teologia.", "As Cinco Vias são argumentos a priori, baseados apenas no conceito de Deus, como o de Anselmo.", "São argumentos idênticos ao de Anselmo, apenas organizados em cinco categorias distintas.", "São argumentos a posteriori: partem da experiência do mundo (movimento, causalidade) para concluir a existência de Deus — ao contrário de Anselmo, que parte apenas do conceito de Deus."], g: "E", j: "A distinção a priori/a posteriori é fundamental: Anselmo parte do conceito ('aquilo além do qual nada maior pode ser pensado') e conclui por análise conceitual — argumento a priori, independente da experiência. Tomás parte da experiência do mundo (há movimento, há causas, há contingência) e pergunta: o que explica isso? — argumento a posteriori. São estratégias filosóficas radicalmente diferentes para o mesmo problema." },

  { q: "Compare as soluções de Agostinho (privatio boni) e Tomás (privatio boni debiti) para o problema do mal:", alts: ["Nenhum dos dois oferece solução satisfatória — ambos reconhecem o problema como insolúvel.", "Tomás rejeita a solução agostiniana, propondo que o mal é substância independente.", "Agostinho e Tomás têm a mesma solução sem nenhuma diferença filosófica relevante.", "Agostinho defende que Deus criou o mal; Tomás, que o mal é eterno e coexiste com Deus.", "Agostinho: mal é privação de bem (refuta o maniqueísmo). Tomás refina: privação de um bem DEVIDO à natureza do ser — a cegueira é mal para o humano (que deveria ver), não para a pedra."], g: "E", j: "O refinamento tomista é filosoficamente significativo: Agostinho diz 'o mal é privação de bem' — mas qualquer ausência seria mal (a pedra não tem visão: seria 'má'?). Tomás resolve: é mal apenas a ausência do bem que é proporcional à natureza do ser ('devido' a ela). A ausência de visão não é mal para a pedra (não lhe é devida), mas é mal para o humano. Pequeno ajuste, grande precisão filosófica." },

  { q: "A teoria agostiniana do tempo (Confissões, Livro XI) é considerada precursora da fenomenologia moderna. Em que consiste sua originalidade?", alts: ["O tempo não existe objetivamente no mundo externo — é distensio animi (extensão da mente): passado é memória, presente é atenção e futuro é expectativa.", "Agostinho simplesmente adotou a teoria do tempo de Aristóteles sem modificações.", "A teoria é idêntica à física moderna de Newton, antecipando a ciência do século XVII.", "Agostinho nega completamente a existência do tempo, considerando-o ilusão da percepção.", "Para Agostinho, o tempo é eterno e imutável, como as verdades matemáticas e geométricas."], g: "A", j: "O argumento agostiniano é fenomenológico avant la lettre: se o passado não existe mais e o futuro ainda não existe, o 'presente' é instante sem duração — como medimos o tempo? Agostinho responde: medimos estados da mente. O tempo é 'distensio animi'. Husserl e Heidegger retomaram esse problema no século XX — 1500 anos depois de Agostinho formulá-lo pela primeira vez nas Confissões." },

  { q: "A escolástica tardia foi alvo da crítica humanista renascentista. Essa crítica era justa?", alts: ["Os humanistas consideravam a escolástica o método filosófico mais rigoroso disponível.", "Era completamente justa — a escolástica de Tomás de Aquino era verbalismo estéril.", "Era justa em relação à escolástica tardia degenerada (questões artificiais sem conexão humana), mas injusta como crítica ao método tomista genuíno, que era rigoroso e substantivo.", "Era completamente injusta — não havia nenhuma degeneração na escolástica medieval.", "A crítica era apenas estética, sem nenhuma substância filosófica ou intelectual."], g: "C", j: "Erasmo ridicularizava questões como 'quantos anjos cabem na ponta de uma agulha' — crítica à escolástica tardia que havia se fragmentado em disputas artificiais. Mas isso era crítica à degeneração, não ao método em si. A Suma de Tomás demonstra que a disputatio genuína era instrumento de rigor incomparável. Os humanistas acertaram no alvo errado: confundiram a decadência de um método com o próprio método." },

  { q: "O conceito de 'lei natural' em São Tomás articula metafísica, ética e política. Qual implicação política mais relevante ele gera?", alts: ["A lei natural é idêntica à lei positiva do Estado — toda lei humana é automaticamente justa.", "Tomás rejeita qualquer lei natural, fundando a ética exclusivamente na revelação bíblica.", "A lei natural tomista é culturalmente relativa, variando de sociedade para sociedade.", "Uma lei humana injusta que contradiz a lei natural perde sua obrigatoriedade moral — fundamento da desobediência civil, de Tomás a Locke a Martin Luther King Jr.", "A lei natural é puramente religiosa, sem qualquer implicação jurídica ou política."], g: "D", j: "A arquitetura tomista das leis: lei eterna (plano divino) → lei natural (razão humana participando dela) → lei humana (derivando da natural) → lei divina (Escrituras). A implicação política: 'lei humana injusta não é lei, mas corrupção da lei' (Suma, I-II, q.96, a.4). Esse princípio fundamenta toda a tradição de direito natural — de Tomás a Locke (resistência ao tirano) a Martin Luther King Jr. (resistência às leis segregacionistas)." },

  { q: "O debate medieval sobre os universais tinha implicações diretas para a teologia. Qual posição representava maior risco doutrinal para a Igreja Católica?", alts: ["O nominalismo de Ockham, pois ao negar existência real aos universais ameaçava o fundamento ontológico de dogmas como a Trindade e a unidade da Igreja.", "O platonismo agostiniano, por identificar os universais com as Ideias divinas na mente de Deus.", "Nenhuma das posições representava risco doutrinal — eram debates puramente acadêmicos.", "O conceitualismo de Abelardo, por propor que os universais existem apenas na mente humana.", "O realismo de Anselmo, pois afirmava a existência de universais independentes de Deus."], g: "A", j: "O nominalismo de Ockham era o mais perigoso: se universais são apenas nomes, como fundamentar a Trindade (três Pessoas partilhando uma 'natureza divina' universal real)? Como justificar a Igreja como 'Corpo Místico' (unidade real dos fiéis)? Os sacramentos como mediações universais? O realismo e o conceitualismo mantinham o fundamento ontológico necessário para esses dogmas; o nominalismo o dissolvia." }
],

  {
    id: "soc", icon: "👥", nome: "Sociologia",
    topico: "Instituições Sociais, Desigualdade e Conflito",
    conteudo: [
      { h2: "CAPÍTULO 4 — FAMÍLIA E ESCOLA: COMO A SOCIEDADE SE REPRODUZ", items: [
        { tipo: "p", txt: "Como as pessoas aprendem a ser parte de uma sociedade? Como os valores, normas e comportamentos se transmitem de uma geração para a próxima? É para isso que servem as instituições sociais — estruturas estáveis que organizam o comportamento coletivo e garantem que a vida em sociedade funcione mesmo quando os indivíduos mudam." },
        { tipo: "p", txt: "Durkheim via as instituições como 'fatos sociais': maneiras de agir externas ao indivíduo e dotadas de poder coercitivo — elas existem independentemente de nós e nos moldam mesmo sem percebemos. Marx via as instituições como reflexo das relações de produção — ferramentas que a classe dominante usa para reproduzir sua dominação. Weber as via como cristalizações de ações sociais repetidas que ganham sentido e estabilidade." }
      ]},
      { h2: "A FAMÍLIA — PRIMEIRA ESCOLA DO SER HUMANO", items: [
        { tipo: "p", txt: "A família é a instituição mais universal da humanidade — presente em todas as culturas conhecidas, embora com formas extremamente variadas. É onde ocorre a socialização primária: a internalização mais profunda e duradoura de valores, linguagem, papéis de gênero e normas básicas de conduta." },
        { tipo: "p", txt: "Berger e Luckmann (A Construção Social da Realidade, 1966) mostraram que a socialização primária é a mais poderosa de todas — ela forma a identidade básica do indivíduo de uma maneira que as socializações posteriores dificilmente conseguem desfazer completamente. É por isso que os primeiros anos de vida importam tanto." },
        { tipo: "ul", items: [
          "TIPOS CONTEMPORÂNEOS: nuclear (pai-mãe-filhos), extensa (avós, tios), monoparental (um adulto responsável com filhos — majoritariamente mães), homoparental, reconstituída (após separação, com filhos de uniões anteriores).",
          "TRANSFORMAÇÕES RECENTES: queda da natalidade, aumento do divórcio, reconhecimento legal de uniões homoafetivas (STF, 2011), maior inserção feminina no mercado de trabalho, famílias 'LAT' (casais que não coabitam).",
          "FUNÇÃO IDEOLÓGICA: para Marx e Engels, a família burguesa nuclear não é 'natural' — é uma construção histórica que serve à reprodução da propriedade privada e da ordem capitalista. A divisão sexual do trabalho doméstico é uma das bases da opressão feminina."
        ]}
      ]},
      { h2: "A ESCOLA — ONDE A SOCIEDADE SE FABRICA", items: [
        { tipo: "p", txt: "A escola é a principal instituição de socialização secundária — ela complementa, amplia e às vezes contradiz o que a família ensinou. Mas a sociologia crítica descobriu algo perturbador sobre a escola: ela não apenas transmite conhecimento — ela reproduz desigualdades." },
        { tipo: "p", txt: "Pierre Bourdieu e Jean-Claude Passeron, em 'A Reprodução' (1970), fizeram uma análise que sacudiu a educação: a escola não é neutra. Ela valoriza e premia o 'capital cultural' das classes dominantes — o vocabulário, os gostos, as referências, as disposições corporais que os filhos de famílias ricas adquirem antes mesmo de entrar na escola. Ao tratar isso como 'mérito', a escola converte vantagem de classe em aparente capacidade individual." },
        { tipo: "ul", items: [
          "VIOLÊNCIA SIMBÓLICA: a imposição dos valores das classes dominantes como se fossem universais, sem que os dominados reconheçam isso como violência. É mais eficaz que a coerção física porque os próprios dominados a interiorizam e participam de sua própria dominação — atribuindo seus fracassos a si mesmos, não às estruturas.",
          "CURRÍCULO OCULTO (Philip Jackson, 1968): além do currículo formal (matemática, história...), a escola ensina implicitamente disciplina, pontualidade, aceitação da autoridade, conformidade com regras — valores funcionais para o mercado de trabalho e para a manutenção da ordem social.",
          "AIE (Althusser): para o filósofo marxista Louis Althusser, a escola é um 'Aparelho Ideológico de Estado' — ao lado da família, da Igreja e da mídia, ela produz sujeitos adaptados às relações de produção capitalistas, garantindo sua reprodução sem necessidade de coerção física."
        ]}
      ]},
      { h2: "CAPÍTULO 5 — DESIGUALDADE, POBREZA E CONFLITO", items: [
        { tipo: "h3", txt: "Desigualdade Social — o que é e como se mede" },
        { tipo: "p", txt: "O Brasil tem um dos maiores índices de desigualdade do mundo. O Coeficiente de Gini (que vai de 0, igualdade perfeita, a 1, desigualdade absoluta) historicamente acima de 0,5 coloca o país entre os mais desiguais do planeta. Mas a desigualdade não é só econômica." },
        { tipo: "ul", items: [
          "MARX: a desigualdade é estrutural — resultado da exploração. O capitalista extrai mais-valia do trabalhador (paga menos do que o trabalho produz) e acumula capital. A desigualdade não é acidente — é o mecanismo central do capitalismo.",
          "WEBER: três dimensões independentes de estratificação. CLASSE (posição econômica), STATUS (prestígio e honra social — pode ser alto com renda baixa, como um professor em certas culturas) e PODER POLÍTICO (capacidade de influenciar decisões coletivas). As três dimensões podem dissociar-se — daí a maior complexidade analítica de Weber.",
          "FUNCIONALISMO (Davis-Moore, 1945): a desigualdade é funcionalmente necessária. Posições mais importantes precisam ser mais remuneradas para atrair os mais capazes. Crítica: pressupõe que só os mais capazes chegam às posições mais remuneradas — ignora as barreiras estruturais de raça, classe e gênero."
        ]},
        { tipo: "h3", txt: "Pobreza — o que é e o que não é" },
        { tipo: "ul", items: [
          "ABSOLUTA: privação do mínimo para sobrevivência física — alimentação, abrigo, saúde básica.",
          "RELATIVA: abaixo do padrão médio de vida da sociedade. Alguém pode não passar fome mas ser pobre relativamente — sem acesso a lazer, tecnologia, educação de qualidade.",
          "MULTIDIMENSIONAL (Amartya Sen): a renda não captura tudo. Privações em saúde, educação, saneamento, participação política e segurança são formas de pobreza que o dinheiro sozinho não resolve. O IPM (Índice de Pobreza Multidimensional) do PNUD mede essas dimensões."
        ]},
        { tipo: "h3", txt: "Conflito Social — o motor das transformações" },
        { tipo: "ul", items: [
          "MARX: o conflito de classes é o motor da história. A contradição entre burguesia (detentora dos meios de produção) e proletariado (vendedor de força de trabalho) é irresolvível dentro do capitalismo — tende à revolução.",
          "DAHRENDORF: o conflito não se limita às classes econômicas. Toda organização hierárquica tem quem manda e quem obedece — e isso gera conflito. Escolas, igrejas, famílias, burocracia estatal têm seus próprios conflitos de autoridade.",
          "SIMMEL: o conflito não é necessariamente destrutivo — pode ser integrador. Grupos que enfrentam um inimigo externo se unem internamente. Conflitos regulamentados (política parlamentar, negociação sindical) permitem a expressão de tensões sem ruptura da ordem.",
          "INTERSECCIONALIDADE (Kimberlé Crenshaw): os sistemas de opressão (classe, raça, gênero, sexualidade) não operam isoladamente — eles se intersectam e se constituem mutuamente. A experiência de uma mulher negra pobre não é a soma de 'ser mulher' + 'ser negra' + 'ser pobre' — é uma posição singular com dinâmicas próprias que nenhuma análise isolada captura."
        ]}
      ]}
