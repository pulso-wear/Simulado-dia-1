    questoes: [
  { q: "Pierre Bourdieu usa o conceito de 'violência simbólica' para descrever a função reprodutora da escola. Em que consiste essa violência e por que é mais eficaz que a coerção física?", alts: ["É a exclusão explícita e formal dos alunos pobres das escolas de melhor qualidade.", "O conceito foi criado por Marx, não por Bourdieu, e refere-se à exploração econômica.", "É a violência física exercida por professores contra alunos de classes populares nas escolas.", "É a imposição dos valores das classes dominantes como universais, sem que os dominados a reconheçam como violência — eles interiorizam esses valores e atribuem seus fracassos a si mesmos.", "É menos eficaz que a coerção física por não ter consequências materiais reais no mundo."], g: "D", j: "O insight de Bourdieu: a dominação mais eficaz é a que não se reconhece como dominação. Filhos de classes dominantes chegam à escola com capital cultural valorizado pelo sistema. Ao premiar isso como 'mérito', a escola converte vantagem de classe em aparente capacidade individual. Os que 'falham' atribuem o fracasso a si mesmos — não às estruturas. Autoinfligida, a violência simbólica é incomparavelmente mais estável que qualquer coerção física." },

  { q: "Anthony Giddens usa o conceito de 'destradicionalização' para descrever transformações na família contemporânea. O que o conceito descreve e quais são suas ambivalências?", alts: ["Afeta exclusivamente as famílias de classe alta com alto nível de escolaridade.", "Descreve exclusivamente o abandono das práticas religiosas pelas famílias modernas.", "É sinônimo de secularização familiar, sem implicações para os papéis de gênero.", "Descreve apenas o aumento do divórcio, sem outras dimensões de transformação.", "Descreve o processo pelo qual as formas familiares perdem o caráter normativo obrigatório, passando a ser organizadas por escolha reflexiva — liberdade e insegurança ontológica como duas faces da mesma moeda."], g: "E", j: "Giddens (A Transformação da Intimidade, 1992): nas modernidades tardias, as relações íntimas tornaram-se 'relacionamentos puros' — mantidos enquanto satisfazem ambas as partes. Liberdade e insegurança são as duas faces: mais autonomia para construir formas familiares diversas, mas também mais ansiedade existencial, pois não há roteiro pronto. A destradicionalização é libertadora e desorientadora ao mesmo tempo." },

  { q: "A crítica sociológica ao discurso meritocrático na educação brasileira baseia-se principalmente em qual argumento?", alts: ["A meritocracia pressupõe igualdade de condições de partida — no Brasil, com desigualdades históricas estruturadas por raça, classe e gênero, ela legitima o resultado de uma corrida desigual como mérito puro.", "A crítica é que a meritocracia incentiva excessivamente a competição entre os estudantes.", "A crítica é que o mérito individual não existe e todo sucesso é resultado apenas das condições sociais.", "A meritocracia é completamente justa e não tem críticas sociológicas válidas.", "É um problema exclusivo das universidades privadas, sem impacto na educação pública."], g: "A", j: "Michael Sandel e Bourdieu mostram que o sistema avalia desempenho produzido por condições desiguais como se fosse capacidade individual. Um estudante negro, pobre, de escola pública que chega ao ENEM já enfrentou décadas de desvantagens estruturais. Declarar que seu resultado é 'só mérito' naturaliza a injustiça histórica e transfere responsabilidade coletiva para o fracasso individual." },

  { q: "Émile Durkheim escolheu o suicídio como objeto de estudo em 'O Suicídio' (1897). Por que essa escolha é metodologicamente estratégica?", alts: ["Ao demonstrar que mesmo o ato mais individual é determinado por forças sociais (taxas variam por integração grupal), Durkheim provou a autonomia explicativa da sociologia de forma irrefutável.", "Durkheim nunca estudou o suicídio; a obra é de um discípulo mal atribuída a ele.", "A escolha foi arbitrária — Durkheim poderia ter escolhido qualquer outro fenômeno social.", "O suicídio foi escolhido pela disponibilidade exclusiva de dados estatísticos confiáveis.", "Durkheim escolheu o suicídio por ser o tema mais dramático e emocionalmente impactante."], g: "A", j: "A escolha é um coup de maître metodológico: se o fato social tem poder explicativo mesmo sobre o ato mais íntimo e privado (o suicídio), a sociologia demonstra sua autonomia de forma definitiva. A regularidade das taxas por grupo social (protestantes > católicos; solteiros > casados; períodos de anomia > períodos estáveis) mostra forças coletivas operando independentemente das psicologias individuais." },

  { q: "Max Weber distingue 'classe', 'estamento' e 'partido' como dimensões independentes. Qual exemplo ilustra melhor a dissociação entre essas dimensões?", alts: ["Weber desenvolveu as três dimensões exclusivamente para descrever a sociedade medieval europeia.", "Um intelectual pode ter alto status de estamento com renda modesta; um novo rico pode ter alta classe com baixo prestígio social — Weber contra o economicismo marxista que reduz tudo à classe.", "A distinção é apenas teórica, sem exemplos empíricos demonstráveis na realidade social.", "É impossível que alguém tenha alto status com baixa renda — as dimensões são sempre correlatas.", "Classe econômica e status de estamento são sempre idênticos nas sociedades contemporâneas."], g: "B", j: "Weber criou as três dimensões para capturar realidades que o marxismo (classe = tudo) não conseguia explicar. O sacerdote medieval: enorme status, renda mínima. O comerciante rico medieval: alta classe econômica, baixo status aristocrático. No Brasil contemporâneo: o professor universitário (status intelectual alto, renda modesta) vs. o empresário sem escolaridade (alta classe, baixo status intelectual). As três dimensões são empiricamente dissociáveis." },

  { q: "O conceito de 'pobreza multidimensional' (Amartya Sen) é apresentado como crítica ao conceito de 'linha de pobreza'. Qual é o argumento central?", alts: ["As duas abordagens são equivalentes — diferem apenas em aspectos metodológicos secundários.", "A renda não captura tudo: privações em saúde, educação e participação política não são automaticamente resolvidas com dinheiro — uma família pode estar acima da linha de pobreza e ainda sofrer privações estruturais.", "A linha de pobreza superestima a pobreza — a abordagem multidimensional é mais conservadora.", "A pobreza multidimensional é puramente subjetiva e não pode ser medida com rigor científico.", "A pobreza multidimensional é exclusiva para países desenvolvidos, inaplicável ao Brasil."], g: "B", j: "Sen (Desenvolvimento como Liberdade, 1999): renda é meio, não fim. O fim são as 'capacidades' — a liberdade real de levar a vida que se valoriza. Um trabalhador com renda formal pode ser 'pobre em capacidades' se não tem saúde, educação ou segurança. A pandemia demonstrou: famílias acima da linha de pobreza monetária perderam empregos, filhos pararam de estudar, adoeceram sem acesso a saúde — privações que a renda sozinha não captura." },

  { q: "Ralf Dahrendorf propõe teoria do conflito como alternativa ao marxismo. Qual é sua contribuição específica?", alts: ["Dahrendorf simplesmente aplicou a teoria marxista a contextos pós-industriais sem modificações.", "Ao substituir 'propriedade dos meios de produção' por 'relações de autoridade', Dahrendorf generaliza o conflito para toda organização hierárquica — escolas, igrejas, famílias — além da fábrica.", "Dahrendorf defende que o funcionalismo de Parsons já explicava adequadamente o conflito.", "A contribuição é puramente metodológica, sem nenhum conteúdo teórico original.", "Dahrendorf nega completamente a existência de conflito social nas sociedades democráticas."], g: "B", j: "A generalização de Dahrendorf é o avanço real: o conflito não é exclusivo do capitalismo industrial — existe em toda organização hierárquica onde há quem manda e quem obedece. Isso permite analisar conflitos na burocracia estatal, nas famílias patriarcais, nas instituições religiosas — sem precisar reduzi-los a conflitos de classe econômica marxista. Amplia o campo explicativo da teoria do conflito." },

  { q: "A perspectiva interseccional de Kimberlé Crenshaw critica as teorias clássicas de estratificação. Qual é o argumento central?", alts: ["Apenas a classe econômica é variável relevante, como Marx defende com maior precisão.", "A interseccionalidade defende que raça é a única variável relevante para entender desigualdade.", "O conceito foi desenvolvido por Bourdieu, não por Crenshaw, na tradição francesa.", "A interseccionalidade rejeita completamente as categorias de raça e gênero como instrumentos.", "Sistemas de opressão (classe, raça, gênero) não operam como variáveis somáveis — se intersectam e se constituem mutuamente, criando posições singulares irredutíveis a qualquer eixo isolado."], g: "E", j: "Crenshaw (1989) desenvolveu a interseccionalidade a partir de um caso jurídico: mulheres negras processando a GM não conseguiam provar discriminação racial (havia homens negros) nem de gênero (havia mulheres brancas). O direito não tinha categorias para a posição específica de 'mulher negra'. As categorias não se somam — se constituem mutuamente, criando posições singulares que nenhuma análise isolada captura." },

  { q: "Anomia (Durkheim) e alienação (Marx) são conceitos frequentemente confundidos. Qual é a diferença fundamental?", alts: ["Anomia é déficit de normas coletivas (causado por mudanças sociais rápidas); alienação é separação do trabalhador do produto de seu trabalho (causada pelas relações de produção capitalistas).", "Anomia é conceito econômico; alienação é exclusivamente psicológico e individual.", "São diagnósticos idênticos que propõem as mesmas soluções políticas e sociais.", "São sinônimos utilizados por autores de tradições teóricas diferentes.", "Anomia refere-se apenas ao suicídio; alienação, apenas ao trabalho industrial."], g: "A", j: "A distinção é de natureza e causa: anomia (Durkheim) = o indivíduo não sabe como agir porque as normas coletivas foram dissolvidas por transformações sociais rápidas. Alienação (Marx) = o trabalhador é separado do produto, da atividade, da espécie e dos outros pelas relações de produção. Anomia é resolvida por mais integração e regulação social; alienação exige transformação das relações de produção." },

  { q: "A teoria de Robert Putnam sobre 'capital social' distingue-se do 'capital cultural' de Bourdieu. Qual é a diferença e a implicação política que ela gera?", alts: ["Capital cultural de Bourdieu é recurso de distinção e dominação de classe; capital social de Putnam é a rede de confiança e reciprocidade que permite a ação coletiva e sustenta a democracia.", "Putnam rejeita completamente o conceito de capital cultural de Bourdieu como equivocado.", "Capital social é sinônimo de dinheiro acumulado por uma classe social específica.", "Os dois conceitos são idênticos em conteúdo e implicações políticas e analíticas.", "São conceitos do mesmo campo teórico aplicados a fenômenos absolutamente idênticos."], g: "A", j: "Bourdieu: capital cultural como recurso de reprodução da dominação — opera em campos de disputa por posição social (escola, arte). Putnam (Bowling Alone, 2000): capital social como infraestrutura cívica — redes de confiança que permitem cooperação para fins coletivos. O declínio do capital social explica a crise da democracia americana. São perspectivas complementares sobre dois aspectos diferentes da vida social." },

  { q: "A análise funcionalista de Davis e Moore afirma que a desigualdade social é 'funcionalmente necessária'. Qual crítica sociológica direta pode ser feita a essa posição?", alts: ["A teoria de Davis-Moore é marxista, não funcionalista — a crítica é de classificação.", "A crítica é apenas que a desigualdade não existe nas sociedades democráticas modernas.", "Não existe crítica válida — a teoria é empiricamente correta e universalmente aceita.", "A crítica é que a teoria não se aplica ao capitalismo moderno de serviços.", "O funcionalismo pressupõe que só os mais talentosos ocupam posições mais remuneradas — ignora que barreiras estruturais de raça, classe e gênero impedem os mais talentosos de chegarem a essas posições."], g: "E", j: "Davis e Moore (1945) argumentam que desigualdade é funcional — premia os mais capazes para posições importantes. A crítica estruturalista (Melvin Tumin, 1953): se barreiras de raça, classe e gênero impedem que os 'mais talentosos' cheguem às posições mais remuneradas, a desigualdade resultante não é funcional — é produto de exclusão histórica sendo naturalizada como seleção meritocrática." }
],
  }
];
// ═══════════════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════════════

const state = {
  current: 0,
  tab: 'content',
  scores: MATERIAS.map(m => ({ total: m.questoes.length, answered: 0, correct: 0 })),
  answers: MATERIAS.map(m => Array(m.questoes.length).fill(null))
};

// ═══════════════════════════════════════════════════════════════
// NOTAS — salvas no localStorage por matéria
// ═══════════════════════════════════════════════════════════════

function getNota(mIdx) {
  try { return localStorage.getItem('nota_' + MATERIAS[mIdx].id) || ''; } catch(e) { return ''; }
}
function saveNota(mIdx, txt) {
  try { localStorage.setItem('nota_' + MATERIAS[mIdx].id, txt); } catch(e) {}
}

// ── CANVAS (Apple Pencil) ──────────────────────────────────────

let canvasDrawing = false;
let canvasLastX = 0;
let canvasLastY = 0;
let canvasTool = 'pen'; // 'pen' ou 'eraser'
let canvasPenSize = 2;
let canvasPenColor = '#e8eaf0';

function getCanvasData(mIdx) {
  try { return localStorage.getItem('canvas_' + MATERIAS[mIdx].id) || ''; } catch(e) { return ''; }
}
function saveCanvasData(mIdx, data) {
  try { localStorage.setItem('canvas_' + MATERIAS[mIdx].id, data); } catch(e) {}
}
function getNoteMode(mIdx) {
  try { return localStorage.getItem('notemode_' + MATERIAS[mIdx].id) || 'text'; } catch(e) { return 'text'; }
}
function setNoteMode(mIdx, mode) {
  try { localStorage.setItem('notemode_' + MATERIAS[mIdx].id, mode); } catch(e) {}
}

function buildNotes(mIdx) {
  const nota = getNota(mIdx);
  const mode = getNoteMode(mIdx);
  const lastSaved = (() => {
    try { return localStorage.getItem('nota_ts_' + MATERIAS[mIdx].id) || ''; } catch(e) { return ''; }
  })();

  return `
    <div class="notes-wrap">
      <div class="notes-header">
        <span class="notes-title">📓 Anotações — ${MATERIAS[mIdx].nome}</span>
        <span class="notes-saved" id="notes-saved">${lastSaved ? 'Salvo às ' + lastSaved : ''}</span>
      </div>

      <div class="mode-switch">
        <button class="mode-btn${mode === 'text' ? ' active' : ''}" onclick="switchNoteMode(${mIdx},'text')">⌨️ Texto</button>
        <button class="mode-btn${mode === 'draw' ? ' active' : ''}" onclick="switchNoteMode(${mIdx},'draw')">✏️ Desenho (Pencil)</button>
      </div>

      ${mode === 'text' ? `
        <textarea
          id="notes-textarea"
          class="notes-area"
          placeholder="Escreva aqui... resumos, dúvidas, conexões entre temas."
          oninput="notaChanged()"
        >${nota}</textarea>
        <div class="notes-actions">
          <button class="notes-btn save" onclick="salvarNota(${mIdx})">💾 Salvar</button>
          <button class="notes-btn clear" id="btn-limpar-nota" onclick="limparNota(${mIdx})">🗑 Limpar</button>
        </div>
      ` : `
        <div class="canvas-toolbar">
          <button class="tool-btn" id="btn-pen" onclick="setTool('pen')" title="Caneta">🖊</button>
          <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="Borracha">🧹</button>
          <div class="tool-sep"></div>
          <label class="tool-label">Espessura</label>
          <input type="range" id="pen-size" min="1" max="20" value="2"
            oninput="canvasPenSize=+this.value" style="width:80px;accent-color:var(--accent)">
          <div class="tool-sep"></div>
          <label class="tool-label">Cor</label>
          <input type="color" id="pen-color" value="#e8eaf0"
            oninput="canvasPenColor=this.value" style="width:36px;height:28px;border:none;background:none;cursor:pointer">
          <div class="tool-sep"></div>
          <button class="notes-btn save" style="padding:6px 14px;font-size:12px" onclick="salvarCanvas(${mIdx})">💾 Salvar</button>
          <button class="notes-btn clear" style="padding:6px 14px;font-size:12px" id="btn-limpar-canvas" onclick="limparCanvas(${mIdx})">🗑 Limpar</button>
        </div>
        <canvas id="notes-canvas" class="notes-canvas"></canvas>
      `}
    </div>
  `;
}

function switchNoteMode(mIdx, mode) {
  // Salvar estado atual antes de trocar
  if (getNoteMode(mIdx) === 'text') {
    const ta = document.getElementById('notes-textarea');
    if (ta) saveNota(mIdx, ta.value);
  } else {
    autoSaveCanvas(mIdx);
  }
  setNoteMode(mIdx, mode);
  document.getElementById('tab-notes').innerHTML = buildNotes(mIdx);
  if (mode === 'draw') initCanvas(mIdx);
  updateToolButtons();
}

function initCanvas(mIdx) {
  const canvas = document.getElementById('notes-canvas');
  if (!canvas) return;

  // Tamanho responsivo
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth || 700;
  const h = Math.max(500, window.innerHeight * 0.55);
  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#181c27';
  ctx.fillRect(0, 0, w, h);

  // Restaurar desenho salvo
  const saved = getCanvasData(mIdx);
  if (saved) {
    const img = new Image();
    img.onload = () => ctx.drawImage(img, 0, 0);
    img.src = saved;
  }

  // Eventos touch (Apple Pencil)
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });

  // Eventos mouse (desktop)
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', () => { canvasDrawing = false; });
  canvas.addEventListener('mouseleave', () => { canvasDrawing = false; });

  updateToolButtons();
}

function getPos(canvas, clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function drawLine(ctx, x1, y1, x2, y2) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
}

function setupCtx(ctx) {
  ctx.globalCompositeOperation = 'source-over';
  if (canvasTool === 'eraser') {
    ctx.strokeStyle = '#181c27'; // mesma cor do fundo do canvas
    ctx.lineWidth = canvasPenSize * 6;
  } else {
    ctx.strokeStyle = canvasPenColor;
    ctx.lineWidth = canvasPenSize;
  }
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function onTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const canvas = e.target;
  const pos = getPos(canvas, touch.clientX, touch.clientY);
  canvasDrawing = true;
  canvasLastX = pos.x;
  canvasLastY = pos.y;
}

function onTouchMove(e) {
  e.preventDefault();
  if (!canvasDrawing) return;
  const touch = e.touches[0];
  const canvas = e.target;
  const ctx = canvas.getContext('2d');
  const pos = getPos(canvas, touch.clientX, touch.clientY);
  setupCtx(ctx);
  drawLine(ctx, canvasLastX, canvasLastY, pos.x, pos.y);
  canvasLastX = pos.x;
  canvasLastY = pos.y;
}

function onTouchEnd(e) {
  e.preventDefault();
  canvasDrawing = false;
}

function onMouseDown(e) {
  const canvas = e.target;
  const pos = getPos(canvas, e.clientX, e.clientY);
  canvasDrawing = true;
  canvasLastX = pos.x;
  canvasLastY = pos.y;
}

function onMouseMove(e) {
  if (!canvasDrawing) return;
  const canvas = e.target;
  const ctx = canvas.getContext('2d');
  const pos = getPos(canvas, e.clientX, e.clientY);
  setupCtx(ctx);
  drawLine(ctx, canvasLastX, canvasLastY, pos.x, pos.y);
  canvasLastX = pos.x;
  canvasLastY = pos.y;
}

function setTool(tool) {
  canvasTool = tool;
  updateToolButtons();
}

function updateToolButtons() {
  const pen = document.getElementById('btn-pen');
  const eraser = document.getElementById('btn-eraser');
  if (pen) pen.style.background = canvasTool === 'pen' ? 'var(--accent-dim)' : '';
  if (pen) pen.style.borderColor = canvasTool === 'pen' ? 'var(--accent)' : '';
  if (eraser) eraser.style.background = canvasTool === 'eraser' ? 'var(--accent-dim)' : '';
  if (eraser) eraser.style.borderColor = canvasTool === 'eraser' ? 'var(--accent)' : '';
}

function autoSaveCanvas(mIdx) {
  const canvas = document.getElementById('notes-canvas');
  if (!canvas) return;
  saveCanvasData(mIdx, canvas.toDataURL());
}

function salvarCanvas(mIdx) {
  const canvas = document.getElementById('notes-canvas');
  if (!canvas) return;
  saveCanvasData(mIdx, canvas.toDataURL());
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  try { localStorage.setItem('nota_ts_' + MATERIAS[mIdx].id, ts); } catch(e) {}
  const saved = document.getElementById('notes-saved');
  if (saved) {
    saved.textContent = 'Salvo às ' + ts + ' ✓';
    saved.style.color = 'var(--green)';
    setTimeout(() => { if(saved) saved.style.color = ''; }, 2000);
  }
}

function limparCanvas(mIdx) {
  const btn = document.getElementById('btn-limpar-canvas');
  if (!btn) return;
  if (btn.dataset.confirm !== '1') {
    btn.textContent = '⚠️ Confirmar?';
    btn.dataset.confirm = '1';
    setTimeout(() => {
      if (btn) { btn.textContent = '🗑 Limpar'; btn.dataset.confirm = ''; }
    }, 3000);
    return;
  }
  // Confirmado — limpar
  btn.textContent = '🗑 Limpar';
  btn.dataset.confirm = '';
  const canvas = document.getElementById('notes-canvas');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#181c27';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  saveCanvasData(mIdx, '');
  try { localStorage.removeItem('nota_ts_' + MATERIAS[mIdx].id); } catch(e) {}
  const saved = document.getElementById('notes-saved');
  if (saved) saved.textContent = 'Desenho apagado';
}

function notaChanged() {
  const saved = document.getElementById('notes-saved');
  if (saved) saved.textContent = 'Alterações não salvas';
}

function salvarNota(mIdx) {
  const ta = document.getElementById('notes-textarea');
  if (!ta) return;
  saveNota(mIdx, ta.value);
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  try { localStorage.setItem('nota_ts_' + MATERIAS[mIdx].id, ts); } catch(e) {}
  const saved = document.getElementById('notes-saved');
  if (saved) {
    saved.textContent = 'Salvo às ' + ts + ' ✓';
    saved.style.color = 'var(--green)';
    setTimeout(() => { if(saved) saved.style.color = ''; }, 2000);
  }
}

function limparNota(mIdx) {
  const btn = document.getElementById('btn-limpar-nota');
  if (!btn) return;
  if (btn.dataset.confirm !== '1') {
    btn.textContent = '⚠️ Confirmar?';
    btn.dataset.confirm = '1';
    setTimeout(() => {
      if (btn) { btn.textContent = '🗑 Limpar'; btn.dataset.confirm = ''; }
    }, 3000);
    return;
  }
  btn.textContent = '🗑 Limpar';
  btn.dataset.confirm = '';
  saveNota(mIdx, '');
  try { localStorage.removeItem('nota_ts_' + MATERIAS[mIdx].id); } catch(e) {}
  document.getElementById('tab-notes').innerHTML = buildNotes(mIdx);
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = MATERIAS.map((m, i) => {
    const sc = state.scores[i];
    const done = sc.answered;
    const scoreText = done > 0 ? `${sc.correct}/${sc.answered}` : '';
    const scoreClass = done === sc.total && sc.correct === sc.total ? 'perfect' : '';
    const hasNota = (() => { try { return !!localStorage.getItem('nota_' + m.id); } catch(e) { return false; } })();
    return `<div class="nav-item${i === state.current ? ' active' : ''}" onclick="selectMateria(${i})">
      <span class="icon">${m.icon}</span>
      <span style="flex:1">${m.nome}</span>
      ${hasNota ? '<span style="font-size:10px;opacity:0.6">📓</span>' : ''}
      ${scoreText ? `<span class="nav-score ${scoreClass}">${scoreText}</span>` : ''}
    </div>`;
  }).join('');
}

function buildContent(m) {
  return m.conteudo.map(sec => {
    const items = sec.items.map(item => {
      if (item.tipo === 'p') return `<p class="section-p">${item.txt}</p>`;
      if (item.tipo === 'h3') return `<div class="section-h3">${item.txt}</div>`;
      if (item.tipo === 'ex') return `<div class="example">${item.txt}</div>`;
      if (item.tipo === 'diagram') return `<div class="diagram">${item.txt.replace(/\\n/g, '\n')}</div>`;
      if (item.tipo === 'svg') return `<div class="svg-diagram">${item.html}</div>`;
      if (item.tipo === 'ul') return `<ul class="bullet-list">${item.items.map(li => `<li>${li}</li>`).join('')}</ul>`;
      return '';
    }).join('');
    return `<div class="section-block"><div class="section-h2">${sec.h2}</div>${items}</div>`;
  }).join('');
}

function buildQuestions(mIdx) {
  const m = MATERIAS[mIdx];
  const sc = state.scores[mIdx];
  const pct = sc.answered > 0 ? Math.round((sc.correct / sc.answered) * 100) : 0;
  const barColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--accent)';

  let html = `<div class="score-bar">
    <div>
      <div class="score-label">Acertos</div>
      <div class="score-count">${sc.correct} <span>/ ${sc.total}</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${sc.answered > 0 ? pct : 0}%;background:${barColor}"></div>
    </div>
    <button class="reset-btn" onclick="resetMateria(${mIdx})">Refazer</button>
  </div>`;

  m.questoes.forEach((q, qi) => {
    const ans = state.answers[mIdx][qi];
    const letters = ['A','B','C','D','E'];
    const answered = ans !== null;
    const correct = answered && letters[ans] === q.g;

    html += `<div class="question-block${answered ? (correct ? ' answered-correct' : ' answered-wrong') : ''}" id="q-${mIdx}-${qi}">
      <div class="question-num">Questão ${qi + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="alternatives">`;

    q.alts.forEach((alt, ai) => {
      let cls = '';
      if (answered) {
        if (letters[ai] === q.g) cls = 'reveal-correct';
        if (ai === ans && !correct) cls = 'wrong';
        if (ai === ans && correct) cls = 'correct';
      }
      html += `<button class="alt-btn ${cls}" 
        ${answered ? 'disabled' : `onclick="answer(${mIdx},${qi},${ai})"`}>
        <span class="alt-letter">${letters[ai]}</span>
        <span>${alt}</span>
      </button>`;
    });

    html += `</div>`;

    if (answered) {
      html += `<div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <strong>${correct ? '✓ Correto!' : '✗ Incorreto'}</strong>
        ${q.j}
      </div>`;
    }

    html += `</div>`;
  });

  return html;
}

function renderMain() {
  const m = MATERIAS[state.current];
  const mIdx = state.current;

  document.getElementById('main').innerHTML = `
    <div class="subject-subtitle">${m.icon} ${m.nome}</div>
    <h1 class="subject-title">${m.topico}</h1>
    <div class="tabs">
      <div class="tab${state.tab === 'content' ? ' active' : ''}" onclick="switchTab('content')">📖 Conteúdo</div>
      <div class="tab${state.tab === 'questions' ? ' active' : ''}" onclick="switchTab('questions')">✏️ Questões</div>
      <div class="tab${state.tab === 'notes' ? ' active' : ''}" onclick="switchTab('notes')">📓 Notas</div>
    </div>
    <div class="content${state.tab === 'content' ? ' visible' : ''}" id="tab-content">
      ${buildContent(m)}
    </div>
    <div class="content${state.tab === 'questions' ? ' visible' : ''}" id="tab-questions">
      ${buildQuestions(mIdx)}
    </div>
    <div class="content${state.tab === 'notes' ? ' visible' : ''}" id="tab-notes">
      ${buildNotes(mIdx)}
    </div>
  `;

  // Atalho: Ctrl+S salva as notas quando a aba está aberta
  document.addEventListener('keydown', function onKey(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's' && state.tab === 'notes') {
      e.preventDefault();
      salvarNota(state.current);
    }
  }, { once: true });
}

function render() {
  renderNav();
  renderMain();
}

// ═══════════════════════════════════════════════════════════════
// AÇÕES
// ═══════════════════════════════════════════════════════════════

function selectMateria(i) {
  // Auto-salvar canvas da matéria atual se necessário
  if (state.tab === 'notes' && getNoteMode(state.current) === 'draw') {
    autoSaveCanvas(state.current);
  }
  state.current = i;
  state.tab = 'content';
  render();
  document.getElementById('main').scrollTop = 0;
  if (window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function switchTab(tab) {
  // Auto-salvar canvas se estava no modo draw antes de trocar
  if (state.tab === 'notes' && getNoteMode(state.current) === 'draw') {
    autoSaveCanvas(state.current);
  }
  state.tab = tab;
  renderMain();
  if (tab === 'notes' && getNoteMode(state.current) === 'draw') {
    setTimeout(() => initCanvas(state.current), 50);
  }
}

function answer(mIdx, qi, ai) {
  if (state.answers[mIdx][qi] !== null) return;
  state.answers[mIdx][qi] = ai;
  const letters = ['A','B','C','D','E'];
  const correct = letters[ai] === MATERIAS[mIdx].questoes[qi].g;
  state.scores[mIdx].answered++;
  if (correct) state.scores[mIdx].correct++;
  renderNav();
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
  const el = document.getElementById(`q-${mIdx}-${qi}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetMateria(mIdx) {
  state.scores[mIdx] = { total: MATERIAS[mIdx].questoes.length, answered: 0, correct: 0 };
  state.answers[mIdx] = Array(MATERIAS[mIdx].questoes.length).fill(null);
  renderNav();
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

render();
</script>
</body>
</html>
