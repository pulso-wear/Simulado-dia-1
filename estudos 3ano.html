<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudos 3.º Ano</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,600;1,400&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2435;
    --border: #2a3045;
    --text: #e8eaf0;
    --muted: #7a82a0;
    --accent: #5b8dee;
    --accent-dim: rgba(91,141,238,0.12);
    --green: #3ecf8e;
    --green-dim: rgba(62,207,142,0.12);
    --red: #f55f5f;
    --red-dim: rgba(245,95,95,0.12);
    --yellow: #f5c542;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-family: 'Lora', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .nav-list { padding: 8px 8px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-score {
    margin-left: auto;
    font-size: 11px;
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 20px;
    color: var(--muted);
  }
  .nav-item.active .nav-score { background: var(--accent-dim); }
  .nav-score.perfect { background: var(--green-dim); color: var(--green); }

  /* ── MAIN ── */
  #main {
    flex: 1;
    padding: 32px 28px;
    max-width: 820px;
    overflow-y: auto;
  }

  .subject-title {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .subject-subtitle {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab {
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-color: var(--accent); }

  /* ── CONTEÚDO ── */
  .content { display: none; }
  .content.visible { display: block; }

  .section-block { margin-bottom: 28px; }

  .section-h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--yellow);
    margin: 16px 0 8px;
  }
  .section-p { color: var(--text); margin-bottom: 10px; }

  .bullet-list { list-style: none; padding: 0; margin: 8px 0; }
  .bullet-list li {
    padding: 4px 0 4px 20px;
    position: relative;
    color: var(--text);
    font-size: 14px;
  }
  .bullet-list li::before {
    content: '›';
    position: absolute;
    left: 4px;
    color: var(--accent);
    font-weight: 700;
  }
  .example {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: var(--muted);
    margin: 6px 0;
    font-style: italic;
  }

  /* ── QUESTÕES ── */
  .question-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .question-block.answered-correct { border-color: var(--green); }
  .question-block.answered-wrong { border-color: var(--red); }

  .question-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .question-text {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .alternatives { display: flex; flex-direction: column; gap: 8px; }

  .alt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }
  .alt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim); }
  .alt-btn:disabled { cursor: default; }

  .alt-letter {
    font-weight: 700;
    font-size: 13px;
    min-width: 20px;
    color: var(--muted);
    margin-top: 1px;
  }

  .alt-btn.correct { border-color: var(--green); background: var(--green-dim); }
  .alt-btn.correct .alt-letter { color: var(--green); }
  .alt-btn.wrong { border-color: var(--red); background: var(--red-dim); }
  .alt-btn.wrong .alt-letter { color: var(--red); }
  .alt-btn.reveal-correct { border-color: var(--green); background: var(--green-dim); opacity: 0.7; }
  .alt-btn.reveal-correct .alt-letter { color: var(--green); }

  .feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-dim); border: 1px solid rgba(62,207,142,0.3); }
  .feedback.wrong { background: var(--red-dim); border: 1px solid rgba(245,95,95,0.3); }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 13px; }
  .feedback.correct strong { color: var(--green); }
  .feedback.wrong strong { color: var(--red); }

  /* ── SCORE BAR ── */
  .score-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .score-label { font-size: 13px; color: var(--muted); }
  .score-count { font-size: 22px; font-weight: 700; color: var(--text); }
  .score-count span { font-size: 14px; color: var(--muted); font-weight: 400; }
  .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 6px; }
  .progress-bar-fill {
    height: 6px;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .reset-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text); }

  /* ── MOBILE ── */
  #menu-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(91,141,238,0.4);
  }

  @media (max-width: 700px) {
    #sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      bottom: 0;
      z-index: 50;
      transition: left 0.25s ease;
    }
    #sidebar.open { left: 0; box-shadow: 4px 0 30px rgba(0,0,0,0.5); }
    #main { padding: 20px 16px; }
    #menu-toggle { display: flex; align-items: center; justify-content: center; }
    .subject-title { font-size: 22px; }
  }
</style>
</head>
<body>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header">
      <h1>Estudos<br>3.º Ano</h1>
      <p>Selecione uma matéria</p>
    </div>
    <div class="nav-list" id="nav-list"></div>
  </nav>

  <main id="main"></main>
</div>

<button id="menu-toggle" onclick="toggleMenu()">☰</button>

<script>

const MATERIAS = [

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = MATERIAS.map((m, i) => {
    const sc = state.scores[i];
    const done = sc.answered;
    const pct = done > 0 ? Math.round((sc.correct / sc.answered) * 100) : null;
    const scoreText = done > 0 ? `${sc.correct}/${sc.answered}` : '';
    const scoreClass = done === sc.total && sc.correct === sc.total ? 'perfect' : '';
    return `<div class="nav-item${i === state.current ? ' active' : ''}" onclick="selectMateria(${i})">
      <span class="icon">${m.icon}</span>
      <span style="flex:1">${m.nome}</span>
      ${scoreText ? `<span class="nav-score ${scoreClass}">${scoreText}</span>` : ''}
    </div>`;
  }).join('');
}

function buildContent(m) {
  return m.conteudo.map(sec => {
    const items = sec.items.map(item => {
      if (item.tipo === 'p') return `<p class="section-p">${item.txt}</p>`;

      if (item.tipo === 'ex') return `<div class="example">${item.txt}</div>`;
      if (item.tipo === 'ul') return `<ul class="bullet-list">${item.items.map(li => `<li>${li}</li>`).join('')}</ul>`;
      return '';
    }).join('');
    return `<div class="section-block"><div class="section-h2">${sec.h2}</div>${items}</div>`;
  }).join('');
}

function buildQuestions(mIdx) {
  const m = MATERIAS[mIdx];
  const sc = state.scores[mIdx];
  const pct = sc.answered > 0 ? Math.round((sc.correct / sc.answered) * 100) : 0;
  const barColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--accent)';

  let html = `<div class="score-bar">
    <div>
      <div class="score-label">Acertos</div>
      <div class="score-count">${sc.correct} <span>/ ${sc.total}</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${sc.answered > 0 ? pct : 0}%;background:${barColor}"></div>
    </div>
    <button class="reset-btn" onclick="resetMateria(${mIdx})">Refazer</button>
  </div>`;

  m.questoes.forEach((q, qi) => {
    const ans = state.answers[mIdx][qi];
    const letters = ['A','B','C','D','E'];
    const answered = ans !== null;
    const correct = answered && letters[ans] === q.g;

    html += `<div class="question-block${answered ? (correct ? ' answered-correct' : ' answered-wrong') : ''}" id="q-${mIdx}-${qi}">
      <div class="question-num">Questão ${qi + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="alternatives">`;

    q.alts.forEach((alt, ai) => {
      let cls = '';
      if (answered) {
        if (letters[ai] === q.g) cls = 'reveal-correct';
        if (ai === ans && !correct) cls = 'wrong';
        if (ai === ans && correct) cls = 'correct';
      }
      html += `<button class="alt-btn ${cls}" 
        ${answered ? 'disabled' : `onclick="answer(${mIdx},${qi},${ai})"`}>
        <span class="alt-letter">${letters[ai]}</span>
        <span>${alt}</span>
      </button>`;
    });

    html += `</div>`;

    if (answered) {
      html += `<div class="feedback ${correct ? 'correct' : 'wrong'} show">
        <strong>${correct ? '✓ Correto!' : '✗ Incorreto'}</strong>
        ${q.j}
      </div>`;
    }

    html += `</div>`;
  });

  return html;
}

function renderMain() {
  const m = MATERIAS[state.current];
  const mIdx = state.current;

  document.getElementById('main').innerHTML = `
    <div class="subject-subtitle">${m.icon} ${m.nome}</div>
    <h1 class="subject-title">${m.topico}</h1>
    <div class="tabs">
      <div class="tab${state.tab === 'content' ? ' active' : ''}" onclick="switchTab('content')">📖 Conteúdo</div>
      <div class="tab${state.tab === 'questions' ? ' active' : ''}" onclick="switchTab('questions')">✏️ Questões</div>
    </div>
    <div class="content${state.tab === 'content' ? ' visible' : ''}" id="tab-content">
      ${buildContent(m)}
    </div>
    <div class="content${state.tab === 'questions' ? ' visible' : ''}" id="tab-questions">
      ${buildQuestions(mIdx)}
    </div>
  `;
}

function render() {
  renderNav();
  renderMain();
}

// ═══════════════════════════════════════════════════════════════
// AÇÕES
// ═══════════════════════════════════════════════════════════════

function selectMateria(i) {
  state.current = i;
  state.tab = 'content';
  render();
  document.getElementById('main').scrollTop = 0;
  if (window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function switchTab(tab) {
  state.tab = tab;
  renderMain();
}

function answer(mIdx, qi, ai) {
  if (state.answers[mIdx][qi] !== null) return;
  state.answers[mIdx][qi] = ai;
  const letters = ['A','B','C','D','E'];
  const correct = letters[ai] === MATERIAS[mIdx].questoes[qi].g;
  state.scores[mIdx].answered++;
  if (correct) state.scores[mIdx].correct++;
  renderNav();
  // Rebuild apenas as questões sem recriar o main inteiro
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
  // Scroll para a questão respondida
  const el = document.getElementById(`q-${mIdx}-${qi}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetMateria(mIdx) {
  state.scores[mIdx] = { total: MATERIAS[mIdx].questoes.length, answered: 0, correct: 0 };
  state.answers[mIdx] = Array(MATERIAS[mIdx].questoes.length).fill(null);
  renderNav();
  document.getElementById('tab-questions').innerHTML = buildQuestions(mIdx);
}

function toggleMenu() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

render();
</script>
</body>
</html>
